<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing — BoxYourBuddy</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; font-weight: bold; }
        body { margin: 0; background: #000; color: #fff; overflow-x: hidden; }
        .page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
        .page-header { text-align: center; margin-bottom: 40px; }
        .brand-name { letter-spacing: 2px; margin: 0; font-size: clamp(1.5rem, 5vw, 2.8rem); text-transform: uppercase; }
        .brand-name .tint { color: #FFF0AD; }
        .brand-logo { width: 50px; height: auto; display: block; margin: 0 auto 10px; }
        .back-link { display: inline-block; margin-top: 12px; font-size: 0.75rem; letter-spacing: 4px; color: #888; text-decoration: none; text-transform: uppercase; }
        .back-link:hover { color: #FFF0AD; }
        .page-title { margin-top: 30px; font-size: 0.75rem; letter-spacing: 6px; color: #888; text-transform: uppercase; }
        .cards { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 20px; }
        .card { display: block; text-decoration: none; color: #fff; background: #0a0a0a; border: 1px solid #222; border-radius: 6px; padding: 24px; transition: border-color 0.2s; }
        .card:hover { border-color: #FFF0AD; }
        .card-title { font-size: 1.2rem; letter-spacing: 1px; margin: 0 0 10px; }
        .card-desc { font-size: 0.85rem; color: #888; font-weight: normal; line-height: 1.6; margin: 0 0 16px; }
        .card-meta { font-size: 0.7rem; letter-spacing: 3px; color: #555; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="page">
        <header class="page-header">
            <img src="../images/box-small.png" alt="BoxYourBuddy logo" class="brand-logo">
            <h1 class="brand-name"><span class="tint">B</span>OX<span class="tint">Y</span>OUR<span class="tint">B</span>UDDY</h1>
            <a href="/" class="back-link">← Home</a>
            <p class="page-title">Writing</p>
        </header>

        <div class="cards">
            <a href="simple-solution-for-hiccups/" class="card">
                <p class="card-title">Simple Solution for Hiccups</p>
                <p class="card-desc">Just follow these simple instructions and your hiccups will disappear.</p>
                <p class="card-meta">June 28, 2018</p>
            </a>
        </div>
    </div>
</body>
</html>
