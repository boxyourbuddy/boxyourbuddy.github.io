<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxYourBuddy</title>

    <meta property="og:title" content="BoxYourBuddy">
    <meta property="og:description" content="Free macOS software, art, and music. No ads, no pro tiers.">
    <meta property="og:image" content="https://boxyourbuddy.com/hero2.png">
    <meta property="og:url" content="https://boxyourbuddy.com">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        * { 
            box-sizing: border-box; 
            font-family: Arial, sans-serif; 
            font-weight: bold; 
        }

        body { 
            margin: 0; 
            background: #000; 
            color: #fff;
            overflow-x: hidden;
        }

        .observer-page {
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        /* Header */
        .observer-header { text-align: center; margin-bottom: 20px; }

        .brand-name { 
            letter-spacing: 14px; 
            margin: 0; 
            font-size: clamp(1.5rem, 5vw, 2.8rem); 
            text-transform: uppercase; 
        }

        .identity-line { 
            margin-top: 15px; 
            font-size: 0.75rem; 
            letter-spacing: 4px; 
            color: #888; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
        }

        .dot { height: 5px; width: 5px; background-color: #FFD700; border-radius: 50%; }

        .tagline { 
            margin-top: 20px; 
            font-size: 1.1rem; 
            color: #fff; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Eye / Circle */
        .byb-wrap { 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            width: 100%; 
            padding: 30px 0; 
        }

        .byb-circle { 
            position: relative; 
            width: 450px; 
            height: 450px; 
            max-width: 85vw; 
            max-height: 85vw; 
        }

        .rotating-text { letter-spacing: 6.4px; text-transform: uppercase; }

        svg { 
            width: 100%; 
            height: 100%; 
            animation: rotCCW 60s linear infinite; 
        }

        .eye-img { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 75%; 
            height: 75%; 
            border-radius: 50%; 
            overflow: hidden; 
            border: 2px solid #222; 
        }

        .eye-img img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes rotCCW { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* Info section below the eye */
        .info-section {
            text-align: center;
            margin-top: 10px;
            padding: 0 20px 40px;
        }

        .info-section h3 {
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #FFD700;
            margin-bottom: 8px;
        }

        .info-section p {
            font-size: 0.85rem;
            color: #888;
            letter-spacing: 1px;
            margin: 4px 0;
            font-weight: normal;
        }

        .info-section .status {
            color: #555;
            font-style: italic;
            margin-top: 16px;
        }

        hr {
            border: 0; 
            border-top: 1px solid #222; 
            margin: 20px auto;
            width: 60%;
        }
    </style>
</head>
<body>

    <div class="observer-page">

        <header class="observer-header">
            <h1 class="brand-name">BOXYOURBUDDY</h1>
            <div class="identity-line">
                <span>WRITER</span> 
                <span class="dot"></span>
                <span>ARTIST</span> 
                <span class="dot"></span>
                <span>DEV</span>
            </div>
            <p class="tagline">Silent Observer</p>
        </header>

        <div class="byb-wrap">
            <div class="byb-circle">
                <svg viewBox="0 0 500 500" preserveAspectRatio="xMidYMid meet">
                    <path id="curve" d="M 250, 250 m -220, 0 a 220,220 0 1,1 440,0 a 220,220 0 1,1 -440,0" fill="transparent"/>
                    <text fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="21" class="rotating-text">
                        <textPath xlink:href="#curve" startOffset="0%">
                            I AM A NEW DEVELOPER MAKING FREE APPLICATIONS WITH NO ADS FOR MACOS &#160; 
                            <tspan font-size="38px" fill="#FFD700" dy="5">☮</tspan> &#160;
                        </textPath>
                    </text>
                </svg>
                <div class="eye-img">
                    <img src="dan-right-eye.jpg" alt="Retinal tracker eye">
                </div>
            </div>
        </div>

        <div class="info-section">
            <h3>TV Stats for macOS</h3>
            <p>The free, ad-free way to track your watch history.</p>
            <hr>
            <p>Software, art, and writing by Dan Stout.</p>
            <p class="status">Site under reconstruction — download link returning shortly.</p>
        </div>

    </div>

</body>
</html>
