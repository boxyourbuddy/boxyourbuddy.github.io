        setUser(updated);setAllUsers([...users]);
        setPassVal("");setConfirmVal("");
        setAcctMsg({ok:true,text:"Changes saved."});
        setTimeout(()=>setAcctMsg(null),3000);
      };

      const slugifySettings=(name)=>{
        const base=name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
        const taken=allUsers.map(u=>u.email);
        if(!taken.includes(base))return base;
        let i=2;while(taken.includes(`${base}-${i}`))i++;return`${base}-${i}`;
      };
      const addProfile=()=>{
        const name=apName.trim();
        if(!name){setApError("Please enter a name.");return;}
        if(apPin&&(apPin.length!==4||!/^\d{4}$/.test(apPin))){setApError("PIN must be exactly 4 digits.");return;}
        const u={name,email:slugifySettings(name),color:apColor,...(apPin?{pin:apPin}:{})};
        const updated=[...allUsers,u];
        localStorage.setItem("tvstats_users",JSON.stringify(updated));
        setAllUsers(updated);setShowAddProfile(false);setApName("");setApPin("");setApColor(PROFILE_COLORS[0]);setApError("");
      };
      const removeProfile=(email)=>{
        const updated=allUsers.filter(u=>u.email!==email);
        localStorage.setItem("tvstats_users",JSON.stringify(updated));
        localStorage.removeItem(`tvstats_watched_${email}`);
        localStorage.removeItem(`tvstats_watchlist_${email}`);
        setAllUsers(updated);
      };

      const filtered=useMemo(()=>{
        const q=query.toLowerCase().replace(/\s/g,"_");
        return q?ALL_TZ.filter(t=>t.toLowerCase().includes(q)):ALL_TZ;
      },[query]);

      const select=(t)=>{
        setTz(t);setQuery("");setOpen(false);
        localStorage.setItem("tvstats_timezone",t);
      };

      // Close on outside click
      useEffect(()=>{
        const h=(e)=>{if(listRef.current&&!listRef.current.contains(e.target)&&!inputRef.current.contains(e.target))setOpen(false);};
        document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
      },[]);

      const now=new Date();
      const preview=new Intl.DateTimeFormat("en-US",{timeZone:tz,weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit",hour12:true}).format(now);

      return(
        <div style={{flex:1,overflowY:"auto",padding:"36px 40px",willChange:"transform"}}>
          <h2 style={{fontSize:22,fontWeight:700,color:C.text,marginBottom:28}}>Settings</h2>

          {/* Account section */}
          <div style={{background:C.surface,border:C.border,borderRadius:12,overflow:"hidden",maxWidth:560}}>
            <div style={{padding:"10px 18px",borderBottom:C.border}}>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",color:C.muted,textTransform:"uppercase"}}>Account</span>
            </div>
            <div style={{padding:"18px 18px 20px",display:"flex",flexDirection:"column",gap:14}}>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5,letterSpacing:"0.06em",textTransform:"uppercase"}}>Username</div>
                <input value={nameVal} onChange={e=>setNameVal(e.target.value)} style={{width:"100%",background:C.elevated,border:`0.5px solid ${C.inputBorder}`,borderRadius:8,color:C.text,padding:"8px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              </div>
              <div style={{height:"0.5px",background:C.hover}}/>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5,letterSpacing:"0.06em",textTransform:"uppercase"}}>New Password</div>
                <input type="password" value={passVal} onChange={e=>setPassVal(e.target.value)} placeholder="Leave blank to keep current" style={{width:"100%",background:C.elevated,border:`0.5px solid ${C.inputBorder}`,borderRadius:8,color:C.text,padding:"8px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5,letterSpacing:"0.06em",textTransform:"uppercase"}}>Confirm Password</div>
                <input type="password" value={confirmVal} onChange={e=>setConfirmVal(e.target.value)} placeholder="Repeat new password" style={{width:"100%",background:C.elevated,border:`0.5px solid ${C.inputBorder}`,borderRadius:8,color:C.text,padding:"8px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              </div>
              <div style={{height:"0.5px",background:C.hover}}/>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5,letterSpacing:"0.06em",textTransform:"uppercase"}}>Recovery Email</div>
                <div style={{fontSize:11.5,color:C.muted,marginBottom:8}}>Used to recover your username and password if you forget them.</div>
                <input type="email" value={recoveryEmailVal} onChange={e=>setRecoveryEmailVal(e.target.value)} placeholder="recovery@example.com" style={{width:"100%",background:C.elevated,border:`0.5px solid ${C.inputBorder}`,borderRadius:8,color:C.text,padding:"8px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              </div>
              <div style={{height:"0.5px",background:C.hover}}/>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8,letterSpacing:"0.06em",textTransform:"uppercase"}}>Profile Color</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {PROFILE_COLORS.map(col=>(
                    <div key={col} onClick={()=>setColorVal(col)} style={{width:26,height:26,borderRadius:6,background:col,cursor:"pointer",border:colorVal===col?`2px solid ${C.text}`:"2px solid transparent",transition:"border 0.1s"}}/>
                  ))}
                </div>
              </div>
              <div style={{height:"0.5px",background:C.hover}}/>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5,letterSpacing:"0.06em",textTransform:"uppercase"}}>PIN <span style={{fontSize:10,fontWeight:400,textTransform:"none"}}>(4 digits, optional)</span></div>
                <div style={{fontSize:11.5,color:C.muted,marginBottom:8}}>Protects your profile at the login screen. Leave blank to remove.</div>
                <input type="tel" value={pinVal} onChange={e=>setPinVal(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="Leave blank for no PIN" style={{width:"100%",background:C.elevated,border:`0.5px solid ${C.inputBorder}`,borderRadius:8,color:C.text,padding:"8px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12,marginTop:2}}>
                <button onClick={saveAccount} style={{background:C.amber,border:"none",borderRadius:8,padding:"8px 20px",color:"#000",fontSize:13,fontWeight:600,cursor:"pointer"}}>Save Changes</button>
                {acctMsg&&<span style={{fontSize:12,color:acctMsg.ok?"#6db96d":"#e06c6c"}}>{acctMsg.text}</span>}
              </div>
            </div>
          </div>

          {/* Display section */}
          <div style={{background:C.surface,border:C.border,borderRadius:12,overflow:"hidden",maxWidth:560,marginTop:20}}>
            <div style={{padding:"10px 18px",borderBottom:C.border}}>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",color:C.muted,textTransform:"uppercase"}}>Display</span>
            </div>
            <div style={{padding:"18px 18px 20px"}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:4}}>Timezone</div>
                  <div style={{fontSize:11.5,color:C.muted}}>Used for date labels in History and Stats.</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:3,fontStyle:"italic"}}>{preview}</div>
                </div>
                {/* Picker */}
                <div style={{position:"relative",flexShrink:0,width:240}}>
                  <div ref={inputRef} onClick={()=>{setOpen(o=>!o);setQuery("");setTimeout(()=>inputRef.current?.querySelector("input")?.focus(),50);}}
                    style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.elevated,border:`0.5px solid ${C.inputBorder}`,borderRadius:8,padding:"8px 12px",cursor:"pointer",gap:8}}>
                    {open
                      ? <input autoFocus value={query} onChange={e=>setQuery(e.target.value)} onClick={e=>e.stopPropagation()}
                          placeholder="Search timezones…"
                          style={{background:"none",border:"none",outline:"none",color:C.text,fontSize:12,width:"100%",fontFamily:"inherit"}}/>
                      : <span style={{fontSize:12,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tz}</span>
                    }
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{flexShrink:0,transform:open?"rotate(180deg)":"none",transition:"transform 0.15s"}}>
                      <path d="M2 3.5l3 3 3-3" stroke={C.muted} strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </div>
                  {open&&(
                    <div ref={listRef} style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:C.elevated,border:`0.5px solid ${C.inputBorder}`,borderRadius:8,overflow:"hidden",zIndex:100,maxHeight:220,overflowY:"auto"}}>
                      {filtered.length===0
                        ? <div style={{padding:"10px 14px",fontSize:12,color:C.muted}}>No results</div>
                        : filtered.map(t=>(
                          <div key={t} onClick={()=>select(t)}
                            style={{padding:"8px 14px",fontSize:12,color:t===tz?C.amber:C.text,background:t===tz?C.elevated:"none",cursor:"pointer",transition:"background 0.1s"}}
                            onMouseEnter={e=>e.currentTarget.style.background=C.hover}
                            onMouseLeave={e=>e.currentTarget.style.background=t===tz?C.elevated:"none"}>
                            {t}
                          </div>
                        ))
                      }
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>

          {/* Appearance section */}
          <div style={{background:C.surface,border:C.border,borderRadius:12,overflow:"hidden",maxWidth:560,marginTop:20}}>
            <div style={{padding:"10px 18px",borderBottom:C.border}}>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",color:C.muted,textTransform:"uppercase"}}>Appearance</span>
            </div>
            <div style={{padding:"18px 18px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16}}>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:4}}>Theme</div>
                <div style={{fontSize:11.5,color:C.muted}}>{theme==='dark'?'Dark mode':'Light mode'}</div>
              </div>
              <button onClick={()=>{const t=theme==='dark'?'light':'dark';localStorage.setItem('tvstats_theme',t);setTheme(t);}} style={{position:"relative",width:44,height:24,borderRadius:99,border:"none",background:theme==='dark'?"#444":"#d0d0d0",cursor:"pointer",transition:"background 0.2s",padding:0,flexShrink:0}}>
                <div style={{position:"absolute",top:3,left:theme==='dark'?3:23,width:18,height:18,borderRadius:99,background:theme==='dark'?C.amber:"#ffffff",transition:"left 0.2s",boxShadow:"0 1px 3px rgba(0,0,0,0.3)"}}/>
              </button>
            </div>
          </div>

          {/* Data section */}
          <div style={{background:C.surface,border:C.border,borderRadius:12,overflow:"hidden",maxWidth:560,marginTop:20}}>
            <div style={{padding:"10px 18px",borderBottom:C.border}}>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",color:C.muted,textTransform:"uppercase"}}>Data</span>
            </div>
            <div style={{padding:"18px 18px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16}}>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:4}}>Import &amp; Backup</div>
                <div style={{fontSize:11.5,color:C.muted}}>Import watch history from Trakt, or back up and restore your data.</div>
              </div>
              <button onClick={onData} style={{flexShrink:0,background:C.elevated,border:`0.5px solid ${C.inputBorder}`,borderRadius:8,padding:"8px 16px",color:C.text,fontSize:13,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",gap:7,transition:"border-color 0.15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.text} onMouseLeave={e=>e.currentTarget.style.borderColor=C.inputBorder}>
                <svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 5l3 3 3-3M1 10h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                Open
              </button>
            </div>
          </div>

          {/* Profiles section */}
          <div style={{background:C.surface,border:C.border,borderRadius:12,overflow:"hidden",maxWidth:560,marginTop:20,marginBottom:40}}>
            <div style={{padding:"10px 18px",borderBottom:C.border,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",color:C.muted,textTransform:"uppercase"}}>Profiles</span>
              <button onClick={()=>{setShowAddProfile(p=>!p);setApName("");setApPin("");setApColor(PROFILE_COLORS[0]);setApError("");}} style={{background:"none",border:`0.5px solid ${C.inputBorder}`,borderRadius:6,padding:"4px 10px",fontSize:11,color:C.text,cursor:"pointer"}}>+ Add</button>
            </div>
            {showAddProfile&&(
              <div style={{padding:"16px 18px",borderBottom:C.border,background:C.elevated}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                  <div style={{width:44,height:44,borderRadius:9,background:apColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#000",fontWeight:700,flexShrink:0}}>
                    {apName.trim()?apName.trim()[0].toUpperCase():"?"}
                  </div>
                  <input value={apName} onChange={e=>setApName(e.target.value)} placeholder="Name (e.g. Mom, Dad, Nick)" autoFocus style={{flex:1,background:C.surface,border:`0.5px solid ${C.inputBorder}`,borderRadius:7,color:C.text,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
                </div>
                <div style={{display:"flex",gap:6,marginBottom:12}}>
                  {PROFILE_COLORS.map(col=>(
                    <div key={col} onClick={()=>setApColor(col)} style={{width:22,height:22,borderRadius:5,background:col,cursor:"pointer",border:apColor===col?`2px solid ${C.text}`:"2px solid transparent",transition:"border 0.1s"}}/>
                  ))}
                </div>
                <input type="tel" value={apPin} onChange={e=>setApPin(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="PIN (optional, 4 digits)" style={{width:"100%",background:C.surface,border:`0.5px solid ${C.inputBorder}`,borderRadius:7,color:C.text,padding:"7px 10px",fontSize:13,outline:"none",fontFamily:"inherit",marginBottom:10}}/>
                {apError&&<div style={{fontSize:11,color:"#e05555",marginBottom:8}}>{apError}</div>}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={addProfile} style={{background:C.amber,border:"none",borderRadius:7,padding:"7px 18px",color:"#000",fontSize:12,fontWeight:600,cursor:"pointer"}}>Create</button>
                  <button onClick={()=>setShowAddProfile(false)} style={{background:"none",border:`0.5px solid ${C.inputBorder}`,borderRadius:7,padding:"7px 14px",color:C.muted,fontSize:12,cursor:"pointer"}}>Cancel</button>
                </div>
              </div>
            )}
            {allUsers.map((u,i)=>(
              <div key={u.email} style={{padding:"12px 18px",display:"flex",alignItems:"center",gap:12,borderBottom:i<allUsers.length-1?C.border:"none"}}>
                <div style={{width:38,height:38,borderRadius:8,background:u.color||C.amber,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"#000",fontWeight:700,flexShrink:0}}>
                  {u.name[0].toUpperCase()}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:500,color:C.text}}>{u.name}</div>
                  <div style={{fontSize:11,color:C.muted}}>{u.pin?"PIN protected":u.password?"Password protected":"No lock"}</div>
                </div>
                {u.email===user.email
                  ?<span style={{fontSize:11,color:C.muted,fontStyle:"italic"}}>You</span>
                  :<button onClick={()=>removeProfile(u.email)} style={{background:"none",border:`0.5px solid #e0555540`,borderRadius:6,padding:"4px 10px",fontSize:11,color:"#e05555",cursor:"pointer"}}>Remove</button>
                }
              </div>
            ))}
          </div>
        </div>
      );
    };

    const Header=({onSearch,user,logout,onData,onSettings})=>{
      const [sh,setSh]=useState(false);
      const [open,setOpen]=useState(false);
      const menuRef=useRef(null);
      useEffect(()=>{
        if(!open)return;
        const h=(e)=>{if(menuRef.current&&!menuRef.current.contains(e.target))setOpen(false);};
        document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
      },[open]);
      return(<div style={{display:"flex",alignItems:"center",padding:"0 24px",height:62,flexShrink:0,borderBottom:C.border,background:C.surface,position:"relative",WebkitAppRegion:"drag"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flex:1,WebkitAppRegion:"drag"}}>
          <AppLogo size={36}/>
          <div style={{fontFamily:"'DM Serif Display',serif",fontSize:25,color:C.amber,letterSpacing:"-0.01em",WebkitAppRegion:"drag"}}>TV Stats</div>
        </div>
        <button onClick={onSearch} onMouseEnter={()=>setSh(true)} onMouseLeave={()=>setSh(false)} style={{position:"absolute",left:"50%",transform:"translateX(-50%)",display:"flex",alignItems:"center",gap:7,background:sh?C.elevated:C.surface,border:sh?`0.5px solid ${C.hover}`:`0.5px solid ${C.hover}`,borderRadius:99,padding:"8px 22px",color:sh?"#aaa":C.muted,fontSize:12,fontWeight:600,letterSpacing:"0.14em",cursor:"pointer",transition:"all 0.15s"}}><SearchIcon size={13} color={sh?"#aaa":C.muted}/>SEARCH</button>
        <div style={{flex:1,display:"flex",justifyContent:"flex-end",alignItems:"center",gap:10,WebkitAppRegion:"no-drag"}}>
          {user&&<div ref={menuRef} style={{position:"relative",WebkitAppRegion:"no-drag"}}>
            <button onClick={()=>setOpen(o=>!o)} style={{background:"none",border:`0.5px solid ${C.hover}`,borderRadius:6,padding:"6px 12px",color:open?C.text:C.muted,fontSize:12.5,cursor:"pointer",transition:"color 0.12s",display:"flex",alignItems:"center",gap:5}} onMouseEnter={e=>e.currentTarget.style.color=C.text} onMouseLeave={e=>{if(!open)e.currentTarget.style.color=C.muted;}}>
              {user.name}
              <svg width="9" height="9" viewBox="0 0 10 10" fill="none" style={{transform:open?"rotate(180deg)":"none",transition:"transform 0.15s"}}><path d="M2 3.5l3 3 3-3" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </button>
            {open&&<div style={{position:"absolute",top:"calc(100% + 6px)",right:0,background:C.elevated,border:C.border,borderRadius:8,overflow:"hidden",minWidth:140,zIndex:200,boxShadow:`0 8px 24px ${C.shadow}`}}>
              <div onClick={()=>{setOpen(false);onSettings();}} style={{padding:"9px 14px",fontSize:12,color:C.text,cursor:"pointer",transition:"background 0.1s"}} onMouseEnter={e=>e.currentTarget.style.background=C.hover} onMouseLeave={e=>e.currentTarget.style.background="none"}>Settings</div>
              <div style={{height:"0.5px",background:C.hover}}/>
              <div onClick={()=>{setOpen(false);logout();}} style={{padding:"9px 14px",fontSize:12,color:"#e06c6c",cursor:"pointer",transition:"background 0.1s"}} onMouseEnter={e=>e.currentTarget.style.background=C.hover} onMouseLeave={e=>e.currentTarget.style.background="none"}>Sign out</div>
            </div>}
          </div>}
        </div>
      </div>);
    };

    // ── Navbar ───────────────────────────────────────────────────────────────
    const Navbar=({active,setActive,zoom,onZoomOut,onZoomIn,onZoomReset,canGoBack,canGoForward,onGoBack,onGoForward})=>{
      const groups=[[NAV_TABS[0],NAV_TABS[1]],[NAV_TABS[2],NAV_TABS[3],NAV_TABS[4]],[NAV_TABS[5],NAV_TABS[6],NAV_TABS[7]]];
      const zBtn={background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:15,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:4,padding:0,lineHeight:1};
      const navArrowBase={background:"none",border:"none",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:6,padding:0,lineHeight:1,flexShrink:0,transition:"color 0.13s"};
      const navBtn=(enabled)=>({...navArrowBase,color:enabled?C.text:C.muted,cursor:enabled?"pointer":"default"});
      return(<div style={{display:"flex",alignItems:"center",height:48,flexShrink:0,padding:"0 24px",borderBottom:C.border,background:C.surface}}>
        <div style={{display:"flex",alignItems:"center",gap:2,marginRight:8}}>
          <button style={navBtn(canGoBack)} onClick={onGoBack} disabled={!canGoBack} title="Go back"><ChevronLeft size={26}/></button>
          <button style={navBtn(canGoForward)} onClick={onGoForward} disabled={!canGoForward} title="Go forward"><ChevronRight size={26}/></button>
        </div>
        <div style={{width:"0.5px",height:18,background:C.hover,marginRight:12}}/>
        <div style={{display:"flex",alignItems:"center",flex:1}}>
          {groups.map((grp,gi)=>(<div key={gi} style={{display:"flex",alignItems:"center"}}>{gi>0&&<div style={{width:"0.5px",height:18,background:C.hover,margin:"0 12px"}}/>}{grp.map(tab=>{const on=active===tab.id;return(<button key={tab.id} onClick={()=>setActive(tab.id)} style={{background:"none",border:"none",padding:"5px 13px",fontSize:13.5,fontWeight:on?600:400,color:on?tab.color:C.muted,cursor:"pointer",position:"relative",transition:"color 0.13s"}}>{tab.label}{on&&<div style={{position:"absolute",bottom:-5,left:13,right:13,height:1.5,background:tab.color,borderRadius:99}}/>}</button>);})}</div>))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:2}}>
          <button style={zBtn} onClick={onZoomOut} title="Zoom out">−</button>
          <button onClick={onZoomReset} title="Reset zoom" style={{...zBtn,width:"auto",padding:"0 4px",fontSize:11.5,color:C.muted,fontVariantNumeric:"tabular-nums",minWidth:38}}>{Math.round(zoom*100)}%</button>
          <button style={zBtn} onClick={onZoomIn} title="Zoom in">+</button>
        </div>
      </div>);
    };

    // ── Core Trakt sync algorithm (shared by auto-sync and manual Sync Now) ────
    // Returns {newDates, newItems, movies, episodes}. Throws on API failure.
    // onProgress(stage, data): stage='fetching' data={movies,episodes}
    //                           stage='enriching' data={done,total}
    const runTraktSync=async(token,creds,watched,setWatched,onProgress)=>{
      const TAPI='https://api.trakt.tv';
      const sleep=ms=>new Promise(r=>setTimeout(r,ms));
      const hdrs={'Authorization':`Bearer ${token.access_token}`,'trakt-api-version':'2','trakt-api-key':creds.clientId,'Content-Type':'application/json'};

      const lastSync=localStorage.getItem('tvstats_trakt_last_sync');
      const sinceParam=lastSync?`&start_at=${encodeURIComponent(lastSync)}`:'';

      const fetchAll=async(type,onUpdate)=>{
        const items=[];let page=1,totalPages=1;
        do{
          const r=await fetch(`${TAPI}/sync/history/${type}?limit=1000&page=${page}${sinceParam}`,{headers:hdrs});
          if(!r.ok)throw new Error(`Trakt ${type} history returned ${r.status}`);
          totalPages=parseInt(r.headers.get('X-Pagination-Page-Count')||'1');
          const data=await r.json();
          items.push(...data);
          onUpdate(items.length);
          page++;if(page<=totalPages)await sleep(150);
        }while(page<=totalPages);
        return items;
      };

      const movies=await fetchAll('movies',n=>onProgress?.('fetching',{movies:n,episodes:0}));
      const episodes=await fetchAll('episodes',n=>onProgress?.('fetching',{movies:movies.length,episodes:n}));

      console.log(`Trakt returned ${movies.length+episodes.length} new items (${movies.length} movies, ${episodes.length} episodes).${lastSync?' Since: '+lastSync:' Full sync.'}`);
      if(movies.length===0&&episodes.length===0){
        console.log('Trakt returned 0 new items. Sync complete.');
        localStorage.setItem('tvstats_trakt_last_sync',new Date().toISOString());
        return{newDates:0,newItems:0,movies:0,episodes:0};
      }

      // Group each item key → all watched_at timestamps from Trakt
      const movieDates=new Map();
      movies.forEach(e=>{
        const id=e.movie?.ids?.tmdb;if(!id)return;
        const key=String(id),wa=new Date(e.watched_at).toISOString();
        if(!movieDates.has(key))movieDates.set(key,{dates:new Set(),entry:e});
        movieDates.get(key).dates.add(wa);
      });
      const epDates=new Map();
      episodes.forEach(e=>{
        const sid=e.show?.ids?.tmdb,s=e.episode?.season,n=e.episode?.number;
        if(!sid||s==null||n==null)return;
        const key=`ep-${sid}-${s}-${n}`,wa=new Date(e.watched_at).toISOString();
        if(!epDates.has(key))epDates.set(key,{dates:new Set(),entry:e});
        epDates.get(key).dates.add(wa);
      });

      const total=movieDates.size+epDates.size;
      onProgress?.('enriching',{done:0,total});
      let done=0,newDates=0,newItems=0;
      const updates=new Map();

      // Movie keys in watched may be numbers (UI) or strings (old import) — try both
      const findEx=key=>{
        if(watched.has(key))return[key,watched.get(key)];
        const n=Number(key);
        return(!isNaN(n)&&watched.has(n))?[n,watched.get(n)]:[null,null];
      };

      // Movies in batches of 10
      const mKeys=[...movieDates.keys()];
      for(let i=0;i<mKeys.length;i+=10){
        await Promise.all(mKeys.slice(i,i+10).map(async key=>{
          const {dates:td}=movieDates.get(key);
          const [exKey,ex]=findEx(key);
          if(ex){
            // Master Archive Rule: only append timestamps not already in dates
            const existing=new Set(ex.dates||(ex.date?[ex.date]:[]));
            const fresh=[...td].filter(d=>!existing.has(d));
            if(fresh.length){const all=[...existing,...fresh].sort();updates.set(exKey,{...ex,dates:all,date:all[0]});newDates+=fresh.length;}
          }else{
            try{const d=await api(`/movie/${key}`);if(d?.id){const s=[...td].sort();updates.set(key,{item:{...d,media_type:'movie'},date:s[0],dates:s});newItems++;newDates+=s.length;}}catch{}
          }
          done++;onProgress?.('enriching',{done,total});
        }));
        if(i+10<mKeys.length)await sleep(120);
      }

      // Pre-fetch show details for new episodes only
      const showCache=new Map();
      const newEpKeys=[...epDates.keys()].filter(k=>!watched.has(k));
      const uniqueShows=[...new Set(newEpKeys.map(k=>k.split('-')[1]))];
      for(let i=0;i<uniqueShows.length;i+=10){
        await Promise.all(uniqueShows.slice(i,i+10).map(async sid=>{try{const d=await api(`/tv/${sid}`);if(d?.id)showCache.set(sid,d);}catch{}}));
        if(i+10<uniqueShows.length)await sleep(120);
      }

      // Episodes in batches of 10
      const eKeys=[...epDates.keys()];
      for(let i=0;i<eKeys.length;i+=10){
        await Promise.all(eKeys.slice(i,i+10).map(async key=>{
          const {dates:td}=epDates.get(key);
          const ex=watched.get(key);
          if(ex){
            const existing=new Set(ex.dates||(ex.date?[ex.date]:[]));
            const fresh=[...td].filter(d=>!existing.has(d));
            if(fresh.length){const all=[...existing,...fresh].sort();updates.set(key,{...ex,dates:all,date:all[0]});newDates+=fresh.length;}
          }else{
            const[,showId,season,epNum]=key.split('-');
            const show=showCache.get(showId);
            try{
              const epData=await api(`/tv/${showId}/season/${season}/episode/${epNum}`);
              if(epData&&show){const s=[...td].sort();updates.set(key,{item:{...epData,media_type:'episode',showId:show.id,showName:show.name,showPoster:show.poster_path,showBackdrop:show.backdrop_path},date:s[0],dates:s});newItems++;newDates+=s.length;}
            }catch{}
          }
          done++;onProgress?.('enriching',{done,total});
        }));
        if(i+10<eKeys.length)await sleep(120);
      }

      // Invalidate metadata cache for every show/movie touched by this sync
      if(updates.size>0){
        const affectedShows=new Set();const affectedMovies=new Set();
        updates.forEach((_,k)=>{if(typeof k==="string"&&k.startsWith("ep-"))affectedShows.add(k.split("-")[1]);else affectedMovies.add(String(k));});
        affectedShows.forEach(sid=>{
          localStorage.removeItem(MC_PFX+"tv_"+sid);
          for(let i=localStorage.length-1;i>=0;i--){const k=localStorage.key(i);if(k&&k.startsWith(MC_PFX+"season_"+sid+"_"))localStorage.removeItem(k);}
        });
        affectedMovies.forEach(mid=>localStorage.removeItem(MC_PFX+"movie_"+mid));
        setWatched(prev=>{const n=new Map(prev);updates.forEach((v,k)=>n.set(k,v));return n;});
      }
      localStorage.setItem('tvstats_trakt_last_sync',new Date().toISOString());
      return{newDates,newItems,movies:movies.length,episodes:episodes.length};
    };

    // ── Trakt Live Sync Tab ───────────────────────────────────────────────────
    const TraktSyncTab=({watched,setWatched,autoSyncStatus=''})=>{
      const TAPI='https://api.trakt.tv';
      const REDIR='tvstats://trakt/callback';
      const sleep=ms=>new Promise(r=>setTimeout(r,ms));

      const creds={clientId:TRAKT_CLIENT_ID,clientSecret:TRAKT_CLIENT_SECRET};

      const [token,setToken]=useState(()=>{try{return JSON.parse(localStorage.getItem('tvstats_trakt_token')||'null');}catch{return null;}});
      const [phase,setPhase]=useState('idle'); // idle | auth-waiting | syncing | done | error
      const [fetching,setFetching]=useState({movies:0,episodes:0});
      const [prog,setProg]=useState({done:0,total:0});
      const [result,setResult]=useState(null);
      const [errMsg,setErrMsg]=useState('');
      const lastSync=localStorage.getItem('tvstats_trakt_last_sync');
      const isExpired=token&&new Date(token.expires_at)<new Date();

      // Register a global JS function for Swift to call after the OAuth redirect
      useEffect(()=>{
        window.__traktHandleAuthCode=async code=>{
          try{
            const r=await fetch(`${TAPI}/oauth/token`,{
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body:JSON.stringify({code,client_id:TRAKT_CLIENT_ID,client_secret:TRAKT_CLIENT_SECRET,redirect_uri:REDIR,grant_type:'authorization_code'})
            });
            if(!r.ok){setErrMsg(`Token exchange failed (${r.status})`);setPhase('error');return;}
            const d=await r.json();
            const tok={...d,expires_at:new Date(Date.now()+d.expires_in*1000).toISOString()};
            localStorage.setItem('tvstats_trakt_token',JSON.stringify(tok));
            setToken(tok);setPhase('idle');
          }catch(e){setErrMsg('Connection failed: '+e.message);setPhase('error');}
        };
        return()=>{delete window.__traktHandleAuthCode;};
      },[]);

      const connect=()=>{
        setPhase('auth-waiting');
        const url=`https://trakt.tv/oauth/authorize?response_type=code&client_id=${encodeURIComponent(TRAKT_CLIENT_ID)}&redirect_uri=${encodeURIComponent(REDIR)}&state=tvstats`;
        window.webkit?.messageHandlers?.openURL?.postMessage(url);
      };

      const disconnect=()=>{
        localStorage.removeItem('tvstats_trakt_token');
        setToken(null);setPhase('idle');setResult(null);setErrMsg('');
      };

      const doSync=async()=>{
        if(!token||!creds)return;
        setPhase('syncing');setResult(null);setErrMsg('');
        setFetching({movies:0,episodes:0});setProg({done:0,total:0});
        try{
          const r=await runTraktSync(token,creds,watched,setWatched,(stage,data)=>{
            if(stage==='fetching')setFetching(data);
            else setProg(data);
          });
          setResult({...r});setPhase('done');
        }catch(e){setErrMsg('Sync failed: '+e.message);setPhase('error');}
      };

      const pct=prog.total>0?Math.round(prog.done/prog.total*100):0;

      // ── Waiting for browser authorization ──────────────────────────────
      if(phase==='auth-waiting')return(
        <div style={{textAlign:'center',padding:'24px 0'}}>
          <div style={{fontSize:32,marginBottom:14}}>🌐</div>
          <div style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:8}}>Authorize in your browser</div>
          <div style={{fontSize:12,color:C.muted,lineHeight:1.7}}>Complete the Trakt login in your browser. The app will update automatically once you approve.</div>
          <button onClick={()=>setPhase('idle')} style={{marginTop:20,padding:'8px 20px',borderRadius:8,background:'none',border:C.border,color:C.muted,fontSize:12,cursor:'pointer'}}>Cancel</button>
        </div>
      );

      // ── Syncing ────────────────────────────────────────────────────────
      if(phase==='syncing')return(
        <div style={{padding:'8px 0'}}>
          {prog.total===0?(
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:13,color:C.text,marginBottom:12}}>Fetching history from Trakt…</div>
              <div style={{fontSize:12,color:C.muted}}>{fetching.movies.toLocaleString()} movie plays · {fetching.episodes.toLocaleString()} episode plays</div>
            </div>
          ):(
            <div>
              <div style={{fontSize:13,color:C.text,marginBottom:14,textAlign:'center'}}>Enriching with TMDB data…</div>
              <div style={{background:C.elevated,borderRadius:99,height:6,marginBottom:10,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct}%`,background:C.amber,borderRadius:99,transition:'width 0.3s ease'}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{fontSize:11,color:C.muted}}>{prog.done} / {prog.total} items</span>
                <span style={{fontSize:11,color:C.muted}}>{pct}%</span>
              </div>
            </div>
          )}
        </div>
      );

      // ── Done ───────────────────────────────────────────────────────────
      if(phase==='done'&&result)return(
        <div style={{textAlign:'center',padding:'12px 0'}}>
          <div style={{fontSize:32,marginBottom:14}}>✅</div>
          <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:10}}>Sync complete</div>
          <div style={{fontSize:12,color:C.muted,lineHeight:2,marginBottom:16}}>
            <div>Found <span style={{color:C.text,fontWeight:600}}>{result.movies.toLocaleString()}</span> movie plays · <span style={{color:C.text,fontWeight:600}}>{result.episodes.toLocaleString()}</span> episode plays on Trakt</div>
            {result.newItems>0&&<div><span style={{color:C.green,fontWeight:600}}>{result.newItems}</span> new item{result.newItems!==1?'s':''} added to history</div>}
            {result.newDates>0&&<div><span style={{color:C.blue,fontWeight:600}}>{result.newDates}</span> new watch date{result.newDates!==1?'s':''} added</div>}
            {result.newDates===0&&result.newItems===0&&<div style={{fontStyle:'italic'}}>Everything was already up to date</div>}
          </div>
          <button onClick={()=>setPhase('idle')} style={{padding:'9px 32px',borderRadius:8,background:C.amber,border:'none',color:'#000',fontSize:13,fontWeight:700,cursor:'pointer'}}>Done</button>
        </div>
      );

      // ── Error ──────────────────────────────────────────────────────────
      if(phase==='error')return(
        <div style={{textAlign:'center',padding:'12px 0'}}>
          <div style={{fontSize:32,marginBottom:14}}>⚠️</div>
          <div style={{fontSize:13,color:C.text,marginBottom:20,lineHeight:1.6}}>{errMsg}</div>
          <button onClick={()=>setPhase('idle')} style={{padding:'9px 24px',borderRadius:8,background:C.elevated,border:C.border,color:C.text,fontSize:13,cursor:'pointer'}}>Try again</button>
        </div>
      );

      // ── Not connected (or session expired) ─────────────────────────────
      if(!token||isExpired)return(
        <div>
          <div style={{fontSize:12,color:C.muted,marginBottom:16,lineHeight:1.7}}>
            Link your Trakt account to automatically sync your watch history every time you open TV Stats. Tap <strong>Connect</strong> below to get started.
          </div>
          {isExpired&&<div style={{fontSize:12,color:'#e87a7a',marginBottom:14,padding:'8px 12px',background:'#e87a7a14',borderRadius:8}}>Your Trakt session has expired. Please reconnect.</div>}
          <button onClick={connect} style={{padding:'9px 24px',borderRadius:8,background:C.amber,border:'none',color:'#000',fontSize:13,fontWeight:700,cursor:'pointer'}}>Connect to Trakt</button>
        </div>
      );

      // ── Connected + idle ───────────────────────────────────────────────
      return(
        <div>
          <div style={{background:C.elevated,borderRadius:10,padding:'14px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:10}}>
            {autoSyncStatus==='syncing'
              ?<div style={{width:10,height:10,borderRadius:'50%',border:`1.5px solid ${C.muted}`,borderTopColor:C.amber,animation:'spin 0.8s linear infinite',flexShrink:0}}/>
              :<div style={{width:8,height:8,borderRadius:99,background:C.green,flexShrink:0}}/>
            }
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:C.text}}>Connected to Trakt</div>
              {autoSyncStatus==='syncing'
                ?<div style={{fontSize:11,color:C.muted,marginTop:2}}>Auto-sync in progress…</div>
                :<div style={{fontSize:11,color:C.muted,marginTop:2}}>{lastSync?`Last synced ${new Date(lastSync).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}`:'Syncs automatically on launch'}</div>
              }
            </div>
            <button onClick={disconnect} style={{padding:'5px 12px',borderRadius:6,background:'none',border:`0.5px solid ${C.hover}`,color:C.muted,fontSize:11,cursor:'pointer'}}>Disconnect</button>
          </div>
          <div style={{fontSize:12,color:C.muted,marginBottom:16,lineHeight:1.7}}>
            Your watch history syncs automatically each time you open TV Stats.
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <button onClick={doSync} style={{padding:'9px 28px',borderRadius:8,background:C.amber,border:'none',color:'#000',fontSize:13,fontWeight:700,cursor:'pointer'}}>Sync Now</button>
            <button onClick={()=>{localStorage.removeItem('tvstats_trakt_last_sync');doSync();}} style={{padding:'9px 20px',borderRadius:8,background:'none',border:C.border,color:C.muted,fontSize:12,cursor:'pointer'}}>Full Sync</button>
          </div>
        </div>
      );
    };

    // ── Data Modal (Trakt Import + Backup/Restore) ───────────────────────────
    const TraktImportModal=({onClose,setWatched,watched,watchlist,setWatchlist,user,autoSyncStatus=''})=>{
      const [tab,setTab]=useState("trakt"); // "trakt" | "backup"
      const [phase,setPhase]=useState("idle"); // idle | fetching | done | error
      useEffect(()=>{const h=e=>{if(e.key==="Escape"&&phase!=="fetching"){e.preventDefault();onClose();}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[onClose,phase]);
      const [done,setDone]=useState(0);
      const [total,setTotal]=useState(0);
      const [importedCount,setImportedCount]=useState(0);
      const [skippedCount,setSkippedCount]=useState(0);
      const [errMsg,setErrMsg]=useState("");
      const [dragOver,setDragOver]=useState(false);
      const fileRef=useRef(null);

      const parseFiles=async(fileList)=>{
        const entries=[];
        for(const file of fileList){
          try{
            const text=await file.text();
            const data=JSON.parse(text);
            if(Array.isArray(data))entries.push(...data);
          }catch{}
        }
        return entries;
      };

      const sleep=ms=>new Promise(r=>setTimeout(r,ms));

      const runImport=async(files)=>{
        setPhase("fetching");
        setDone(0);setTotal(0);setImportedCount(0);setSkippedCount(0);
        try{
          const entries=await parseFiles([...files]);
          if(!entries.length){setErrMsg("No valid Trakt history entries found in the selected files.");setPhase("error");return;}

          // Deduplicate movies by TMDB id (keep first occurrence)
          const movieMap=new Map();
          entries.filter(e=>e.type==="movie"&&e.movie?.ids?.tmdb).forEach(e=>{
            const id=String(e.movie.ids.tmdb);
            if(!movieMap.has(id))movieMap.set(id,e);
          });

          // Deduplicate episodes by key (keep first occurrence)
          const epMap=new Map();
          entries.filter(e=>e.type==="episode"&&e.show?.ids?.tmdb&&e.episode?.season!=null&&e.episode?.number!=null).forEach(e=>{
            const key=`ep-${e.show.ids.tmdb}-${e.episode.season}-${e.episode.number}`;
            if(!epMap.has(key))epMap.set(key,e);
          });

          const tot=movieMap.size+epMap.size;
          setTotal(tot);
          if(!tot){setErrMsg("No movies or episodes with TMDB IDs were found. Make sure you're uploading Trakt's watched_movies.json or watched_shows.json.");setPhase("error");return;}

          const newEntries=new Map();
          let imp=0,skip=0;

          // ── Movies ──────────────────────────────────────────────────────
          const movieEntries=[...movieMap.entries()];
          for(let i=0;i<movieEntries.length;i+=10){
            await Promise.all(movieEntries.slice(i,i+10).map(async([id,entry])=>{
              try{
                const data=await api(`/movie/${id}`);
                if(data?.id){
                  const watchedAt=entry.watched_at?new Date(entry.watched_at.replace(" UTC","Z")).toISOString():new Date().toISOString();
                  newEntries.set(id,{item:{...data,media_type:"movie"},date:watchedAt,dates:[watchedAt]});
                  imp++;
                }else skip++;
              }catch{skip++;}
              setDone(d=>d+1);
            }));
            if(i+10<movieEntries.length)await sleep(120);
          }

          // ── Shows: pre-fetch unique show details ──────────────────────
          const showCache=new Map();
          const uniqueShowIds=[...new Set([...epMap.values()].map(e=>String(e.show.ids.tmdb)))];
          for(let i=0;i<uniqueShowIds.length;i+=10){
            await Promise.all(uniqueShowIds.slice(i,i+10).map(async showId=>{
              try{const d=await api(`/tv/${showId}`);if(d?.id)showCache.set(showId,d);}catch{}
            }));
            if(i+10<uniqueShowIds.length)await sleep(120);
          }

          // ── Episodes ─────────────────────────────────────────────────
          const epEntries=[...epMap.entries()];
          for(let i=0;i<epEntries.length;i+=10){
            await Promise.all(epEntries.slice(i,i+10).map(async([key,entry])=>{
              const showId=String(entry.show.ids.tmdb);
              const show=showCache.get(showId);
              try{
                const epData=await api(`/tv/${showId}/season/${entry.episode.season}/episode/${entry.episode.number}`);
                if(epData&&show){
                  const watchedAt=entry.watched_at?new Date(entry.watched_at.replace(" UTC","Z")).toISOString():new Date().toISOString();
                  newEntries.set(key,{item:{...epData,media_type:"episode",showId:show.id,showName:show.name,showPoster:show.poster_path,showBackdrop:show.backdrop_path},date:watchedAt,dates:[watchedAt]});
                  imp++;
                }else skip++;
              }catch{skip++;}
              setDone(d=>d+1);
            }));
            if(i+10<epEntries.length)await sleep(120);
          }

          // Merge into watched — don't overwrite existing entries
          setWatched(prev=>{
            const merged=new Map(prev);
            newEntries.forEach((v,k)=>{if(!merged.has(k))merged.set(k,v);});
            return merged;
          });
          setImportedCount(imp);setSkippedCount(skip);
          setPhase("done");
        }catch(e){setErrMsg("Unexpected error: "+e.message);setPhase("error");}
      };

      const handleDrop=e=>{
        e.preventDefault();setDragOver(false);
        const files=[...e.dataTransfer.files].filter(f=>f.name.endsWith(".json"));
        if(files.length)runImport(files);
      };
      const handleChange=e=>{const files=[...e.target.files];if(files.length)runImport(files);};
      const pct=total>0?Math.round(done/total*100):0;

      // ── Backup / Restore state ─────────────────────────────────────────────
      const backupFileRef=useRef(null);
      const [backupMsg,setBackupMsg]=useState("");
      const [backupError,setBackupError]=useState("");

      const exportBackup=()=>{
        const data={
          version:1,
          exportedAt:new Date().toISOString(),
          user:user?{name:user.name,email:user.email}:null,
          watched:Array.from(watched.entries()),
          watchlist:Array.from(watchlist.entries()),
        };
        const json=JSON.stringify(data,null,2);
        const dateStr=new Date().toISOString().slice(0,10);
        const safeName=(user?.name||"backup").toLowerCase().replace(/[^a-z0-9]+/g,"-");
        const filename=`tvstats-backup-${safeName}-${dateStr}.json`;
        if(window.webkit?.messageHandlers?.saveBackup){
          window.webkit.messageHandlers.saveBackup.postMessage(JSON.stringify({filename,data:json}));
          setBackupMsg(`Save dialog opened — ${watched.size} watched items, ${watchlist.size} watchlist items.`);
        } else {
          const blob=new Blob([json],{type:"application/json"});
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");
          a.href=url;
          a.download=filename;
          a.click();
          URL.revokeObjectURL(url);
          setBackupMsg(`Backup saved — ${watched.size} watched items, ${watchlist.size} watchlist items.`);
        }
        setBackupError("");
      };

      const restoreBackup=async(file)=>{
        setBackupMsg("");setBackupError("");
        try{
          const text=await file.text();
          const data=JSON.parse(text);
          if(!data||(!data.watched&&!data.watchlist)){setBackupError("File doesn't look like a TV Stats backup.");return;}
          if(data.watched){
            const m=new Map(data.watched);
            setWatched(m);
          }
          if(data.watchlist){
            const m=new Map(data.watchlist);
            setWatchlist(m);
          }
          const wCount=data.watched?.length||0;
          const wlCount=data.watchlist?.length||0;
          setBackupMsg(`Restored ${wCount} watched items and ${wlCount} watchlist items.`);
        }catch(e){setBackupError("Could not read backup file: "+e.message);}
      };

      const BackupTab=()=>(
        <div>
          <div style={{fontSize:12,color:C.muted,marginBottom:20,lineHeight:1.7}}>
            Export your data as a JSON file to keep it safe. If you ever rebuild or reinstall the app, use <span style={{color:C.text}}>Restore</span> to bring everything back.
          </div>

          {/* Export */}
          <div style={{background:C.elevated,borderRadius:10,padding:"18px 20px",marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>Export Backup</div>
            <div style={{fontSize:11,color:C.muted,marginBottom:14}}>{watched.size} watched · {watchlist.size} in watchlist</div>
            <button onClick={exportBackup} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 20px",borderRadius:8,background:C.amber,border:"none",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer"}}>
              <svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M6 1v7M3 5l3 3 3-3M1 10h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Download Backup
            </button>
          </div>

          {/* Restore */}
          <div style={{background:C.elevated,borderRadius:10,padding:"18px 20px",marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>Restore from Backup</div>
            <div style={{fontSize:11,color:C.muted,marginBottom:14}}>Merges backup data with any existing data.</div>
            <button onClick={()=>backupFileRef.current?.click()} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 20px",borderRadius:8,background:C.elevated,border:C.border,color:C.text,fontSize:13,fontWeight:600,cursor:"pointer"}}>
              <svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M6 8V1M3 4l3-3 3 3M1 10h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              Choose Backup File
            </button>
            <input ref={backupFileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)restoreBackup(f);e.target.value="";}}/>
          </div>

          {backupMsg&&<div style={{fontSize:12,color:C.green,padding:"8px 12px",background:`${C.green}14`,borderRadius:8,marginBottom:8}}>{backupMsg}</div>}
          {backupError&&<div style={{fontSize:12,color:"#e87a7a",padding:"8px 12px",background:"#e87a7a14",borderRadius:8,marginBottom:8}}>{backupError}</div>}
        </div>
      );

      return(
        <div style={{position:"fixed",inset:0,background:C.overlay,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={phase==="fetching"?undefined:onClose}>
          <div style={{background:C.surface,borderRadius:14,padding:32,width:480,border:C.border,animation:"fadeIn 0.15s ease",boxShadow:`0 24px 64px ${C.shadow}`}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div style={{display:"flex",gap:0,background:C.elevated,borderRadius:8,padding:3}}>
                {[["trakt","Import JSON"],["trakt-sync","Trakt Sync"],["backup","Backup & Restore"]].map(([id,label])=>(
                  <button key={id} onClick={()=>{if(phase!=="fetching")setTab(id);}} style={{padding:"5px 14px",borderRadius:6,border:"none",background:tab===id?C.surface:"transparent",color:tab===id?C.text:C.muted,fontSize:12,fontWeight:tab===id?600:400,cursor:"pointer",transition:"all 0.13s"}}>{label}</button>
                ))}
              </div>
              {phase!=="fetching"&&<button onClick={onClose} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:20,lineHeight:1,padding:"0 2px"}}>×</button>}
            </div>

            {tab==="backup"&&<BackupTab/>}
            {tab==="trakt-sync"&&<TraktSyncTab watched={watched} setWatched={setWatched} autoSyncStatus={autoSyncStatus}/>}

            {tab==="trakt"&&<>
              {phase==="idle"&&(<>
                <div style={{fontSize:12,color:C.muted,marginBottom:20,lineHeight:1.7}}>
                  On Trakt: go to <span style={{color:C.amber,fontWeight:500}}>Settings → Data → Export Data</span>. Unzip the download, then upload your <span style={{color:C.text}}>watched_movies.json</span> and/or <span style={{color:C.text}}>watched_shows.json</span> files below.
                </div>
                <div
                  onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                  onDragLeave={()=>setDragOver(false)}
                  onDrop={handleDrop}
                  onClick={()=>fileRef.current?.click()}
                  style={{border:`1.5px dashed ${dragOver?C.text:C.hover}`,borderRadius:10,padding:"36px 24px",textAlign:"center",cursor:"pointer",background:dragOver?C.elevated:"transparent",transition:"all 0.15s"}}
                >
                  <div style={{fontSize:30,marginBottom:8}}>📂</div>
                  <div style={{fontSize:13,color:C.text,marginBottom:4,fontWeight:500}}>Drop JSON files here</div>
                  <div style={{fontSize:11,color:C.muted}}>or click to browse — multiple files supported</div>
                  <input ref={fileRef} type="file" accept=".json" multiple style={{display:"none"}} onChange={handleChange}/>
                </div>
              </>)}

              {phase==="fetching"&&(
                <div style={{padding:"12px 0"}}>
                  <div style={{fontSize:13,color:C.text,marginBottom:20,textAlign:"center"}}>Fetching details from TMDB…</div>
                  <div style={{background:C.elevated,borderRadius:99,height:6,marginBottom:10,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:C.amber,borderRadius:99,transition:"width 0.4s ease"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontSize:11,color:C.muted}}>{done} / {total} items</span>
                    <span style={{fontSize:11,color:C.muted}}>{pct}%</span>
                  </div>
                </div>
              )}

              {phase==="done"&&(
                <div style={{textAlign:"center",padding:"12px 0"}}>
                  <div style={{fontSize:36,marginBottom:14}}>✅</div>
                  <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:8}}>Import complete</div>
                  <div style={{fontSize:13,color:C.muted,marginBottom:6}}>
                    <span style={{color:C.green,fontWeight:600}}>{importedCount}</span> item{importedCount!==1?"s":""} added to your history
                  </div>
                  {skippedCount>0&&<div style={{fontSize:12,color:C.muted,marginBottom:8}}>{skippedCount} skipped (not found on TMDB)</div>}
                  <div style={{fontSize:11,color:C.muted,marginBottom:20,padding:"8px 12px",background:C.elevated,borderRadius:8}}>Your data is now saved automatically — it will survive app rebuilds.</div>
                  <button onClick={onClose} style={{padding:"9px 32px",borderRadius:8,background:C.amber,border:"none",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer"}}>Done</button>
                </div>
              )}

              {phase==="error"&&(
                <div style={{textAlign:"center",padding:"12px 0"}}>
                  <div style={{fontSize:36,marginBottom:14}}>⚠️</div>
                  <div style={{fontSize:13,color:C.text,marginBottom:20,lineHeight:1.6}}>{errMsg}</div>
                  <button onClick={()=>setPhase("idle")} style={{padding:"9px 24px",borderRadius:8,background:C.elevated,border:C.border,color:C.text,fontSize:13,cursor:"pointer",marginRight:8}}>Try again</button>
                  <button onClick={onClose} style={{padding:"9px 24px",borderRadius:8,background:"none",border:C.border,color:C.muted,fontSize:13,cursor:"pointer"}}>Close</button>
                </div>
              )}
            </>}
          </div>
        </div>
      );
    };

    // ── App ──────────────────────────────────────────────────────────────────
    function App(){
      const [view,setView]=useState({page:"home",data:null,extra:{}});
      const [activeTab,setActiveTab]=useState("home");
      const [pageKey,setPageKey]=useState(0);
      const navHistoryRef=useRef([{view:{page:"home",data:null,extra:{}},activeTab:"home"}]);
      const navIndexRef=useRef(0);
      const [canGoBack,setCanGoBack]=useState(false);
      const [canGoForward,setCanGoForward]=useState(false);
      const isNavJumpRef=useRef(false);
      const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem("tvstats_user")||"null");}catch{return null;}});
      const [showDataModal,setShowDataModal]=useState(false);
      const [theme, setTheme] = useState(() => localStorage.getItem('tvstats_theme') || 'dark');
      Object.assign(C, theme === 'dark' ? DARK_C : LIGHT_C);
      useEffect(() => {
        document.body.style.background = C.bg;
        document.body.style.color = C.text;
        const style = document.getElementById('scrollbar-style') || (() => { const s = document.createElement('style'); s.id = 'scrollbar-style'; document.head.appendChild(s); return s; })();
        style.textContent = `::-webkit-scrollbar-track{background:${C.surface}} ::-webkit-scrollbar-thumb{background:${C.hover};border-radius:2px}`;
      }, [theme]);
      // Smooth mouse-wheel scrolling — called by Swift for mouse-only events; trackpad falls through natively
      useEffect(()=>{
        function getScrollParent(el){
          while(el&&el!==document.body){
            const s=window.getComputedStyle(el);
            if(/(auto|scroll)/.test(s.overflow+s.overflowY)&&el.scrollHeight>el.clientHeight) return el;
            el=el.parentElement;
          }
          return null;
        }
        let mx=0,my=0;
        function onMove(e){mx=e.clientX;my=e.clientY;}
        document.addEventListener('mousemove',onMove,{passive:true});
        const state=new WeakMap();
        window.__tvScrollToTop=function(el){const s=state.get(el);if(s){s.target=0;cancelAnimationFrame(s.raf);state.delete(el);}el.scrollTop=0;};
        window.__tvMouseScroll=function(rawDelta){
          const el=getScrollParent(document.elementFromPoint(mx,my));
          if(!el) return;
          let s=state.get(el);
          if(!s){s={target:el.scrollTop,raf:null};state.set(el,s);}
          const px=rawDelta*-40; // flip NSEvent sign + scale scroll-lines → pixels (tune -40 for speed)
          s.target=Math.max(0,Math.min(el.scrollHeight-el.clientHeight,s.target+px));
          if(s.raf) return;
          function tick(){
            const diff=s.target-el.scrollTop;
            if(Math.abs(diff)<0.5){el.scrollTop=s.target;state.delete(el);s.raf=null;return;}
            el.scrollTop+=diff*0.15;
            s.raf=requestAnimationFrame(tick);
          }
          s.raf=requestAnimationFrame(tick);
        };
        return()=>{document.removeEventListener('mousemove',onMove);delete window.__tvMouseScroll;};
      },[]);

      // Keyboard navigation — arrow keys scroll/navigate, disabled when in an input
      useEffect(()=>{
        function inInput(){
          const el=document.activeElement;
          return el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.isContentEditable);
        }
        function findMainScrollEl(){
          let best=null,bestArea=0;
          document.querySelectorAll('*').forEach(el=>{
            if(el===document.body||el===document.documentElement)return;
            const s=window.getComputedStyle(el);
            if(!/(auto|scroll)/.test(s.overflow+s.overflowY))return;
            if(el.scrollHeight<=el.clientHeight)return;
            const area=el.clientWidth*el.clientHeight;
            if(area>bestArea){best=el;bestArea=area;}
          });
          return best;
        }
        function smoothScrollTo(el,target){
          el._kbTarget=Math.max(0,Math.min(el.scrollHeight-el.clientHeight,target));
          if(el._kbRaf)return;
          function tick(){
            const diff=el._kbTarget-el.scrollTop;
            if(Math.abs(diff)<0.5){el.scrollTop=el._kbTarget;delete el._kbTarget;el._kbRaf=null;return;}
            el.scrollTop+=diff*0.12;
            el._kbRaf=requestAnimationFrame(tick);
          }
          el._kbRaf=requestAnimationFrame(tick);
        }
        function smoothScrollBy(el,delta){
          smoothScrollTo(el,(el._kbTarget??el.scrollTop)+delta);
        }
        function onKeyDown(e){
          if(inInput())return;
          const key=e.key;
          if(key==='ArrowLeft'){e.preventDefault();window.__tvstatsGoBack&&window.__tvstatsGoBack();return;}
          if(key==='ArrowRight'){e.preventDefault();window.__tvstatsGoForward&&window.__tvstatsGoForward();return;}
          const el=findMainScrollEl();
          if(!el)return;
          if(key==='ArrowUp'){e.preventDefault();smoothScrollBy(el,-80);}
          else if(key==='ArrowDown'){e.preventDefault();smoothScrollBy(el,80);}
          else if(key==='PageUp'){e.preventDefault();smoothScrollBy(el,-el.clientHeight*0.9);}
          else if(key==='PageDown'){e.preventDefault();smoothScrollBy(el,el.clientHeight*0.9);}
          else if(key==='Home'){e.preventDefault();smoothScrollTo(el,0);}
          else if(key==='End'){e.preventDefault();smoothScrollTo(el,el.scrollHeight);}
        }
        window.addEventListener('keydown',onKeyDown);
        return()=>window.removeEventListener('keydown',onKeyDown);
      },[]);

      // ── Persistent watched / watchlist ────────────────────────────────────
      // Keyed by user email so multiple profiles stay isolated
      const watchedKey  = user?`tvstats_watched_${user.email}`  :"tvstats_watched";
      const watchlistKey= user?`tvstats_watchlist_${user.email}`:"tvstats_watchlist";

      const [watched,setWatched]=useState(()=>{
        try{
          const u=JSON.parse(localStorage.getItem("tvstats_user")||"null");
          if(!u)return new Map();
          const email=u.email;
          const lsRaw=localStorage.getItem(`tvstats_watched_${email}`);
          // localStorage may fail to store large datasets (quota exceeded), so fall
          // back to the native file Swift injects as window.__tvstatsWatched.
          const raw=(lsRaw&&lsRaw!=='[]')?lsRaw:(window.__tvstatsWatched&&window.__tvstatsWatched[email]);
          return raw?new Map(JSON.parse(raw)):new Map();
        }catch{return new Map();}
      });
      const [watchlist,setWatchlist]=useState(()=>{
        try{
          const u=JSON.parse(localStorage.getItem("tvstats_user")||"null");
          if(!u)return new Map();
          const raw=localStorage.getItem(`tvstats_watchlist_${u.email}`);
          return raw?new Map(JSON.parse(raw)):new Map();
        }catch{return new Map();}
      });
      const [showTotals,setShowTotals]=useState(()=>{try{return new Map(JSON.parse(localStorage.getItem("tvstats_show_totals")||"[]"));}catch{return new Map();}});
      const registerShowTotal=(id,total)=>{if(!total)return;setShowTotals(p=>{if(p.get(String(id))===total)return p;const n=new Map(p);n.set(String(id),total);try{localStorage.setItem("tvstats_show_totals",JSON.stringify([...n.entries()]));}catch{}return n;});};

      // Keep a ref to the latest watched value so the auto-sync closure is never stale
      const watchedRef=useRef(watched);
      useEffect(()=>{watchedRef.current=watched;},[watched]);

      // ── Trakt auto-sync on login ──────────────────────────────────────────
      const [traktAutoStatus,setTraktAutoStatus]=useState('idle'); // 'idle'|'syncing'|'done'|'error'
      useEffect(()=>{
        if(!user)return;
        const getTok=()=>{try{return JSON.parse(localStorage.getItem('tvstats_trakt_token')||'null');}catch{return null;}};
        const tok=getTok();
        if(!tok||new Date(tok.expires_at)<new Date())return;
        setTraktAutoStatus('syncing');
        runTraktSync(tok,{clientId:TRAKT_CLIENT_ID,clientSecret:TRAKT_CLIENT_SECRET},watchedRef.current,setWatched)
          .then(()=>{
            setTraktAutoStatus('done');
            setTimeout(()=>setTraktAutoStatus('idle'),4000);
          })
          .catch(()=>{
            setTraktAutoStatus('error');
            setTimeout(()=>setTraktAutoStatus('idle'),6000);
          });
      },[user]);

      // Persist to localStorage whenever data changes
      useEffect(()=>{
        if(!user)return;
        const serialized=JSON.stringify(Array.from(watched.entries()));
        try{localStorage.setItem(watchedKey,serialized);}catch{}
        // Also push directly to Swift — bypasses localStorage size limits
        try{window.webkit?.messageHandlers?.watchedSave?.postMessage(JSON.stringify({[user.email]:serialized}));}catch{}
      },[watched,user,watchedKey]);
      useEffect(()=>{
        if(!user)return;
        try{localStorage.setItem(watchlistKey,JSON.stringify(Array.from(watchlist.entries())));}catch{}
      },[watchlist,user,watchlistKey]);

      // Backfill episode entries that are missing air_date or vote_average
      useEffect(()=>{
        if(!user)return;
        const toFetch=[...watched.entries()].filter(([,{item}])=>
          item?.media_type==="episode"&&item.showId&&item.season_number&&item.episode_number&&
          (item.vote_average==null||item.air_date==null||!item.name)
        );
        if(!toFetch.length)return;
        let cancelled=false;
        (async()=>{
          const updates=await Promise.all(toFetch.map(async([key,entry])=>{
            try{
              const d=await api(`/tv/${entry.item.showId}/season/${entry.item.season_number}/episode/${entry.item.episode_number}`);
              return[key,{...entry,item:{...entry.item,...d,media_type:"episode",showId:entry.item.showId,showName:entry.item.showName,showPoster:entry.item.showPoster,showBackdrop:entry.item.showBackdrop}}];
            }catch{return null;}
          }));
          if(cancelled)return;
          const valid=updates.filter(Boolean);
          if(!valid.length)return;
          setWatched(p=>{const n=new Map(p);valid.forEach(([k,v])=>n.set(k,v));return n;});
        })();
        return()=>{cancelled=true;};
      },[user]);

      // Backfill showTotals for any watched shows not yet in the cache
      useEffect(()=>{
        if(!user)return;
        const watchedShowIds=[...new Set([...watched.keys()].filter(k=>typeof k==="string"&&/^ep-\d+-\d+-\d+$/.test(k)).map(k=>k.split("-")[1]))];
        const missing=watchedShowIds.filter(sid=>!showTotals.has(sid));
        if(!missing.length)return;
        let cancelled=false;
        (async()=>{
          for(const sid of missing){
            if(cancelled)return;
            try{const d=await api(`/tv/${sid}`);if(d.number_of_episodes)registerShowTotal(sid,d.number_of_episodes);}catch{}
          }
        })();
        return()=>{cancelled=true;};
      },[user]);

      const [pageZoom,setPageZoom]=useState(()=>{try{return JSON.parse(localStorage.getItem("tvstats_zoom")||"{}");}catch{return{};}});
      // Zoom is keyed by the actual view, not the navbar tab — so e.g. Movies list zoom
      // does not carry into movie / TV / person detail (those default to 100% until set).
      const zoomStorageKey=(p=>{
        switch(p){
          case"movie-detail":return"movie-detail";
          case"tv-detail":return"tv-detail";
          case"person-detail":return"person-detail";
          case"episode-list":return"episode-list";
          case"episode-detail":return"episode-detail";
          case"movies-page":return"movies";
          case"tv-page":return"tv";
          case"people":return"people";
          case"home":
          case"continue-watching":return"home";
          case"search":return"search";
          case"watchlist":return"watchlist";
          case"history":return"history";
          case"stats":return"stats";
          case"settings":return"settings";
          default:return"home";
        }
      })(view.page);
      const currentZoom=pageZoom[zoomStorageKey]||1;
      const adjustZoom=(delta)=>{
        setPageZoom(prev=>{
          const cur=prev[zoomStorageKey]||1;
          const next=Math.max(0.5,Math.min(2.0,Math.round((cur+delta)*10)/10));
          const updated={...prev,[zoomStorageKey]:next};
          localStorage.setItem("tvstats_zoom",JSON.stringify(updated));
          return updated;
        });
      };
      const resetZoom=()=>{
        setPageZoom(prev=>{
          const updated={...prev,[zoomStorageKey]:1};
          localStorage.setItem("tvstats_zoom",JSON.stringify(updated));
          return updated;
        });
      };

      const logout=()=>{localStorage.removeItem("tvstats_user");setActiveTab("home");setView({page:"home",data:null,extra:{}});setUser(null);};
      React.useEffect(()=>{window.__tvstatsLogout=logout;return()=>{delete window.__tvstatsLogout;};},[]);

      const goTo=(page,data=null,extra={})=>{
        const newView={page,data,extra};
        const tabMap={"home":"home","calendar":"calendar","search":"","movies":"movies","movies-page":"movies","tv":"tv","tv-page":"tv","people":"people","person-detail":"people","watchlist":"watchlist","history":"history","stats":"stats","settings":"settings","movie-detail":"movies","tv-detail":"tv","episode-list":"tv","episode-detail":"tv","continue-watching":"home"};
        const newTab=tabMap[page]!==undefined?tabMap[page]:activeTab;
        setView(newView);
        if(tabMap[page]!==undefined)setActiveTab(newTab);
        window.scrollTo&&window.scrollTo(0,0);
        if(!isNavJumpRef.current){
          const stack=navHistoryRef.current.slice(0,navIndexRef.current+1);
          stack.push({view:newView,activeTab:newTab});
          navHistoryRef.current=stack;
          navIndexRef.current=stack.length-1;
          setCanGoBack(navIndexRef.current>0);
          setCanGoForward(false);
          history.pushState({navIndex:navIndexRef.current},'');
        }
      };
      const handleTab=(id)=>{
        const pageMap={"home":"home","calendar":"calendar","movies":"movies-page","tv":"tv-page","people":"people","watchlist":"watchlist","history":"history","stats":"stats","settings":"settings"};
        const typeMap={"movies":"movie","tv":"tv"};
        // Clear page caches on any tab click — tabs always start fresh
        if(id==="movies"){for(const k in _moviesPageCache)delete _moviesPageCache[k];_movieScrollCache.clear();}
        if(id==="tv"){for(const k in _tvPageCache)delete _tvPageCache[k];_tvScrollCache.clear();_episodeListScrollCache.clear();}
        if(id==="stats"){for(const k in _statsPageCache)delete _statsPageCache[k];}
        if(id==="people"){for(const k in _peoplePageCache)delete _peoplePageCache[k];_personScrollCache.clear();}
        if(id==="history"){for(const k in _historyPageCache)delete _historyPageCache[k];}
        if(id==="watchlist"){for(const k in _watchlistPageCache)delete _watchlistPageCache[k];}
        // Bump key to force remount when clicking the already-active tab (in-tree refresh)
        if(id===activeTab)setPageKey(k=>k+1);
        setActiveTab(id);
        const newView={page:pageMap[id]||id,data:null,extra:{defaultType:typeMap[id]}};
        setView(newView);
        if(!isNavJumpRef.current){
          const stack=navHistoryRef.current.slice(0,navIndexRef.current+1);
          stack.push({view:newView,activeTab:id});
          navHistoryRef.current=stack;
          navIndexRef.current=stack.length-1;
          setCanGoBack(navIndexRef.current>0);
          setCanGoForward(false);
          history.pushState({navIndex:navIndexRef.current},'');
        }
      };
      const goBack=()=>{
        if(navIndexRef.current<=0)return;
        isNavJumpRef.current=true;
        navIndexRef.current--;
        const entry=navHistoryRef.current[navIndexRef.current];
        setView(entry.view);
        setActiveTab(entry.activeTab);
        setCanGoBack(navIndexRef.current>0);
        setCanGoForward(true);
        window.scrollTo&&window.scrollTo(0,0);
        isNavJumpRef.current=false;
      };
      const goForward=()=>{
        if(navIndexRef.current>=navHistoryRef.current.length-1)return;
        isNavJumpRef.current=true;
        navIndexRef.current++;
        const entry=navHistoryRef.current[navIndexRef.current];
        setView(entry.view);
        setActiveTab(entry.activeTab);
        setCanGoBack(true);
        setCanGoForward(navIndexRef.current<navHistoryRef.current.length-1);
        window.scrollTo&&window.scrollTo(0,0);
        isNavJumpRef.current=false;
      };
      // Expose nav functions for Swift keyboard shortcuts
      window.__tvstatsGoBack=goBack;
      window.__tvstatsGoForward=goForward;
      // Sync browser history with app nav so trackpad swipe works
      useEffect(()=>{
        history.replaceState({navIndex:0},'');
        const onPop=(e)=>{
          const target=e.state?.navIndex??0;
          const curr=navIndexRef.current;
          if(target<curr)goBack();
          else if(target>curr)goForward();
        };
        window.addEventListener('popstate',onPop);
        return()=>window.removeEventListener('popstate',onPop);
      },[]);
      const handleSearch=()=>{for(const k in _searchPageCache)delete _searchPageCache[k];goTo("search");};

      if(!user)return<AuthPage onLogin={setUser}/>;

      const {page,data,extra}=view;
      const shared={watchlist,setWatchlist,watched,setWatched,goTo,showTotals,registerShowTotal};
      const renderPage=()=>{
        switch(page){
          case"home":return null;
          case"search":return<SearchPage {...shared} defaultType={extra?.defaultType} initialProvider={extra?.provider}/>;
          case"movie-detail":return<MovieDetailPage item={data} {...shared}/>;
          case"tv-detail":return<TVDetailPage item={data} {...shared}/>;
          case"episode-list":return<EpisodeListPage data={data} {...shared}/>;
          case"episode-detail":return<EpisodeDetailPage data={data} {...shared}/>;
          case"movies-page":return<MoviesPage key={pageKey} {...shared}/>;
          case"tv-page":return<TVShowsPage key={pageKey} {...shared}/>;
          case"people":return<PeoplePage key={pageKey} goTo={goTo} watched={watched}/>;
          case"person-detail":return<PersonDetailPage person={data} goTo={goTo} watchlist={watchlist} setWatchlist={setWatchlist} watched={watched} setWatched={setWatched} showTotals={showTotals}/>;
          case"watchlist":return<WatchlistPage {...shared}/>;
          case"history":return<HistoryPage {...shared} initialDate={data?.scrollToDate}/>;
          case"continue-watching":return<ContinueWatchingPage goTo={goTo} watched={watched} setWatched={setWatched}/>;
          case"stats":return<StatsPage watched={watched} watchlist={watchlist} goTo={goTo}/>;
          case"settings":return<SettingsPage user={user} setUser={setUser} onData={()=>setShowDataModal(true)} theme={theme} setTheme={setTheme}/>;
          default:return null;
        }
      };

      return(<div style={{fontFamily:"'DM Sans',sans-serif",background:C.bg,color:C.text,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <Header onSearch={handleSearch} user={user} logout={logout} onData={()=>setShowDataModal(true)} onSettings={()=>handleTab("settings")}/>
        <Navbar active={activeTab} setActive={handleTab} zoom={currentZoom} onZoomOut={()=>adjustZoom(-0.1)} onZoomIn={()=>adjustZoom(0.1)} onZoomReset={resetZoom} canGoBack={canGoBack} canGoForward={canGoForward} onGoBack={goBack} onGoForward={goForward}/>
        <div style={{flex:1,overflow:"hidden",display:"flex",...(currentZoom!==1&&{zoom:currentZoom})}}>
          <div style={{display:page==="home"?"flex":"none",flex:1,overflow:"hidden"}}><HomePage {...shared}/></div>
          <div style={{display:page==="calendar"?"flex":"none",flex:1,overflow:"hidden"}}><CalendarPage watched={watched} goTo={goTo}/></div>
          {page!=="home"&&page!=="calendar"&&renderPage()}
        </div>
        {showDataModal&&<TraktImportModal onClose={()=>setShowDataModal(false)} setWatched={setWatched} watched={watched} watchlist={watchlist} setWatchlist={setWatchlist} user={user} autoSyncStatus={traktAutoStatus}/>}
        {traktAutoStatus!=='idle'&&(
          <div style={{position:'fixed',bottom:20,right:20,zIndex:998,background:C.elevated,border:C.border,borderRadius:99,padding:'7px 14px',display:'flex',alignItems:'center',gap:8,boxShadow:`0 4px 20px ${C.shadow}`,animation:'fadeIn 0.2s ease',fontSize:12,color:C.muted,pointerEvents:'none'}}>
            {traktAutoStatus==='syncing'&&<><div style={{width:11,height:11,borderRadius:'50%',border:`1.5px solid ${C.muted}`,borderTopColor:C.amber,animation:'spin 0.8s linear infinite',flexShrink:0}}/>Syncing Trakt…</>}
            {traktAutoStatus==='done'&&<><div style={{width:8,height:8,borderRadius:'50%',background:C.green,flexShrink:0}}/>Trakt synced</>}
            {traktAutoStatus==='error'&&<><div style={{width:8,height:8,borderRadius:'50%',background:'#e87a7a',flexShrink:0}}/>Trakt sync failed</>}
          </div>
        )}
      </div>);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
