  <script type="text/babel">
    const { useState, useEffect, useLayoutEffect, useRef, useMemo, useCallback } = React;

    // ── Constants ────────────────────────────────────────────────────────────
    const TMDB_KEY = "8265bd1679663a7ea12ac168da84d2e8";
    const TMDB = "https://api.themoviedb.org/3";
    const img = (p, s = "w780") => p ? `https://image.tmdb.org/t/p/${s}${p}` : null;
    const api = async (ep, params = {}) => {
      const u = new URL(`${TMDB}${ep}`);
      u.searchParams.set("api_key", TMDB_KEY);
      if(!params.language)u.searchParams.set("language","en-US");
      Object.entries(params).forEach(([k,v]) => u.searchParams.set(k, v));
      return (await fetch(u)).json();
    };
    const DARK_C  = { bg:"#0d0d0d", surface:"#161616", elevated:"#202020", border:"0.5px solid #252525", amber:"#e8c87a", blue:"#5a9fd4", green:"#4ecb71", purple:"#d47acd", text:"#e0e0e0", muted:"#6a6a6a", hover:"#2a2a2a", inputBorder:"#303030", shadow:"rgba(0,0,0,0.5)", overlay:"rgba(0,0,0,0.75)" };
    const LIGHT_C = { bg:"#f0f0f0", surface:"#ffffff", elevated:"#f6f6f6", border:"0.5px solid #e0e0e0", amber:"#b07800", blue:"#2070c0", green:"#1a8a3a", purple:"#8030a8", text:"#1a1a1a", muted:"#333333", hover:"#e8e8e8", inputBorder:"#d0d0d0", shadow:"rgba(0,0,0,0.12)", overlay:"rgba(0,0,0,0.4)" };
    const C = {...DARK_C};
    const STREAMING = [
      {name:"Netflix",     color:"#E50914", tmdbId:8},

      {name:"Paramount+",  color:"#0064FF", tmdbId:2303, movieTmdbId:"2303|2616|582", tvTmdbId:"2303|2616|1853|582|633"},

      {name:"Peacock",     color:"#FF8C00", tmdbId:386},
    ];
    const NETWORKS = [
      {name:"ABC",        color:"#007ABC", tmdbId:2},
      {name:"Adult Swim", color:"#00CCCC", tmdbId:80},
      {name:"AMC",        color:"#C8102E", tmdbId:174},

      {name:"TNT",        color:"#0050A0", tmdbId:41},
      {name:"USA",        color:"#0072CE", tmdbId:30},
    ];
    const MOVIE_GENRES = ["Action","Adventure","Animation","Comedy","Crime","Documentary","Drama","Fantasy","Horror","Mystery","Romance","Sci-Fi","Thriller","Western"];
    const TV_GENRES    = ["Action","Animation","Comedy","Crime","Documentary","Drama","Family","Fantasy","Mystery","Reality","Sci-Fi","Thriller"];
    const DECADES=["2020s","2010s","2000s","1990s","1980s","1970s","Older"];
    const RATINGS_OPT=["9+","8+","7+","6+"];
    const RUNTIMES=["< 90 min","90–120 min","2+ hrs"];
    const LANGS=["English","Spanish","French","Korean","Japanese","German"];
    const TV_STATUS=["Returning","Ended","Cancelled","Mini-series"];
    const LANG_MAP={"English":"en","Spanish":"es","French":"fr","Korean":"ko","Japanese":"ja","German":"de"};
    const DECADE_RANGE={"2020s":["2020","2029"],"2010s":["2010","2019"],"2000s":["2000","2009"],"1990s":["1990","1999"],"1980s":["1980","1989"],"1970s":["1970","1979"],"Older":["1900","1969"]};
    const ROLES=["Actor","Director","Writer","Producer","Cinematographer"];
    const SORTS=["Top Streaming","Rating","Newest","Oldest"];
    const PROFILE_COLORS=["#e8c87a","#5a9fd4","#4ecb71","#d47acd","#f97316","#f43f5e","#06b6d4","#a855f7"];
    const NAV_TABS=[
      {id:"home",label:"Home",color:"#ffffff",group:0},
      {id:"calendar",label:"Calendar",color:"#ffffff",group:0},
      {id:"movies",label:"Movies",color:C.blue,group:1},
      {id:"tv",label:"TV Shows",color:C.green,group:1},
      {id:"people",label:"People",color:C.purple,group:1},
      {id:"watchlist",label:"Watchlist",color:C.amber,group:2},
      {id:"history",label:"History",color:C.amber,group:2},
      {id:"stats",label:"Stats",color:C.amber,group:2},
      {id:"settings",label:"Settings",color:C.muted,group:3},
    ];
    const fmt = (mins) => mins ? `${Math.floor(mins/60)}h ${mins%60}m` : "—";
    const relDate = (ds) => {
      const tz=localStorage.getItem("tvstats_timezone")||Intl.DateTimeFormat().resolvedOptions().timeZone;
      const d=new Date(ds), now=new Date();
      const toDay=dt=>{
        const p=new Intl.DateTimeFormat("en-US",{timeZone:tz,year:"numeric",month:"numeric",day:"numeric"}).formatToParts(dt);
        const g=t=>+p.find(x=>x.type===t).value;
        return new Date(g("year"),g("month")-1,g("day"));
      };
      const dDay=toDay(d), nDay=toDay(now);
      const diff=Math.round((nDay-dDay)/86400000);
      if(diff===0)return"Today"; if(diff===1)return"Yesterday";
      if(diff<7)return`${diff} days ago`; if(diff<14)return"Last week";
      return d.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
    };
    const localISODate=(d)=>{const y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();return`${y}-${String(m).padStart(2,"0")}-${String(day).padStart(2,"0")}`;};
    const todayTZ=()=>{const tz=localStorage.getItem("tvstats_timezone")||Intl.DateTimeFormat().resolvedOptions().timeZone;const p=new Intl.DateTimeFormat("en-CA",{timeZone:tz,year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());return p;};
    const addLocalDays=(base,n)=>{const d=new Date(base.getFullYear(),base.getMonth(),base.getDate());d.setDate(d.getDate()+n);return d;};
    const relFutureDay=(isoStr)=>{
      const tz=localStorage.getItem("tvstats_timezone")||Intl.DateTimeFormat().resolvedOptions().timeZone;
      const toDay=dt=>{
        const p=new Intl.DateTimeFormat("en-US",{timeZone:tz,year:"numeric",month:"numeric",day:"numeric"}).formatToParts(dt);
        const g=t=>+p.find(x=>x.type===t).value;
        return new Date(g("year"),g("month")-1,g("day"));
      };
      const target=new Date(isoStr+"T12:00:00");
      const tDay=toDay(target),nDay=toDay(new Date());
      const diff=Math.round((tDay-nDay)/86400000);
      if(diff===0)return"Today";
      if(diff===1)return"Tomorrow";
      if(diff<7)return`In ${diff} days`;
      return target.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});
    };

    // ── Icons ────────────────────────────────────────────────────────────────
    const EyeIcon=({size=13,color="currentColor"})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>);
    const CheckIcon=({size=13,color="currentColor"})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20,6 9,17 4,12"/></svg>);
    const PlayIcon=({size=10,color="currentColor"})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><polygon points="5,3 19,12 5,21"/></svg>);
    const SearchIcon=({size=14,color="currentColor"})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>);
    const ChevronRight=({size=14,color="currentColor"})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9,18 15,12 9,6"/></svg>);
    const ChevronLeft=({size=14,color="currentColor"})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15,18 9,12 15,6"/></svg>);
    const StarIcon=({size=12,color=C.amber})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>);
    const XIcon=({size=12,color="currentColor"})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>);

    // ── Session-level data caches (survive navigation) ───────────────────────
    const _homePageCache={contItems:[],watchedRef:null};
    const _calendarCache={episodes:[],weeksFetched:[false,false,false,false],watchedRef:null,showIdsKey:null};
    const _resolvedNextCache=new Map(); // key: `${showId}:${season}:${episode}` -> {season,episode}|false

    // ── Persistent Metadata Cache (localStorage, survives app restarts) ───────
    const MC_PFX="mc_",MC_TTL={sidebar:7*86400000,movie:3*86400000,tv:3*86400000,season:3*86400000,episode:86400000,person:7*86400000};
    const MC_MAX_ENTRY=80*1024; // skip entries > 80KB serialized
    const mcGet=(type,id)=>{try{const k=MC_PFX+type+(id!=null?"_"+id:"");const raw=localStorage.getItem(k);if(!raw)return null;const{d,t}=JSON.parse(raw);if(Date.now()-t>(MC_TTL[type]||MC_TTL.tv)){localStorage.removeItem(k);return null;}return d;}catch{return null;}};
    const _mcEvict=()=>{const e=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(!k.startsWith(MC_PFX))continue;try{const{t}=JSON.parse(localStorage.getItem(k));e.push({k,t});}catch{localStorage.removeItem(k);}}e.sort((a,b)=>a.t-b.t);e.slice(0,Math.max(1,Math.ceil(e.length/4))).forEach(({k})=>localStorage.removeItem(k));};
    const mcSet=(type,id,data)=>{if(data==null)return;if(typeof data==='object'&&!Array.isArray(data)&&(data.success===false||Object.keys(data).length===0))return;const key=MC_PFX+type+(id!=null?"_"+id:"");const val=JSON.stringify({d:data,t:Date.now()});if(val.length>MC_MAX_ENTRY)return;try{localStorage.setItem(key,val);}catch{_mcEvict();try{localStorage.setItem(key,val);}catch{}}};

    // ── Background Prefetch ──────────────────────────────────────────────────
    // Populated once after the Home page goes idle so Movies/TV load instantly.
    const _prefetchState={done:false,pending:false};
    const prefetchBackground=async()=>{
      if(_prefetchState.done||_prefetchState.pending)return;
      _prefetchState.pending=true;
      try{
        // Movies: fetch pages 1 & 2 in parallel
        const[m1,m2]=await Promise.all([
          api("/trending/movie/week",{page:1}),
          api("/trending/movie/week",{page:2}),
        ]);
        const movieItems=[
          ...(m1.results||[]).filter(r=>r.original_language==="en").map(r=>({...r,media_type:"movie"})),
          ...(m2.results||[]).filter(r=>r.original_language==="en").map(r=>({...r,media_type:"movie"})),
        ];
        // Only populate if the user hasn't already navigated to Movies
        if(!_moviesPageCache.browseItems?.length){
          Object.assign(_moviesPageCache,{
            section:"trending",browseItems:movieItems,browsePage:2,
            browseHasMore:2<Math.min(m1.total_pages||1,10),sortBy:"Top Streaming",
          });
        }
        // Kick off image preloads (fire-and-forget)
        movieItems.forEach(r=>{if(r.poster_path){const i=new Image();i.src=img(r.poster_path,"w342");}});

        await new Promise(r=>setTimeout(r,300)); // brief pause between bursts

        // TV Shows: fetch pages 1 & 2 in parallel
        const[t1,t2]=await Promise.all([
          api("/trending/tv/week",{page:1}),
          api("/trending/tv/week",{page:2}),
        ]);
        const tvItems=[
          ...(t1.results||[]).filter(r=>r.original_language==="en").map(r=>({...r,media_type:"tv"})),
          ...(t2.results||[]).filter(r=>r.original_language==="en").map(r=>({...r,media_type:"tv"})),
        ];
        if(!_tvPageCache.browseItems?.length){
          Object.assign(_tvPageCache,{
            section:"trending",browseItems:tvItems,browsePage:2,
            browseHasMore:2<Math.min(t1.total_pages||1,10),sortBy:"Top Streaming",
          });
        }
        tvItems.forEach(r=>{if(r.poster_path){const i=new Image();i.src=img(r.poster_path,"w342");}});

        _prefetchState.done=true;
      }catch(e){
        // silent — prefetch is best-effort
      }finally{
        _prefetchState.pending=false;
      }
    };

    // ── Movies Page ──────────────────────────────────────────────────────────
    const _moviesPageCache={};
    const MoviesPage=({goTo,watchlist,setWatchlist,watched,setWatched,showTotals})=>{
      const _c=_moviesPageCache;
      const scrollRef=useRef(null);
      const _restoring=useRef(!!(_c.browseItems?.length||_c.overlayItems?.length));
      // ── Browse state ──────────────────────────────────────────────────────
      const [section,setSection]=useState(_c.section||"trending");
      const [browseItems,setBrowseItems]=useState(_c.browseItems||[]);
      const [browsePage,setBrowsePage]=useState(_c.browsePage||1);
      const [browseHasMore,setBrowseHasMore]=useState(_c.browseHasMore!==undefined?_c.browseHasMore:true);
      const [browseLoading,setBrowseLoading]=useState(!(_c.browseItems?.length>0));
      const [browseLoadingMore,setBrowseLoadingMore]=useState(false);

      // ── Overlay state (search + filter with infinite scroll) ──────────────
      const [query,setQuery]=useState(_c.query||"");
      const [filters,setFilters]=useState(_c.filters||{});
      const [overlayItems,setOverlayItems]=useState(_c.overlayItems||[]);
      const [overlayPage,setOverlayPage]=useState(_c.overlayPage||1);
      const [overlayHasMore,setOverlayHasMore]=useState(_c.overlayHasMore||false);
      const [overlayLoading,setOverlayLoading]=useState(false);
      const [overlayLoadingMore,setOverlayLoadingMore]=useState(false);

      // ── Shared ────────────────────────────────────────────────────────────
      const [sortBy,setSortBy]=useState(_c.sortBy||"Top Streaming");
      const [openFilter,setOpenFilter]=useState(null);
      const [provider,setProvider]=useState(_c.provider||null);

      const activeFilterCount=Object.values(filters).reduce((a,s)=>a+(s?.size||0),0);
      const hasQuery=query.trim().length>0;
      const hasFilters=activeFilterCount>0;
      const mode=hasQuery?"search":hasFilters?"filter":"browse";
      const isOverlay=mode!=="browse";
      // ── TMDB mapping tables (movies) ──────────────────────────────────────
      const MOVIE_GENRE_MAP={"Action":28,"Adventure":12,"Animation":16,"Comedy":35,"Crime":80,"Documentary":99,"Drama":18,"Fantasy":14,"Horror":27,"Mystery":9648,"Romance":10749,"Sci-Fi":878,"Thriller":53,"Western":37};
      const SECTIONS=[["trending","Trending"],["top-rated","Top Rated"],...(!provider?[["in-theaters","In Theaters"]]:[])];


      // ── Browse fetcher ────────────────────────────────────────────────────
      const TODAY=new Date().toISOString().slice(0,10);
      const fetchBrowse=async(sec,pg,prov,sort)=>{
        try{
          // "Top Rated" section with "Top Streaming" sort → rank by rating instead of trending
          if(sec==="top-rated"&&(!sort||sort==="Top Streaming"))sort="Rating";
          // In Theaters: US theatrical only, exclude anything already on major streaming services
          if(sec==="in-theaters"&&!prov){
            const cutoff=new Date(Date.now()-56*86400000).toISOString().slice(0,10); // 8 weeks
            // Netflix=8, Prime=9, Hulu=15, Disney+=337, Max=1899|384, Apple TV+=350, Peacock=386, Paramount+=531
            const d=await api("/discover/movie",{page:pg,language:"en-US",region:"US",watch_region:"US",with_release_type:"3",with_original_language:"en","primary_release_date.gte":cutoff,"primary_release_date.lte":TODAY,sort_by:"popularity.desc",without_watch_providers:"8|9|15|337|1899|384|350|386|531"});
            const items=(d.results||[]).map(r=>({...r,media_type:"movie"}));
            return{items,totalPages:Math.min(d.total_pages||1,3)};
          }
          // Top Streaming: use TMDB weekly trending (what people are actually watching)
          if(!sort||sort==="Top Streaming"){
            if(prov){
              // Trending can't filter by provider — use discover popularity instead
              const params={page:pg,language:"en-US",sort_by:"popularity.desc"};
              if(prov.kind==="network")params.with_companies=prov.id;
              else{params.with_watch_providers=prov.id;params.watch_region="US";}
              params["primary_release_date.lte"]=TODAY;
              const d=await api("/discover/movie",params);
              return{items:(d.results||[]).map(r=>({...r,media_type:"movie"})),totalPages:d.total_pages||1};
            }
            const d=await api("/trending/movie/week",{page:pg});
            return{items:(d.results||[]).filter(r=>r.original_language==="en").map(r=>({...r,media_type:"movie"})),totalPages:Math.min(d.total_pages||1,10)};
          }
          // Other sorts: use discover
          const params={page:pg,language:"en-US"};
          if(!prov)params.with_original_language="en";
          const sortParam=sort==="Rating"?"vote_average.desc":sort==="Newest"?"primary_release_date.desc":sort==="Oldest"?"primary_release_date.asc":"original_title.asc";
          params.sort_by=sortParam;
          if(sort==="Rating")params["vote_count.gte"]=100;
          if(sec==="in-theaters")params["primary_release_date.gte"]=new Date(Date.now()-90*86400000).toISOString().slice(0,10);
          params["primary_release_date.lte"]=TODAY;
          if(prov){
            if(prov.kind==="network")params.with_companies=prov.id;
            else{params.with_watch_providers=prov.id;params.watch_region="US";}
          }
          const d=await api("/discover/movie",params);
          return{items:(d.results||[]).map(r=>({...r,media_type:"movie"})),totalPages:d.total_pages||1};
        }catch{return{items:[],totalPages:1};}
      };

      // ── Provider+text search: search text, then filter to provider ─────────
      // TMDB /search/movie has no provider param, so we fetch watch/providers
      // for each result and keep only titles actually on the selected service.
      const fetchProviderSearch=async(page,prov,q)=>{
        const d=await api("/search/movie",{query:q.trim(),language:"en-US",page});
        const results=(d.results||[]).map(r=>({...r,media_type:"movie"}));
        // Networks (AMC, FX…) don't map cleanly to flatrate — skip per-item check
        if(!prov||prov.kind==="network")return{items:results,totalPages:d.total_pages||1};
        const provData=await Promise.all(results.map(r=>api(`/movie/${r.id}/watch/providers`).catch(()=>null)));
        const filtered=results.filter((_,i)=>{
          const us=provData[i]?.results?.US;
          if(!us)return false;
          return[...(us.flatrate||[]),...(us.rent||[]),...(us.buy||[])].some(p=>p.provider_id===prov.id);
        });
        return{items:filtered,totalPages:d.total_pages||1};
      };

      // ── Filter base params builder ────────────────────────────────────────
      const buildFilterBase=(pg)=>{
        const base={page:pg,language:"en-US"};
        base.sort_by=sortBy==="Rating"?"vote_average.desc":sortBy==="Newest"?"primary_release_date.desc":sortBy==="Oldest"?"primary_release_date.asc":"popularity.desc";
        if(provider){
          if(provider.kind==="network")base.with_companies=provider.id;
          else{base.with_watch_providers=provider.id;base.watch_region="US";}
        }
        base.with_original_language="en"; // default English-only
        const genreSel=filters.genre;
        if(genreSel?.size>0){const ids=[...genreSel].map(g=>MOVIE_GENRE_MAP[g]).filter(Boolean);if(ids.length)base.with_genres=[...new Set(ids)].join("|");}
        const langSel=filters.language;
        if(langSel?.size>0){const code=LANG_MAP[[...langSel][0]];if(code)base.with_original_language=code;}
        const ratingSel=filters.rating;
        if(ratingSel?.size>0){base["vote_average.gte"]=Math.min(...[...ratingSel].map(v=>parseFloat(v)));base["vote_count.gte"]=50;}
        const decadeSel=filters.decade;
        if(decadeSel?.size>0){
          const ranges=[...decadeSel].map(d=>DECADE_RANGE[d]).filter(Boolean);
          if(ranges.length){base["primary_release_date.gte"]=ranges.reduce((a,r)=>a<r[0]?a:r[0],ranges[0][0])+"-01-01";base["primary_release_date.lte"]=ranges.reduce((a,r)=>a>r[1]?a:r[1],ranges[0][1])+"-12-31";}
        }else{
          // Hide unreleased movies from filter results
          base["primary_release_date.lte"]=TODAY;
        }
        const rtSel=filters.runtime;
        if(rtSel?.size>0){
          const vals=[...rtSel];
          if(vals.includes("< 90 min"))base["with_runtime.lte"]=90;
          if(vals.includes("90–120 min")){if(!base["with_runtime.gte"])base["with_runtime.gte"]=90;base["with_runtime.lte"]=120;}
          if(vals.includes("2+ hrs"))base["with_runtime.gte"]=120;
        }
        return base;
      };

      // ── Filter page fetcher ───────────────────────────────────────────────
      const fetchFilterPage=async(pg)=>{
        const base=buildFilterBase(pg);
        const seenIds=new Set();
        const merge=items=>{const out=[];items.forEach(r=>{if(!seenIds.has(r.id)){seenIds.add(r.id);out.push({...r,media_type:"movie"});}});return out;};
        const d=await api("/discover/movie",base);
        return{items:merge(d.results||[]),totalPages:d.total_pages||1};
      };

      // ── Mutex ref — prevents concurrent load-more calls ───────────────────
      const isLoadingMoreRef=useRef(false);

      // ── Browse: load on section/provider/sort change ──────────────────────
      useEffect(()=>{
        if(isOverlay)return;
        if(_restoring.current)return;
        let cancelled=false;
        isLoadingMoreRef.current=false;
        (async()=>{
          setBrowseLoading(true);setBrowseItems([]);setBrowsePage(1);setBrowseHasMore(true);
          const{items,totalPages}=await fetchBrowse(section,1,provider,sortBy);
          if(cancelled)return;
          setBrowseItems(items);setBrowseHasMore(1<totalPages);setBrowseLoading(false);
        })();
        return()=>{cancelled=true;};
      },[section,provider,sortBy,isOverlay]);

      // ── Search: debounced; uses provider-scoped discover when provider active ─
      useEffect(()=>{
        if(_restoring.current)return;
        if(!hasQuery){setOverlayItems([]);setOverlayPage(1);setOverlayHasMore(false);return;}
        isLoadingMoreRef.current=false;
        setOverlayLoading(true);setOverlayItems([]);setOverlayPage(1);setOverlayHasMore(false);
        const t=setTimeout(async()=>{
          try{
            if(provider){
              const{items,totalPages}=await fetchProviderSearch(1,provider,query);
              setOverlayItems(items);setOverlayHasMore(1<totalPages);
            }else{
              const d=await api("/search/movie",{query:query.trim(),language:"en-US",page:1});
              setOverlayItems((d.results||[]).filter(r=>r.original_language==="en").map(r=>({...r,media_type:"movie"})));
              setOverlayHasMore((d.total_pages||1)>1);
            }
          }catch{setOverlayItems([]);}
          setOverlayLoading(false);
        },350);
        return()=>clearTimeout(t);
      },[query,sortBy,provider]);

      // ── Filter: fetch page 1 whenever filters/sort/provider change ────────
      useEffect(()=>{
        if(hasQuery||!hasFilters)return;
        if(_restoring.current)return;
        let cancelled=false;
        isLoadingMoreRef.current=false;
        (async()=>{
          setOverlayLoading(true);setOverlayItems([]);setOverlayPage(1);setOverlayHasMore(false);
          try{
            const{items,totalPages}=await fetchFilterPage(1);
            if(cancelled)return;
            setOverlayItems(items);setOverlayHasMore(1<totalPages);
          }catch{if(!cancelled)setOverlayItems([]);}
          if(!cancelled)setOverlayLoading(false);
        })();
        return()=>{cancelled=true;};
      },[hasFilters,hasQuery,filters,sortBy,provider]);

      // ── Reset "In Theaters" section when a provider is chosen (tab is hidden) ─
      useEffect(()=>{if(section==="in-theaters"&&provider)setSection("trending");},[provider]);
      // ── Clear restoring flag after initial effects fire ───────────────────
      useEffect(()=>{_restoring.current=false;},[]);
      // ── Persist state to cache on every change ────────────────────────────
      useEffect(()=>{Object.assign(_c,{section,browseItems,browsePage,browseHasMore,query,filters,overlayItems,overlayPage,overlayHasMore,sortBy,provider});},[section,browseItems,browsePage,browseHasMore,query,filters,overlayItems,overlayPage,overlayHasMore,sortBy,provider]);
      // ── Restore scroll position on mount ─────────────────────────────────
      useLayoutEffect(()=>{if(_c.scrollTop&&scrollRef.current)scrollRef.current.scrollTop=_c.scrollTop;},[]);

      // ── Always-fresh load-more ref — all three modes, mutex protected ─────
      const doLoadMoreRef=useRef(null);
      doLoadMoreRef.current=async()=>{
        if(isLoadingMoreRef.current)return;
        if(isOverlay){
          if(!overlayHasMore)return;
          isLoadingMoreRef.current=true;
          setOverlayLoadingMore(true);
          const next=overlayPage+1;
          try{
            let newItems=[];let totalPages=1;
            if(mode==="search"){
              if(provider){
                const res=await fetchProviderSearch(next,provider,query);
                newItems=res.items;totalPages=res.totalPages;
              }else{
                const d=await api("/search/movie",{query:query.trim(),language:"en-US",page:next});
                newItems=(d.results||[]).filter(r=>r.original_language==="en").map(r=>({...r,media_type:"movie"}));
                totalPages=d.total_pages||1;
              }
            }else{
              const res=await fetchFilterPage(next);
              newItems=res.items;totalPages=res.totalPages;
            }
            setOverlayItems(prev=>{const seen=new Set(prev.map(x=>x.id));return[...prev,...newItems.filter(x=>!seen.has(x.id))];});
            setOverlayPage(next);setOverlayHasMore(next<totalPages);
          }catch{}
          setOverlayLoadingMore(false);
          isLoadingMoreRef.current=false;
        }else{
          if(!browseHasMore)return;
          isLoadingMoreRef.current=true;
          setBrowseLoadingMore(true);
          const next=browsePage+1;
          const{items,totalPages}=await fetchBrowse(section,next,provider,sortBy);
          setBrowseItems(p=>{const seen=new Set(p.map(x=>x.id));return[...p,...items.filter(x=>!seen.has(x.id))];});
          setBrowsePage(next);setBrowseHasMore(next<totalPages);
          setBrowseLoadingMore(false);
          isLoadingMoreRef.current=false;
        }
      };

      // ── Callback ref for sentinel — fires when element enters DOM ─────────
      const observerRef=useRef(null);
      const setSentinel=useCallback(node=>{
        if(observerRef.current){observerRef.current.disconnect();observerRef.current=null;}
        if(!node)return;
        observerRef.current=new IntersectionObserver(entries=>{
          if(entries[0].isIntersecting)doLoadMoreRef.current?.();
        },{threshold:0,rootMargin:"400px"});
        observerRef.current.observe(node);
      },[]);

      // ── Sort ──────────────────────────────────────────────────────────────
      const applySort=arr=>[...arr].sort((a,b)=>{
        if(sortBy==="Rating")return(b.vote_average||0)-(a.vote_average||0);
        if(sortBy==="Newest")return new Date(b.release_date||0)-new Date(a.release_date||0);
        if(sortBy==="Oldest")return new Date(a.release_date||0)-new Date(b.release_date||0);
        return(b.popularity||0)-(a.popularity||0);
      });

      const displayItems=isOverlay?overlayItems:browseItems;
      const displayLoading=isOverlay?overlayLoading:browseLoading;
      const displayLoadingMore=isOverlay?overlayLoadingMore:browseLoadingMore;
      const displayHasMore=isOverlay?overlayHasMore:browseHasMore;

      // ── Filter dropdown ───────────────────────────────────────────────────
      const FDrop=({label,cat,options})=>{
        const sel=filters[cat]||new Set();
        const hasVal=sel.size>0;
        const isOpen=openFilter===cat;
        const toggle=v=>setFilters(p=>{const g=new Set(p[cat]||[]);g.has(v)?g.delete(v):g.add(v);return{...p,[cat]:g};});
        return(
          <div style={{position:"relative"}} onClick={e=>e.stopPropagation()}>
            <button onClick={()=>setOpenFilter(isOpen?null:cat)} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:6,border:hasVal?`1px solid ${C.blue}50`:`0.5px solid ${C.hover}`,background:hasVal?`${C.blue}12`:C.elevated,color:hasVal?C.blue:C.muted,fontSize:11,cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.12s"}}>
              {label}{hasVal?` · ${sel.size}`:""}
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points={isOpen?"18,15 12,9 6,15":"6,9 12,15 18,9"}/></svg>
            </button>
            {isOpen&&(
              <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,zIndex:200,background:C.elevated,border:C.border,borderRadius:8,padding:6,minWidth:150,maxHeight:220,overflowY:"auto",boxShadow:`0 8px 24px ${C.shadow}`}}>
                {options.map(opt=>{const on=sel.has(opt);return(<div key={opt} onClick={()=>toggle(opt)} style={{padding:"5px 9px",borderRadius:5,cursor:"pointer",fontSize:11,color:on?C.blue:C.text,background:on?`${C.blue}18`:"transparent",fontWeight:on?600:400}}>{opt}</div>);})}
                {hasVal&&<div onClick={()=>setFilters(p=>({...p,[cat]:new Set()}))} style={{borderTop:`0.5px solid ${C.hover}`,marginTop:4,padding:"5px 9px",fontSize:10,color:C.muted,cursor:"pointer",textAlign:"center"}}>Clear</div>}
              </div>
            )}
          </div>
        );
      };

      // ── Render ────────────────────────────────────────────────────────────
      return(
        <div style={{display:"flex",flex:1,overflow:"hidden"}}>
          <Sidebar activeProvider={provider} onSelect={p=>{setProvider(prev=>prev?.id===p.id&&prev?.kind===p.kind?null:p);setOpenFilter(null);if(scrollRef.current){window.__tvScrollToTop?window.__tvScrollToTop(scrollRef.current):(scrollRef.current.scrollTop=0);_c.scrollTop=0;}}} isMovies={true}/>
          <div ref={scrollRef} onScroll={()=>{if(scrollRef.current)_c.scrollTop=scrollRef.current.scrollTop;}} style={{flex:1,overflow:"auto",padding:"20px 24px 40px",willChange:"transform"}} onClick={()=>setOpenFilter(null)}>
            {provider&&(
              <div onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,background:C.elevated,border:`1px solid ${C.amber}40`,borderRadius:8,padding:"6px 10px 6px 14px"}}>
                <span style={{fontSize:11,color:C.muted,flexShrink:0}}>Filtered by</span>
                <span style={{fontSize:12,fontWeight:600,color:C.amber,flexShrink:0}}>{provider.name}</span>
                <div style={{flex:1,position:"relative",marginLeft:4}}>
                  <div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><SearchIcon size={12} color={hasQuery?C.text:C.muted}/></div>
                  <input value={query} onChange={e=>setQuery(e.target.value)} placeholder={`Search within ${provider.name}…`} style={{width:"100%",background:"rgba(0,0,0,0.3)",border:hasQuery?`1px solid ${C.amber}40`:C.border,borderRadius:6,color:C.text,padding:"5px 10px 5px 29px",fontSize:12,outline:"none",transition:"border 0.15s"}}/>
                </div>
                {hasQuery&&<button onClick={()=>setQuery("")} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",padding:"0 2px",fontSize:18,lineHeight:1,flexShrink:0}} title="Clear search">×</button>}
                <button onClick={()=>{setProvider(null);setQuery("");if(scrollRef.current){window.__tvScrollToTop?window.__tvScrollToTop(scrollRef.current):(scrollRef.current.scrollTop=0);_c.scrollTop=0;}}} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",padding:"0 4px",flexShrink:0}}><XIcon size={10}/>Clear</button>
              </div>
            )}
            {/* Search bar — hidden when provider active (inline search is in banner above) */}
            {!provider&&<div onClick={e=>e.stopPropagation()} style={{display:"flex",gap:8,marginBottom:14}}>
              <div style={{flex:1,position:"relative"}}>
                <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><SearchIcon size={14} color={hasQuery?C.text:C.muted}/></div>
                <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search all movies…" style={{width:"100%",background:C.elevated,border:hasQuery?`1px solid ${C.blue}40`:C.border,borderRadius:8,color:C.text,padding:"9px 12px 9px 38px",fontSize:13,outline:"none",transition:"border 0.15s"}}/>
              </div>
              {(hasQuery||hasFilters)&&<button onClick={()=>{setQuery("");setFilters({});}} style={{background:C.elevated,border:C.border,borderRadius:8,padding:"0 14px",color:C.muted,fontSize:12,cursor:"pointer"}}>Clear all</button>}
            </div>}
            {/* Section pills — dim when in overlay mode */}
            <div onClick={e=>e.stopPropagation()} style={{display:"flex",gap:6,marginBottom:12}}>
              {SECTIONS.map(([id,label])=>{
                const active=!isOverlay&&section===id;
                return(<button key={id} onClick={()=>{setSection(id);setQuery("");setFilters({});setSortBy("Top Streaming");if(scrollRef.current){window.__tvScrollToTop?window.__tvScrollToTop(scrollRef.current):(scrollRef.current.scrollTop=0);_c.scrollTop=0;}}} style={{padding:"7px 18px",borderRadius:99,border:active?`1.5px solid ${C.blue}`:`0.5px solid ${C.hover}`,background:active?`${C.blue}1c`:C.surface,color:active?C.blue:C.muted,fontSize:12,fontWeight:active?600:400,cursor:"pointer",transition:"all 0.15s"}}>{label}</button>);
              })}
              {isOverlay&&<span style={{fontSize:11,color:C.muted,alignSelf:"center",marginLeft:4}}>{mode==="search"?(provider?`Searching ${provider.name}`:"Searching all movies"):"Filtered results"}</span>}
            </div>
            {/* Filters — hidden for In Theaters (small fixed list, no filtering needed) */}
            {!(section==="in-theaters"&&!isOverlay)&&<div onClick={e=>e.stopPropagation()} style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
              <FDrop label="Genre" cat="genre" options={MOVIE_GENRES}/>
              <FDrop label="Decade" cat="decade" options={DECADES}/>
              <FDrop label="Rating" cat="rating" options={RATINGS_OPT}/>
              <FDrop label="Runtime" cat="runtime" options={RUNTIMES}/>
              <FDrop label="Language" cat="language" options={LANGS}/>
              {hasFilters&&<button onClick={()=>setFilters({})} style={{background:"none",border:"none",color:C.muted,fontSize:10,cursor:"pointer",textDecoration:"underline",marginLeft:4}}>Clear filters ({activeFilterCount})</button>}
            </div>}
            {/* Sort bar — hidden for In Theaters browse, sort options hidden in text search mode */}
            {!(section==="in-theaters"&&!isOverlay)&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"0.5px solid #222",paddingBottom:12,marginBottom:18}}>
              <span style={{fontSize:11,color:C.muted}}>{displayLoading?"Loading…":`${displayItems.length} movies${displayHasMore?" · scroll for more":""}`}</span>
              {!hasQuery&&<div style={{display:"flex",alignItems:"center"}}>{SORTS.map((s,i)=>(<span key={s} style={{display:"flex",alignItems:"center"}}>{i>0&&<span style={{color:C.hover,margin:"0 7px",fontSize:11}}>|</span>}<button onClick={()=>setSortBy(s)} style={{background:"none",border:"none",padding:0,color:sortBy===s?C.amber:C.muted,fontSize:11,fontWeight:sortBy===s?600:400,cursor:"pointer"}}>{s}</button></span>))}</div>}
            </div>}
            {/* Results */}
            {displayLoading
              ?<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12}}>{Array(20).fill(0).map((_,i)=><SkeletonCard key={i}/>)}</div>
              :displayItems.length===0
                ?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:32,marginBottom:10}}>🎬</div><div style={{fontSize:13}}>{hasQuery?"No movies found for that search":hasFilters?"No movies match your filters":"Nothing here yet"}</div></div>
                :<>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12,marginBottom:8,animation:"fadeIn 0.2s ease"}}>
                    {displayItems.map(item=><Card key={item.id} item={item} watchlist={watchlist} setWatchlist={setWatchlist} watched={watched} setWatched={setWatched} goTo={goTo} showTotals={showTotals}/>)}
                  </div>
                  {/* Sentinel — always present, all modes */}
                  <div ref={setSentinel} style={{height:56,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {displayLoadingMore&&<div style={{fontSize:12,color:C.muted}}>Loading more…</div>}
                    {!displayHasMore&&displayItems.length>0&&<div style={{fontSize:11,color:C.muted}}>You've seen it all</div>}
                  </div>
                </>
            }
          </div>
        </div>
      );
    };

    // ── TV Shows Page ────────────────────────────────────────────────────────
    const _tvPageCache={};
    const TVShowsPage=({goTo,watchlist,setWatchlist,watched,setWatched,showTotals})=>{
      const _c=_tvPageCache;
      const scrollRef=useRef(null);
      const _restoring=useRef(!!(_c.browseItems?.length||_c.overlayItems?.length));
      // ── Browse state ──────────────────────────────────────────────────────
      const [section,setSection]=useState(_c.section||"trending");
      const [browseItems,setBrowseItems]=useState(_c.browseItems||[]);
      const [browsePage,setBrowsePage]=useState(_c.browsePage||1);
      const [browseHasMore,setBrowseHasMore]=useState(_c.browseHasMore!==undefined?_c.browseHasMore:true);
      const [browseLoading,setBrowseLoading]=useState(!(_c.browseItems?.length>0));
      const [browseLoadingMore,setBrowseLoadingMore]=useState(false);

      // ── Overlay state (search + filter — both support infinite scroll) ────
      const [query,setQuery]=useState(_c.query||"");
      const [filters,setFilters]=useState(_c.filters||{});
      const [overlayItems,setOverlayItems]=useState(_c.overlayItems||[]);
      const [overlayPage,setOverlayPage]=useState(_c.overlayPage||1);
      const [overlayHasMore,setOverlayHasMore]=useState(_c.overlayHasMore||false);
      const [overlayLoading,setOverlayLoading]=useState(false);
      const [overlayLoadingMore,setOverlayLoadingMore]=useState(false);

      // ── Shared ────────────────────────────────────────────────────────────
      const [sortBy,setSortBy]=useState(_c.sortBy||"Top Streaming");
      const [openFilter,setOpenFilter]=useState(null);
      const [provider,setProvider]=useState(_c.provider||null);

      const activeFilterCount=Object.values(filters).reduce((a,s)=>a+(s?.size||0),0);
      const hasQuery=query.trim().length>0;
      const hasFilters=activeFilterCount>0;
      const mode=hasQuery?"search":hasFilters?"filter":"browse";
      const isOverlay=mode!=="browse";
      // ── TMDB mapping tables ───────────────────────────────────────────────
      const TV_GENRE_MAP={"Action":10759,"Animation":16,"Comedy":35,"Crime":80,"Documentary":99,"Drama":18,"Family":10751,"Fantasy":10765,"Mystery":9648,"Reality":10764,"Sci-Fi":10765,"Thriller":80};
      const TV_STATUS_MAP={"Returning":0,"Ended":3,"Cancelled":4};
      // Maps streaming service name → TMDB network ID for its originals
      const ORIGINALS_NET_MAP={"Netflix":213,"HBO Max":49,"Prime Video":1024,"Disney+":2739,"Apple TV+":2552,"Hulu":453,"Paramount+":4330,"Peacock":3353};
      // Earliest date a show could have first aired and still be a true original — filters out
      // old shows that got revival seasons on the platform (KoTH, Futurama, etc.).
      // HBO has no cutoff since it's been making originals since the 1980s.
      const ORIGINALS_SINCE={"Netflix":"2013-01-01","Hulu":"2012-01-01","Prime Video":"2013-01-01","Disney+":"2019-11-01","Apple TV+":"2019-11-01","Paramount+":"2014-10-01","Peacock":"2020-07-01"};
      const originalsNetId=provider?.kind==="streaming"?ORIGINALS_NET_MAP[provider.name]:null;
      const SECTIONS=[["trending","Trending"],["top-rated","Top Rated"],...(originalsNetId?[["originals","Originals"]]:[])];


      // ── Browse fetcher ────────────────────────────────────────────────────
      const TODAY=new Date().toISOString().slice(0,10);
      const fetchBrowse=async(sec,pg,prov,sort)=>{
        try{
          // Originals: filter by the streaming service's own network ID
          if(sec==="originals"){
            const netId=ORIGINALS_NET_MAP[prov?.name];
            if(!netId)return{items:[],totalPages:1};
            const params={page:pg,"first_air_date.lte":TODAY,with_networks:netId};
            const since=ORIGINALS_SINCE[prov?.name];
            if(since)params["first_air_date.gte"]=since;
            if(!sort||sort==="Top Streaming")params.sort_by="popularity.desc";
            else if(sort==="Rating"){params.sort_by="vote_average.desc";params["vote_count.gte"]=50;}
            else if(sort==="Newest")params.sort_by="first_air_date.desc";
            else if(sort==="Oldest")params.sort_by="first_air_date.asc";
            else params.sort_by="name.asc";
            const d=await api("/discover/tv",params);
            return{items:(d.results||[]).map(r=>({...r,media_type:"tv"})),totalPages:d.total_pages||1};
          }
          // "Top Rated" section with "Top Streaming" sort → rank by rating instead of trending
          if(sec==="top-rated"&&(!sort||sort==="Top Streaming"))sort="Rating";
          // Top Streaming: use TMDB weekly trending
          if(!sort||sort==="Top Streaming"){
            if(prov){
              // Trending can't filter by provider — use discover popularity
              const params={page:pg,language:"en-US",with_original_language:"en",sort_by:"popularity.desc"};
              if(prov.kind==="network")params.with_networks=prov.id;
              else{params.with_watch_providers=prov.id;params.watch_region="US";}
              params["first_air_date.lte"]=TODAY;
              const d=await api("/discover/tv",params);
              return{items:(d.results||[]).map(r=>({...r,media_type:"tv"})),totalPages:d.total_pages||1};
            }
            const d=await api("/trending/tv/week",{page:pg});
            return{items:(d.results||[]).filter(r=>r.original_language==="en").map(r=>({...r,media_type:"tv"})),totalPages:Math.min(d.total_pages||1,10)};
          }
          // Other sorts: use discover
          const params={page:pg,language:"en-US",with_original_language:"en"};
          const sortParam=sort==="Rating"?"vote_average.desc":sort==="Newest"?"first_air_date.desc":sort==="Oldest"?"first_air_date.asc":"name.asc";
          params.sort_by=sortParam;
          if(sort==="Rating")params["vote_count.gte"]=50;
          params["first_air_date.lte"]=TODAY;
          if(prov){
            if(prov.kind==="network")params.with_networks=prov.id;
            else{params.with_watch_providers=prov.id;params.watch_region="US";}
          }
          const d=await api("/discover/tv",params);
          return{items:(d.results||[]).map(r=>({...r,media_type:"tv"})),totalPages:d.total_pages||1};
        }catch{return{items:[],totalPages:1};}
      };

      // ── Provider+text search: search text, then filter to provider ─────────
      // TMDB /search/tv has no provider param, so we fetch watch/providers
      // for each result and keep only titles actually on the selected service.
      const fetchProviderSearch=async(page,prov,q)=>{
        const d=await api("/search/tv",{query:q.trim(),language:"en-US",page});
        const results=(d.results||[]).map(r=>({...r,media_type:"tv"}));
        // Networks (AMC, FX…) don't map cleanly to flatrate — skip per-item check
        if(!prov||prov.kind==="network")return{items:results,totalPages:d.total_pages||1};
        const provData=await Promise.all(results.map(r=>api(`/tv/${r.id}/watch/providers`).catch(()=>null)));
        const filtered=results.filter((_,i)=>{
          const us=provData[i]?.results?.US;
          if(!us)return false;
          return[...(us.flatrate||[]),...(us.rent||[]),...(us.buy||[])].some(p=>p.provider_id===prov.id);
        });
        return{items:filtered,totalPages:d.total_pages||1};
      };

      // ── Filter base params builder ────────────────────────────────────────
      const buildFilterBase=(pg)=>{
        const base={page:pg,language:"en-US"};
        base.sort_by=sortBy==="Rating"?"vote_average.desc":sortBy==="Newest"?"first_air_date.desc":sortBy==="Oldest"?"first_air_date.asc":"popularity.desc";
        if(provider){
          if(provider.kind==="network")base.with_networks=provider.id;
          else{base.with_watch_providers=provider.id;base.watch_region="US";}
        }
        base.with_original_language="en"; // default English-only
        const genreSel=filters.genre;
        if(genreSel?.size>0){const ids=[...genreSel].map(g=>TV_GENRE_MAP[g]).filter(Boolean);if(ids.length)base.with_genres=[...new Set(ids)].join("|");}
        const langSel=filters.language;
        if(langSel?.size>0){const code=LANG_MAP[[...langSel][0]];if(code)base.with_original_language=code;}
        const ratingSel=filters.rating;
        if(ratingSel?.size>0){base["vote_average.gte"]=Math.min(...[...ratingSel].map(v=>parseFloat(v)));base["vote_count.gte"]=50;}
        const decadeSel=filters.decade;
        if(decadeSel?.size>0){
          const ranges=[...decadeSel].map(d=>DECADE_RANGE[d]).filter(Boolean);
          if(ranges.length){base["first_air_date.gte"]=ranges.reduce((a,r)=>a<r[0]?a:r[0],ranges[0][0])+"-01-01";base["first_air_date.lte"]=ranges.reduce((a,r)=>a>r[1]?a:r[1],ranges[0][1])+"-12-31";}
        }else{
          // Hide shows not yet aired
          base["first_air_date.lte"]=TODAY;
        }
        return base;
      };

      // ── Filter page fetcher (handles multi-status by merging calls) ───────
      const fetchFilterPage=async(pg)=>{
        const base=buildFilterBase(pg);
        const statusSel=filters.status;
        const seenIds=new Set();
        const merge=items=>{const out=[];items.forEach(r=>{if(!seenIds.has(r.id)){seenIds.add(r.id);out.push({...r,media_type:"tv"});}});return out;};
        if(statusSel?.size>0){
          let combined=[];let maxPages=1;
          for(const st of statusSel){
            const p={...base};
            if(st==="Mini-series")p.with_type=2;
            else if(TV_STATUS_MAP[st]!==undefined)p.with_status=TV_STATUS_MAP[st];
            const d=await api("/discover/tv",p);
            maxPages=Math.max(maxPages,d.total_pages||1);
            combined=[...combined,...(d.results||[])];
          }
          return{items:merge(combined),totalPages:maxPages};
        }
        const d=await api("/discover/tv",base);
        return{items:merge(d.results||[]),totalPages:d.total_pages||1};
      };

      // ── Browse: load on section/provider/sort change ──────────────────────
      useEffect(()=>{
        if(isOverlay)return; // don't re-fetch browse while overlay is active
        if(_restoring.current)return;
        let cancelled=false;
        isLoadingMoreRef.current=false;
        (async()=>{
          setBrowseLoading(true);setBrowseItems([]);setBrowsePage(1);setBrowseHasMore(true);
          const{items,totalPages}=await fetchBrowse(section,1,provider,sortBy);
          if(cancelled)return;
          setBrowseItems(items);setBrowseHasMore(1<totalPages);setBrowseLoading(false);
        })();
        return()=>{cancelled=true;};
      },[section,provider,sortBy,isOverlay]);

      // ── Search: debounced; uses provider-scoped discover when provider active ─
      useEffect(()=>{
        if(_restoring.current)return;
        if(!hasQuery){setOverlayItems([]);setOverlayPage(1);setOverlayHasMore(false);return;}
        isLoadingMoreRef.current=false;
        setOverlayLoading(true);setOverlayItems([]);setOverlayPage(1);setOverlayHasMore(false);
        const t=setTimeout(async()=>{
          try{
            if(provider){
              const{items,totalPages}=await fetchProviderSearch(1,provider,query);
              setOverlayItems(items);setOverlayHasMore(1<totalPages);
            }else{
              const d=await api("/search/tv",{query:query.trim(),language:"en-US",page:1});
              setOverlayItems((d.results||[]).filter(r=>r.original_language==="en").map(r=>({...r,media_type:"tv"})));
              setOverlayHasMore((d.total_pages||1)>1);
            }
          }catch{setOverlayItems([]);}
          setOverlayLoading(false);
        },350);
        return()=>clearTimeout(t);
      },[query,sortBy,provider]);

      // ── Filter: fetch page 1 whenever filters/sort/provider change ────────
      useEffect(()=>{
        if(hasQuery||!hasFilters)return;
        if(_restoring.current)return;
        let cancelled=false;
        isLoadingMoreRef.current=false;
        (async()=>{
          setOverlayLoading(true);setOverlayItems([]);setOverlayPage(1);setOverlayHasMore(false);
          try{
            const{items,totalPages}=await fetchFilterPage(1);
            if(cancelled)return;
            setOverlayItems(items);setOverlayHasMore(1<totalPages);
          }catch{if(!cancelled)setOverlayItems([]);}
          if(!cancelled)setOverlayLoading(false);
        })();
        return()=>{cancelled=true;};
      },[hasFilters,hasQuery,filters,sortBy,provider]);

      // ── Reset originals section when switching to a provider without originals ─
      useEffect(()=>{if(section==="originals"&&!ORIGINALS_NET_MAP[provider?.name])setSection("trending");},[provider]);
      // ── Clear restoring flag after initial effects fire ───────────────────
      useEffect(()=>{_restoring.current=false;},[]);
      // ── Persist state to cache on every change ────────────────────────────
      useEffect(()=>{Object.assign(_c,{section,browseItems,browsePage,browseHasMore,query,filters,overlayItems,overlayPage,overlayHasMore,sortBy,provider});},[section,browseItems,browsePage,browseHasMore,query,filters,overlayItems,overlayPage,overlayHasMore,sortBy,provider]);
      // ── Restore scroll position on mount ─────────────────────────────────
      useLayoutEffect(()=>{if(_c.scrollTop&&scrollRef.current)scrollRef.current.scrollTop=_c.scrollTop;},[]);

      // ── Mutex ref — prevents concurrent load-more calls (fixes race on scroll/zoom) ─
      const isLoadingMoreRef=useRef(false);

      // ── Always-fresh load-more ref — handles all three modes ─────────────
      const doLoadMoreRef=useRef(null);
      doLoadMoreRef.current=async()=>{
        if(isLoadingMoreRef.current)return; // hard mutex
        if(isOverlay){
          if(!overlayHasMore)return;
          isLoadingMoreRef.current=true;
          setOverlayLoadingMore(true);
          const next=overlayPage+1;
          try{
            let newItems=[];let totalPages=1;
            if(mode==="search"){
              if(provider){
                const res=await fetchProviderSearch(next,provider,query);
                newItems=res.items;totalPages=res.totalPages;
              }else{
                const d=await api("/search/tv",{query:query.trim(),language:"en-US",page:next});
                newItems=(d.results||[]).filter(r=>r.original_language==="en").map(r=>({...r,media_type:"tv"}));
                totalPages=d.total_pages||1;
              }
            }else{
              const res=await fetchFilterPage(next);
              newItems=res.items;totalPages=res.totalPages;
            }
            setOverlayItems(prev=>{const seen=new Set(prev.map(x=>x.id));return[...prev,...newItems.filter(x=>!seen.has(x.id))];});
            setOverlayPage(next);setOverlayHasMore(next<totalPages);
          }catch{}
          setOverlayLoadingMore(false);
          isLoadingMoreRef.current=false;
        }else{
          if(!browseHasMore)return;
          isLoadingMoreRef.current=true;
          setBrowseLoadingMore(true);
          const next=browsePage+1;
          const{items,totalPages}=await fetchBrowse(section,next,provider,sortBy);
          setBrowseItems(p=>{const seen=new Set(p.map(x=>x.id));return[...p,...items.filter(x=>!seen.has(x.id))];});
          setBrowsePage(next);setBrowseHasMore(next<totalPages);
          setBrowseLoadingMore(false);
          isLoadingMoreRef.current=false;
        }
      };

      // ── Callback ref for sentinel — works for all modes ───────────────────
      const observerRef=useRef(null);
      const setSentinel=useCallback(node=>{
        if(observerRef.current){observerRef.current.disconnect();observerRef.current=null;}
        if(!node)return;
        observerRef.current=new IntersectionObserver(entries=>{
          if(entries[0].isIntersecting)doLoadMoreRef.current?.();
        },{threshold:0,rootMargin:"400px"});
        observerRef.current.observe(node);
      },[]);

      // ── Client-side sort ──────────────────────────────────────────────────
      const applySort=arr=>[...arr].sort((a,b)=>{
        if(sortBy==="Rating")return(b.vote_average||0)-(a.vote_average||0);
        if(sortBy==="Newest")return new Date(b.first_air_date||0)-new Date(a.first_air_date||0);
        if(sortBy==="Oldest")return new Date(a.first_air_date||0)-new Date(b.first_air_date||0);
        return(b.popularity||0)-(a.popularity||0);
      });

      const displayItems=isOverlay?overlayItems:browseItems;
      const displayLoading=isOverlay?overlayLoading:browseLoading;
      const displayLoadingMore=isOverlay?overlayLoadingMore:browseLoadingMore;
      const displayHasMore=isOverlay?overlayHasMore:browseHasMore;

      // ── Filter dropdown ───────────────────────────────────────────────────
      const FDrop=({label,cat,options})=>{
        const sel=filters[cat]||new Set();
        const hasVal=sel.size>0;
        const isOpen=openFilter===cat;
        const toggle=v=>setFilters(p=>{const g=new Set(p[cat]||[]);g.has(v)?g.delete(v):g.add(v);return{...p,[cat]:g};});
        return(
          <div style={{position:"relative"}} onClick={e=>e.stopPropagation()}>
            <button onClick={()=>setOpenFilter(isOpen?null:cat)} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:6,border:hasVal?`1px solid ${C.purple}60`:`0.5px solid ${C.hover}`,background:hasVal?`${C.purple}14`:C.elevated,color:hasVal?C.purple:C.muted,fontSize:11,cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.12s"}}>
              {label}{hasVal?` · ${sel.size}`:""}
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points={isOpen?"18,15 12,9 6,15":"6,9 12,15 18,9"}/></svg>
            </button>
            {isOpen&&(
              <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,zIndex:200,background:C.elevated,border:C.border,borderRadius:8,padding:6,minWidth:150,maxHeight:220,overflowY:"auto",boxShadow:`0 8px 24px ${C.shadow}`}}>
                {options.map(opt=>{const on=sel.has(opt);return(<div key={opt} onClick={()=>toggle(opt)} style={{padding:"5px 9px",borderRadius:5,cursor:"pointer",fontSize:11,color:on?C.purple:C.text,background:on?`${C.purple}18`:"transparent",fontWeight:on?600:400}}>{opt}</div>);})}
                {hasVal&&<div onClick={()=>setFilters(p=>({...p,[cat]:new Set()}))} style={{borderTop:`0.5px solid ${C.hover}`,marginTop:4,padding:"5px 9px",fontSize:10,color:C.muted,cursor:"pointer",textAlign:"center"}}>Clear</div>}
              </div>
            )}
          </div>
        );
      };

      // ── Render ────────────────────────────────────────────────────────────
      return(
        <div style={{display:"flex",flex:1,overflow:"hidden"}}>
          <Sidebar activeProvider={provider} onSelect={p=>{setProvider(prev=>prev?.id===p.id&&prev?.kind===p.kind?null:p);setOpenFilter(null);if(scrollRef.current){window.__tvScrollToTop?window.__tvScrollToTop(scrollRef.current):(scrollRef.current.scrollTop=0);_c.scrollTop=0;}}}/>
          <div ref={scrollRef} onScroll={()=>{if(scrollRef.current)_c.scrollTop=scrollRef.current.scrollTop;}} style={{flex:1,overflow:"auto",padding:"20px 24px 40px",willChange:"transform"}} onClick={()=>setOpenFilter(null)}>
            {provider&&(
              <div onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,background:C.elevated,border:`1px solid ${C.amber}40`,borderRadius:8,padding:"6px 10px 6px 14px"}}>
                <span style={{fontSize:11,color:C.muted,flexShrink:0}}>Filtered by</span>
                <span style={{fontSize:12,fontWeight:600,color:C.amber,flexShrink:0}}>{provider.name}</span>
                <div style={{flex:1,position:"relative",marginLeft:4}}>
                  <div style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><SearchIcon size={12} color={hasQuery?C.text:C.muted}/></div>
                  <input value={query} onChange={e=>setQuery(e.target.value)} placeholder={`Search within ${provider.name}…`} style={{width:"100%",background:"rgba(0,0,0,0.3)",border:hasQuery?`1px solid ${C.amber}40`:C.border,borderRadius:6,color:C.text,padding:"5px 10px 5px 29px",fontSize:12,outline:"none",transition:"border 0.15s"}}/>
                </div>
                {hasQuery&&<button onClick={()=>setQuery("")} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",padding:"0 2px",fontSize:18,lineHeight:1,flexShrink:0}} title="Clear search">×</button>}
                <button onClick={()=>{setProvider(null);setQuery("");if(scrollRef.current){window.__tvScrollToTop?window.__tvScrollToTop(scrollRef.current):(scrollRef.current.scrollTop=0);_c.scrollTop=0;}}} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",padding:"0 4px",flexShrink:0}}><XIcon size={10}/>Clear</button>
              </div>
            )}
            {!provider&&<div onClick={e=>e.stopPropagation()} style={{display:"flex",gap:8,marginBottom:14}}>
              <div style={{flex:1,position:"relative"}}>
                <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><SearchIcon size={14} color={hasQuery?C.text:C.muted}/></div>
                <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search all TV shows…" style={{width:"100%",background:C.elevated,border:hasQuery?`1px solid ${C.blue}40`:C.border,borderRadius:8,color:C.text,padding:"9px 12px 9px 38px",fontSize:13,outline:"none",transition:"border 0.15s"}}/>
              </div>
              {(hasQuery||hasFilters)&&<button onClick={()=>{setQuery("");setFilters({});}} style={{background:C.elevated,border:C.border,borderRadius:8,padding:"0 14px",color:C.muted,fontSize:12,cursor:"pointer"}}>Clear all</button>}
            </div>}
            <div onClick={e=>e.stopPropagation()} style={{display:"flex",gap:6,marginBottom:12}}>
              {SECTIONS.map(([id,label])=>{
                const active=!isOverlay&&section===id;
                return(<button key={id} onClick={()=>{setSection(id);setQuery("");setFilters({});setSortBy("Top Streaming");if(scrollRef.current){window.__tvScrollToTop?window.__tvScrollToTop(scrollRef.current):(scrollRef.current.scrollTop=0);_c.scrollTop=0;}}} style={{padding:"7px 18px",borderRadius:99,border:active?`1.5px solid ${C.green}`:`0.5px solid ${C.hover}`,background:active?`${C.green}1c`:C.surface,color:active?C.green:C.muted,fontSize:12,fontWeight:active?600:400,cursor:"pointer",transition:"all 0.15s"}}>{label}</button>);
              })}
              {isOverlay&&<span style={{fontSize:11,color:C.muted,alignSelf:"center",marginLeft:4}}>{mode==="search"?(provider?`Searching ${provider.name}`:"Searching all shows"):"Filtered results"}</span>}
            </div>
            <div onClick={e=>e.stopPropagation()} style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
              <FDrop label="Genre" cat="genre" options={TV_GENRES}/>
              <FDrop label="Status" cat="status" options={TV_STATUS}/>
              <FDrop label="Rating" cat="rating" options={RATINGS_OPT}/>
              <FDrop label="Decade" cat="decade" options={DECADES}/>
              <FDrop label="Language" cat="language" options={LANGS}/>
              {hasFilters&&<button onClick={()=>setFilters({})} style={{background:"none",border:"none",color:C.muted,fontSize:10,cursor:"pointer",textDecoration:"underline",marginLeft:4}}>Clear filters ({activeFilterCount})</button>}
            </div>
            {/* Sort bar — sort options hidden in text search mode */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"0.5px solid #222",paddingBottom:12,marginBottom:18}}>
              <span style={{fontSize:11,color:C.muted}}>{displayLoading?"Loading…":`${displayItems.length} shows${displayHasMore?" · scroll for more":""}`}</span>
              {!hasQuery&&<div style={{display:"flex",alignItems:"center"}}>{SORTS.map((s,i)=>(<span key={s} style={{display:"flex",alignItems:"center"}}>{i>0&&<span style={{color:C.hover,margin:"0 7px",fontSize:11}}>|</span>}<button onClick={()=>setSortBy(s)} style={{background:"none",border:"none",padding:0,color:sortBy===s?C.amber:C.muted,fontSize:11,fontWeight:sortBy===s?600:400,cursor:"pointer"}}>{s}</button></span>))}</div>}
            </div>
            {displayLoading
              ?<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12}}>{Array(20).fill(0).map((_,i)=><SkeletonCard key={i}/>)}</div>
              :displayItems.length===0
                ?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:32,marginBottom:10}}>📺</div><div style={{fontSize:13}}>{hasQuery?"No shows found for that search":hasFilters?"No shows match your filters":"Nothing here yet"}</div></div>
                :<>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12,marginBottom:8,animation:"fadeIn 0.2s ease"}}>
                    {displayItems.map(item=><Card key={item.id} item={item} watchlist={watchlist} setWatchlist={setWatchlist} watched={watched} setWatched={setWatched} goTo={goTo} showTotals={showTotals}/>)}
                  </div>
                  {/* Sentinel — always present, triggers infinite scroll in ALL modes */}
                  <div ref={setSentinel} style={{height:56,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {displayLoadingMore&&<div style={{fontSize:12,color:C.muted}}>Loading more…</div>}
                    {!displayHasMore&&displayItems.length>0&&<div style={{fontSize:11,color:C.muted}}>You've seen it all</div>}
                  </div>
                </>
            }
          </div>
        </div>
      );
    };

    // ── Auth Page ────────────────────────────────────────────────────────────
    const AuthPage=({onLogin})=>{
      const [phase,setPhase]=useState("select"); // "select" | "auth" | "add"
      const [selectedUser,setSelectedUser]=useState(null);
      const [credential,setCredential]=useState("");
      const [credError,setCredError]=useState("");
      const [users,setUsers]=useState(()=>JSON.parse(localStorage.getItem("tvstats_users")||"[]"));
      const [apName,setApName]=useState("");
      const [apPin,setApPin]=useState("");
      const [apColor,setApColor]=useState(PROFILE_COLORS[0]);
      const [apError,setApError]=useState("");

      const slugify=(name)=>{
        const base=name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
        const taken=users.map(u=>u.email);
        if(!taken.includes(base))return base;
        let i=2;while(taken.includes(`${base}-${i}`))i++;return`${base}-${i}`;
      };

      const selectProfile=(u)=>{
        if(!u.pin&&!u.password){localStorage.setItem("tvstats_user",JSON.stringify(u));onLogin(u);return;}
        setSelectedUser(u);setCredential("");setCredError("");setPhase("auth");
      };

      const submitAuth=()=>{
        if(!credential){setCredError("Please enter your "+(selectedUser.pin?"PIN":"password")+".");return;}
        const ok=selectedUser.pin?credential===selectedUser.pin:credential===selectedUser.password;
        if(!ok){setCredError("Incorrect "+(selectedUser.pin?"PIN":"password")+".");return;}
        localStorage.setItem("tvstats_user",JSON.stringify(selectedUser));onLogin(selectedUser);
      };

      const submitAdd=()=>{
        const name=apName.trim();
        if(!name){setApError("Please enter a name.");return;}
        if(apPin&&(apPin.length!==4||!/^\d{4}$/.test(apPin))){setApError("PIN must be exactly 4 digits.");return;}
        const u={name,email:slugify(name),color:apColor,...(apPin?{pin:apPin}:{})};
        const updated=[...users,u];
        localStorage.setItem("tvstats_users",JSON.stringify(updated));
        setUsers(updated);setPhase("select");setApName("");setApPin("");setApError("");
      };

      const inp={width:"100%",background:C.elevated,border:`0.5px solid ${C.inputBorder}`,borderRadius:8,color:C.text,padding:"10px 12px",fontSize:13,outline:"none",fontFamily:"'DM Sans',sans-serif"};

      if(phase==="select"){
        return(
          <div style={{background:C.bg,height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <AppLogo size={32}/>
              <div style={{fontFamily:"'DM Serif Display',serif",fontSize:28,color:C.amber,letterSpacing:"-0.01em"}}>TV Stats</div>
            </div>
            <div style={{fontSize:13,color:C.muted,marginBottom:40}}>Who's watching?</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:24,justifyContent:"center",maxWidth:600,marginBottom:32}}>
              {users.map(u=>(
                <div key={u.email} onClick={()=>selectProfile(u)} style={{cursor:"pointer",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
                  <div
                    style={{width:88,height:88,borderRadius:16,background:u.color||C.amber,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,color:"#000",fontWeight:700,transition:"transform 0.12s,box-shadow 0.12s",boxShadow:"0 4px 16px rgba(0,0,0,0.4)"}}
                    onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.06)";e.currentTarget.style.boxShadow="0 8px 24px rgba(0,0,0,0.6)";}}
                    onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.4)";}}>
                    {u.name[0].toUpperCase()}
                  </div>
                  <div style={{fontSize:13,color:C.text,fontWeight:500}}>{u.name}</div>
                  {(u.pin||u.password)&&<div style={{fontSize:10,color:C.muted,marginTop:-6}}>🔒</div>}
                </div>
              ))}
              <div onClick={()=>{setApName("");setApPin("");setApColor(PROFILE_COLORS[0]);setApError("");setPhase("add");}} style={{cursor:"pointer",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
                <div
                  style={{width:88,height:88,borderRadius:16,border:`1.5px dashed ${C.muted}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,color:C.muted,transition:"border-color 0.12s,color 0.12s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=C.text;e.currentTarget.style.color=C.text;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=C.muted;e.currentTarget.style.color=C.muted;}}>
                  +
                </div>
                <div style={{fontSize:13,color:C.muted}}>Add Profile</div>
              </div>
            </div>
          </div>
        );
      }

      if(phase==="auth"){
        const isPin=!!selectedUser?.pin;
        return(
          <div style={{background:C.bg,height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>
            <div style={{width:320,background:C.surface,borderRadius:14,padding:36,border:C.border,animation:"fadeIn 0.2s ease",textAlign:"center"}}>
              <div style={{width:72,height:72,borderRadius:14,background:selectedUser?.color||C.amber,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,color:"#000",fontWeight:700,margin:"0 auto 14px"}}>
                {selectedUser?.name?.[0]?.toUpperCase()}
              </div>
              <div style={{fontSize:16,fontWeight:600,color:C.text,marginBottom:4}}>{selectedUser?.name}</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:22}}>Enter your {isPin?"4-digit PIN":"password"}</div>
              <input
                autoFocus
                type={isPin?"tel":"password"}
                value={credential}
                onChange={e=>{setCredential(isPin?e.target.value.replace(/\D/g,"").slice(0,4):e.target.value);setCredError("");}}
                onKeyDown={e=>e.key==="Enter"&&submitAuth()}
                placeholder={isPin?"••••":"Password"}
                style={{...inp,textAlign:"center",fontSize:isPin?22:14,letterSpacing:isPin?"0.3em":"normal",marginBottom:12}}
              />
              {credError&&<div style={{fontSize:12,color:"#e05555",marginBottom:12}}>{credError}</div>}
              <button onClick={submitAuth} style={{width:"100%",background:C.amber,color:"#000",border:"none",borderRadius:9,padding:"11px 0",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:14}}>Sign In</button>
              <button onClick={()=>{setPhase("select");setCredential("");setCredError("");}} style={{background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer"}}>← Back to profiles</button>
            </div>
          </div>
        );
      }

      if(phase==="add"){
        return(
          <div style={{background:C.bg,height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>
            <div style={{width:360,background:C.surface,borderRadius:14,padding:36,border:C.border,animation:"fadeIn 0.2s ease"}}>
              <div style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:22}}>Add Profile</div>
              <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:20}}>
                <div style={{width:56,height:56,borderRadius:10,background:apColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:"#000",fontWeight:700,flexShrink:0}}>
                  {apName.trim()?apName.trim()[0].toUpperCase():"?"}
                </div>
                <input value={apName} onChange={e=>setApName(e.target.value)} placeholder="Name (e.g. Mom, Dad, Nick)" autoFocus style={{...inp,flex:1}} onKeyDown={e=>e.key==="Enter"&&submitAdd()}/>
              </div>
              <div style={{marginBottom:18}}>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:8,letterSpacing:"0.06em",textTransform:"uppercase"}}>Color</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {PROFILE_COLORS.map(col=>(
                    <div key={col} onClick={()=>setApColor(col)} style={{width:28,height:28,borderRadius:7,background:col,cursor:"pointer",border:apColor===col?`2px solid ${C.text}`:"2px solid transparent",transition:"border 0.1s"}}/>
                  ))}
                </div>
              </div>
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:600,color:C.muted,marginBottom:5,letterSpacing:"0.06em",textTransform:"uppercase"}}>PIN <span style={{fontSize:10,fontWeight:400,textTransform:"none"}}>(optional, 4 digits)</span></div>
                <input type="tel" value={apPin} onChange={e=>setApPin(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="Leave blank for no PIN" style={inp}/>
              </div>
              {apError&&<div style={{fontSize:12,color:"#e05555",marginBottom:12}}>{apError}</div>}
              <div style={{display:"flex",gap:10}}>
                <button onClick={submitAdd} style={{flex:1,background:C.amber,color:"#000",border:"none",borderRadius:9,padding:"11px 0",fontSize:13,fontWeight:700,cursor:"pointer"}}>Create Profile</button>
                <button onClick={()=>{setPhase("select");setApName("");setApPin("");setApError("");}} style={{padding:"11px 16px",background:C.elevated,border:C.border,borderRadius:9,color:C.muted,fontSize:13,cursor:"pointer"}}>Cancel</button>
              </div>
            </div>
          </div>
        );
      }

      return null;
    };

    // ── Trailer Modal ────────────────────────────────────────────────────────
    const TrailerModal=({videoKey,onClose})=>{
      useEffect(()=>{const h=e=>{if(e.key==="Escape"){e.preventDefault();onClose();}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[onClose]);
      const ytUrl=`https://www.youtube.com/watch?v=${videoKey}`;
      const openInBrowser=()=>{
        try{webkit.messageHandlers.openURL.postMessage(ytUrl);}catch(e){window.open(ytUrl);}
      };
      const thumb=`https://img.youtube.com/vi/${videoKey}/hqdefault.jpg`;
      return(
        <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>
          <div onClick={e=>{e.stopPropagation();openInBrowser();}} style={{width:"min(860px,90vw)",aspectRatio:"16/9",background:"#000",borderRadius:10,overflow:"hidden",position:"relative",cursor:"pointer"}}>
            <img src={thumb} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}} />
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{width:72,height:72,borderRadius:"50%",background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid rgba(255,255,255,0.8)"}}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
              </div>
            </div>
            <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"10px 14px",background:"linear-gradient(transparent,rgba(0,0,0,0.85))",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{color:"#fff",fontSize:13,fontWeight:500}}>Watch Trailer on YouTube</span>
              <button onClick={e=>{e.stopPropagation();onClose();}} style={{background:"rgba(0,0,0,0.5)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:6,padding:"4px 10px",color:"#fff",cursor:"pointer",fontSize:12}}>✕ Close</button>
            </div>
          </div>
        </div>
      );
    };

    // ── Watched Popup ────────────────────────────────────────────────────────
    const WatchedPopup=({title,onClose,onSave,airDate})=>{
      useEffect(()=>{const h=e=>{if(e.key==="Escape"){e.preventDefault();onClose();}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[onClose]);
      const now=new Date();
      const [showPicker,setShowPicker]=useState(false);
      const [date,setDate]=useState(now.toISOString().slice(0,10));
      const [time,setTime]=useState(now.toTimeString().slice(0,5));
      const saveDateTime=()=>{
        const [y,mo,d]=date.split("-").map(Number);
        const [h,m]=time.split(":").map(Number);
        onSave(new Date(y,mo-1,d,h,m).toISOString());
      };
      const saveAirDate=()=>{
        const [y,mo,d]=airDate.split("-").map(Number);
        onSave(new Date(y,mo-1,d,12,0).toISOString());
      };
      const fmtAirDate=airDate?new Date(airDate+"T12:00:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}):null;
      return ReactDOM.createPortal(
        <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",background:C.overlay,backdropFilter:"blur(2px)"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:C.elevated,border:C.border,borderRadius:12,padding:24,width:300,display:"flex",flexDirection:"column",gap:10,animation:"fadeIn 0.15s ease"}}>
            <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:2}}>Mark as Watched</div>
            <div style={{fontSize:14,fontWeight:500,color:C.text,marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{title}</div>
            {!showPicker?(<>
              <button onClick={()=>onSave(new Date().toISOString())} style={{background:C.green,color:"#000",border:"none",borderRadius:8,padding:"10px 0",fontSize:13,fontWeight:700,cursor:"pointer"}}>Just finished it</button>
              {fmtAirDate&&<button onClick={saveAirDate} style={{background:C.surface,color:C.text,border:C.border,borderRadius:8,padding:"10px 0",fontSize:13,fontWeight:500,cursor:"pointer"}}>On air date ({fmtAirDate})</button>}
              <button onClick={()=>setShowPicker(true)} style={{background:C.surface,color:C.text,border:C.border,borderRadius:8,padding:"10px 0",fontSize:13,fontWeight:500,cursor:"pointer"}}>Another time…</button>
            </>):(<>
              <div style={{display:"flex",gap:8}}>
                <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{flex:1,background:C.surface,border:C.border,borderRadius:8,padding:"9px 10px",color:C.text,fontSize:13,outline:"none",minWidth:0,colorScheme:"dark"}}/>
                <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={{width:90,background:C.surface,border:C.border,borderRadius:8,padding:"9px 10px",color:C.text,fontSize:13,outline:"none",flexShrink:0,colorScheme:"dark"}}/>
              </div>
              <button onClick={saveDateTime} style={{background:C.green,color:"#000",border:"none",borderRadius:8,padding:"10px 0",fontSize:13,fontWeight:700,cursor:"pointer"}}>Save</button>
            </>)}
            <button onClick={onClose} style={{background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer"}}>Cancel</button>
          </div>
        </div>,
        document.body
      );
    };

    // ── Watched Pill ─────────────────────────────────────────────────────────
    const WatchedPill=({watchEntry,onUnwatch})=>{
      const [hover,setHover]=useState(false);
      const dates=watchEntry?.dates||(watchEntry?.date?[watchEntry.date]:[]);
      const count=dates.length;
      const label=count===1?"WATCHED":`${count} WATCHES`;
      const fmt=(iso)=>{try{return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});}catch{return iso;}};
      return(
        <div style={{position:"relative",display:"inline-flex",alignItems:"center",gap:5}}
          onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>
          <div style={{display:"flex",alignItems:"center",gap:5,background:`${C.green}22`,border:`1px solid ${C.green}60`,borderRadius:6,padding:"4px 10px",boxShadow:`0 0 10px ${C.green}20`}}>
            <CheckIcon size={10} color={C.green}/>
            <span style={{fontSize:11,fontWeight:700,color:C.green,letterSpacing:"0.06em"}}>{label}</span>
          </div>
