      const directors=crew.filter(c=>c.job==="Director").map(c=>c.name);
      const writers=crew.filter(c=>c.department==="Writing"||c.job==="Teleplay"||c.job==="Story").map(c=>c.name);
      const cast=detail?.credits?.cast||[];
      const trailerKey=detail?.videos?.results?.find(v=>v.type==="Trailer"&&v.site==="YouTube")?.key;
      if(loading)return(<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted}}>Loading…</div>);
      return(<div style={{flex:1,overflow:"auto",padding:"24px 32px",willChange:"transform",animation:"fadeIn 0.18s ease"}}>
        {popup&&<WatchedPopup title={`${show.name} — ${ep.name}`} onClose={()=>setPopup(false)} onSave={markW} airDate={ep.air_date}/>}
        <Breadcrumb items={[{label:"TV Shows",onClick:()=>goTo("tv-page")},{label:show.name,onClick:()=>goTo("tv-detail",show)},{label:season.name||`Season ${season.season_number}`,onClick:()=>goTo("episode-list",{show,season})},{label:badge}]}/>
        {/* Still + nav */}
        <div style={{display:"flex",gap:24,marginBottom:24}}>
          <div style={{flex:2,position:"relative",background:C.elevated,borderRadius:10,overflow:"hidden",aspectRatio:"16/9",maxWidth:640}}>
            {ep.still_path?<img src={img(ep.still_path,"w780")} alt={ep.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,opacity:0.15}}>📺</div>}
            <div style={{position:"absolute",top:10,left:10,background:"rgba(0,0,0,0.7)",borderRadius:4,padding:"3px 8px",fontSize:10,fontWeight:600,color:"#ccc",letterSpacing:"0.04em"}}>{badge}</div>
            {ep.vote_average>0&&<div style={{position:"absolute",bottom:10,right:10,display:"flex",alignItems:"center",gap:4,background:"rgba(0,0,0,0.72)",backdropFilter:"blur(4px)",borderRadius:5,padding:"4px 8px"}}>
              <span style={{fontSize:9,fontWeight:700,color:C.amber,letterSpacing:"0.05em"}}>TMDB</span>
              <span style={{fontSize:13,fontWeight:700,color:C.text,lineHeight:1}}>{(ep.vote_average/10*100).toFixed(0)}%</span>
              <span style={{fontSize:9,color:C.muted,marginLeft:2}}>★ {ep.vote_average.toFixed(1)}</span>
            </div>}
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",gap:10}}>
            {prevEp&&(<div onClick={()=>goTo("episode-detail",{show,season:{season_number:prevEp.season_number,name:`Season ${prevEp.season_number}`},episode:{...episode,episode_number:prevEp.episode_number}})} style={{background:C.elevated,borderRadius:8,padding:"10px 14px",border:C.border,cursor:"pointer",display:"flex",alignItems:"center",gap:8,opacity:0.7,transition:"opacity 0.15s"}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0.7}><ChevronLeft size={14} color={C.muted}/><div><div style={{fontSize:9,color:C.muted,letterSpacing:"0.06em",textTransform:"uppercase"}}>Previous</div><div style={{fontSize:11,color:C.text}}>S{prevEp.season_number} · E{prevEp.episode_number}</div></div></div>)}
            {nextEp&&<div onClick={()=>goTo("episode-detail",{show,season:{season_number:nextEp.season_number,name:`Season ${nextEp.season_number}`},episode:{...episode,episode_number:nextEp.episode_number}})} style={{background:C.elevated,borderRadius:8,padding:"10px 14px",border:C.border,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,transition:"border 0.15s"}} onMouseEnter={e=>e.currentTarget.style.border=`0.5px solid ${C.hover}`} onMouseLeave={e=>e.currentTarget.style.border=C.border}><div><div style={{fontSize:9,color:C.muted,letterSpacing:"0.06em",textTransform:"uppercase"}}>Next</div><div style={{fontSize:11,color:C.text}}>S{nextEp.season_number} · E{nextEp.episode_number}</div></div><ChevronRight size={14} color={C.muted}/></div>}
          </div>
        </div>
        {/* Title + actions */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:0,paddingBottom:16,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>

          <div>
            <h1 style={{fontFamily:"'DM Serif Display',serif",fontSize:26,fontWeight:400,color:C.text,marginBottom:6}}>{ep.name}</h1>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span style={{fontSize:10,fontWeight:700,background:`${C.green}1a`,color:C.green,borderRadius:3,padding:"1.5px 5px",letterSpacing:"0.04em"}}>{badge}</span>
            </div>
          </div>
          <div style={{display:"flex",gap:10,flexShrink:0,alignItems:"center"}}>
            {trailerKey&&<button onClick={()=>setTrailer(trailerKey)} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 16px",borderRadius:8,background:"rgba(0,0,0,0.5)",border:"1px solid rgba(255,255,255,0.15)",color:"#ccc",fontSize:12,fontWeight:500,cursor:"pointer"}}><PlayIcon size={11} color="#ccc"/>Clip</button>}
            <button onClick={()=>setPopup(true)} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:6,background:"rgba(0,0,0,0.5)",border:"1px solid rgba(255,255,255,0.15)",color:"#ccc",fontSize:11,fontWeight:600,cursor:"pointer",letterSpacing:"0.04em"}}><CheckIcon size={10} color="#ccc"/>{isW?"WATCH AGAIN":"MARK WATCHED"}</button>
            {isW&&<WatchedPill watchEntry={watched.get(epKey)} onUnwatch={unW}/>}
          </div>
        </div>
        {ep.overview&&<p style={{fontSize:13,color:"#ffffff",lineHeight:1.7,marginTop:20,marginBottom:22,maxWidth:700,fontWeight:300}}>{ep.overview}</p>}
        {/* Episode details grid */}
        {(ep.air_date||ep.runtime||directors.length>0||writers.length>0)&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"2px 16px",marginBottom:20,background:C.elevated,borderRadius:8,padding:"8px 12px",border:C.border}}>
            {[ep.air_date&&["Air Date",ep.air_date],ep.runtime&&["Runtime",`${ep.runtime}m`],directors.length>0&&["Director",directors.join(", ")],writers.length>0&&[`Writer${writers.length>1?"s":""}`,writers.slice(0,4).join(", ")]].filter(Boolean).map(([k,v])=>(
              <div key={k} style={{padding:"3px 0"}}><span style={{fontSize:9,color:C.muted,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>{k}</span><div style={{fontSize:11,color:C.text,marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{v}</div></div>
            ))}
          </div>
        )}
        {/* Full episode cast — large portrait grid, everyone credited */}
        {cast.length>0&&(<div style={{marginBottom:28}}>
          <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:12}}>Episode Cast</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(88px,1fr))",gap:12}}>
            {cast.map(p=>{const h=actorHrsMap.get(p.id)||0;return(
              <div key={p.id} onClick={()=>goTo("person-detail",p)} style={{textAlign:"center",cursor:"pointer"}}>
                <div style={{width:"100%",paddingTop:"150%",position:"relative",borderRadius:6,overflow:"hidden",background:C.elevated,border:C.border,marginBottom:5,transition:"box-shadow 0.15s"}} onMouseEnter={e=>e.currentTarget.style.boxShadow=`0 0 0 2px ${C.purple}`} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                  {p.profile_path
                    ?<img src={img(p.profile_path,"w185")} alt={p.name} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",objectPosition:"top"}}/>
                    :<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,opacity:0.2}}>👤</div>}
                  {h>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,padding:"5px 4px 6px",textAlign:"center",pointerEvents:"none"}}><span style={{fontSize:9,fontWeight:700,color:C.green,letterSpacing:"0.03em",textShadow:"0 1px 4px rgba(0,0,0,0.8)"}}>{h>=1?`${h.toFixed(1)}h`:`${Math.round(h*60)}m`} watched</span></div>}
                </div>
                <div style={{fontSize:10,fontWeight:500,color:C.text,lineHeight:1.3,marginBottom:2}}>{p.name}</div>
                <div style={{fontSize:9,color:C.muted,lineHeight:1.3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.character}</div>
              </div>
            );})}
          </div>
        </div>)}
        {trailer&&<TrailerModal videoKey={trailer} onClose={()=>setTrailer(null)}/>}
      </div>);
    };

    // ── Watchlist Page ───────────────────────────────────────────────────────
    const _watchlistPageCache={};
    const WatchlistPage=({watchlist,setWatchlist,watched,setWatched,goTo,showTotals})=>{
      const _c=_watchlistPageCache;
      const [filter,setFilter]=useState(_c.filter||"all");
      const [search,setSearch]=useState(_c.search||"");
      useEffect(()=>{Object.assign(_c,{filter,search});},[filter,search]);
      const scrollRef=useRef(null);
      useEffect(()=>{if(scrollRef.current&&_c.scrollTop)scrollRef.current.scrollTop=_c.scrollTop;},[]);
      const items=[...watchlist.values()];
      const filtered=items.filter(item=>{
        if(filter==="movies"&&item.media_type!=="movie")return false;
        if(filter==="tv"&&item.media_type!=="tv")return false;
        if(search&&!(item.title||item.name||"").toLowerCase().includes(search.toLowerCase()))return false;
        return true;
      });
      return(<div ref={scrollRef} onScroll={()=>{if(scrollRef.current)_c.scrollTop=scrollRef.current.scrollTop;}} style={{flex:1,overflow:"auto",padding:"24px 32px",willChange:"transform",animation:"fadeIn 0.18s ease"}}>
        <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:16,flexWrap:"wrap"}}>
          <div style={{position:"relative",flex:1,minWidth:200}}><div style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><SearchIcon size={13} color={C.muted}/></div><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filter watchlist…" style={{width:"100%",background:C.elevated,border:C.border,borderRadius:8,color:C.text,padding:"8px 12px 8px 32px",fontSize:12,outline:"none"}}/></div>
          <div style={{display:"flex",gap:6}}>{[["all","All"],["movies","Movies"],["tv","TV"]].map(([v,l])=><FilterPill key={v} label={l} active={filter===v} onClick={()=>setFilter(v)} color={C.amber}/>)}</div>
        </div>
        <div style={{fontSize:11,color:C.muted,marginBottom:16}}>{filtered.length} item{filtered.length!==1?"s":""}</div>
        {filtered.length===0?(<div style={{textAlign:"center",padding:"80px 0",color:C.muted}}><div style={{fontSize:40,marginBottom:12}}>👁</div><div style={{fontSize:14}}>Your watchlist is empty</div><div style={{fontSize:12,marginTop:6}}>Click the eye icon on any movie or show to add it here — so you never forget what you want to watch next.</div></div>)
        :(<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12}}>{filtered.map(item=><Card key={item.id} item={item} watchlist={watchlist} setWatchlist={setWatchlist} watched={watched} setWatched={setWatched} goTo={goTo} showTotals={showTotals}/>)}</div>)}
      </div>);
    };

    // ── History Page ─────────────────────────────────────────────────────────
    const _historyPageCache={};
    const HistoryPage=({watched,setWatched,watchlist,setWatchlist,goTo,initialDate})=>{
      const _c=_historyPageCache;
      const [filter,setFilter]=useState(initialDate?("all"):(_c.filter||"all"));
      const [search,setSearch]=useState(initialDate?(""):(_c.search||""));
      const [jumpDate,setJumpDate]=useState(initialDate||_c.jumpDate||null);
      const [visibleDays,setVisibleDays]=useState(initialDate?9999:(_c.visibleDays||7));
      const [hPeriod,setHPeriod]=useState(initialDate?("all"):(_c.hPeriod||"all"));
      const [hCustomStart,setHCustomStart]=useState(initialDate?(""):(_c.hCustomStart||""));
      const [hCustomEnd,setHCustomEnd]=useState(initialDate?(""):(_c.hCustomEnd||""));
      const [showHCustomPicker,setShowHCustomPicker]=useState(false);
      useEffect(()=>{Object.assign(_c,{filter,search,jumpDate,visibleDays,hPeriod,hCustomStart,hCustomEnd});},[filter,search,jumpDate,visibleDays,hPeriod,hCustomStart,hCustomEnd]);
      const sentinelRef=useRef(null);
      const scrollRef=useRef(null);
      useEffect(()=>{if(scrollRef.current&&_c.scrollTop)scrollRef.current.scrollTop=_c.scrollTop;},[]);

      // All items sorted newest-first — expand multi-date entries so each watch appears separately
      const allItems=useMemo(()=>{
        const rows=[];
        watched.forEach(({item,date,dates},id)=>{
          const all=dates&&dates.length?dates:(date?[date]:[]);
          all.forEach((d,i)=>rows.push({...item,watchedAt:d,watchedId:`${id}\x00${i}`}));
        });
        return rows.sort((a,b)=>new Date(b.watchedAt)-new Date(a.watchedAt));
      },[watched]);

      // Filter by type + jumpDate + date range + search
      const filtered=useMemo(()=>allItems.filter(i=>{
        if(filter==="movies"&&i.media_type!=="movie")return false;
        if(filter==="tv"&&i.media_type!=="tv"&&i.media_type!=="episode")return false;
        if(jumpDate&&new Date(i.watchedAt).toDateString()!==jumpDate)return false;
        if(hPeriod!=="all"&&hPeriod!=="custom"){
          const now=new Date(),d=new Date(i.watchedAt);
          if(hPeriod==="week"){const s=new Date(now);s.setDate(now.getDate()-now.getDay());s.setHours(0,0,0,0);if(d<s)return false;}
          else if(hPeriod==="month"){if(d.getMonth()!==now.getMonth()||d.getFullYear()!==now.getFullYear())return false;}
          else if(hPeriod==="year"){if(d.getFullYear()!==now.getFullYear())return false;}
        }
        if(hPeriod==="custom"&&i.watchedAt){
          const dt=new Date(i.watchedAt);
          if(hCustomStart&&/^\d{4}-\d{2}-\d{2}$/.test(hCustomStart)&&dt<new Date(hCustomStart+"T00:00:00"))return false;
          if(hCustomEnd&&/^\d{4}-\d{2}-\d{2}$/.test(hCustomEnd)&&dt>new Date(hCustomEnd+"T23:59:59"))return false;
        }
        if(search.trim()){
          const q=search.trim().toLowerCase();
          const searchable=[(i.title||""),(i.name||""),(i.showName||"")].join(" ").toLowerCase();
          if(!searchable.includes(q))return false;
        }
        return true;
      }),[allItems,filter,jumpDate,hPeriod,hCustomStart,hCustomEnd,search]);

      // Group by date, then slice to visibleDays groups
      const allGroups=useMemo(()=>{
        const g={};
        filtered.forEach(i=>{const d=new Date(i.watchedAt).toDateString();if(!g[d])g[d]=[];g[d].push(i);});
        return Object.entries(g); // [[dateStr,[items]], ...]
      },[filtered]);

      const visibleGroups=allGroups.slice(0,visibleDays);
      const hasMore=visibleGroups.length<allGroups.length;

      // Infinite scroll sentinel
      useEffect(()=>{
        if(!sentinelRef.current||!hasMore)return;
        const ob=new IntersectionObserver(entries=>{
          if(entries[0].isIntersecting)setVisibleDays(d=>d+7);
        },{threshold:0.1});
        ob.observe(sentinelRef.current);
        return()=>ob.disconnect();
      },[hasMore,visibleDays]);

      // Reset visible days when filter/search/date changes
      useEffect(()=>{if(!initialDate)setVisibleDays(7);},[filter,search,jumpDate,hPeriod,hCustomStart,hCustomEnd]);

      const removeItem=(watchedId)=>setWatched(p=>{
        const n=new Map(p);
        const resolveKey=sk=>{if(n.has(sk))return sk;const num=Number(sk);if(!isNaN(num)&&n.has(num))return num;return sk;};
        const sep=watchedId.indexOf('\x00');
        if(sep===-1){const k=resolveKey(watchedId);n.delete(k);return n;}
        const key=resolveKey(watchedId.slice(0,sep)),idx=parseInt(watchedId.slice(sep+1));
        const ex=n.get(key);
        if(!ex)return n;
        const all=ex.dates&&ex.dates.length?[...ex.dates]:(ex.date?[ex.date]:[]);
        all.splice(idx,1);
        if(all.length===0)n.delete(key);
        else n.set(key,{...ex,dates:all,date:all[0]});
        return n;
      });
      const jumpDateLabel=jumpDate?new Date(jumpDate).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}):null;

      return(<div ref={scrollRef} onScroll={()=>{if(scrollRef.current)_c.scrollTop=scrollRef.current.scrollTop;}} style={{flex:1,overflow:"auto",padding:"24px 32px",willChange:"transform",animation:"fadeIn 0.18s ease"}}>
        {/* Controls row */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          <div style={{display:"flex",gap:6,flexShrink:0}}>{[["all","All"],["movies","Movies"],["tv","TV"]].map(([v,l])=><FilterPill key={v} label={l} active={filter===v} onClick={()=>setFilter(v)} color={C.amber}/>)}</div>
          {/* Search bar */}
          <div style={{position:"relative",flex:1,minWidth:160,maxWidth:320}}>
            <svg style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}} width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search history…" style={{width:"100%",background:C.elevated,border:search?`1px solid ${C.amber}40`:C.border,borderRadius:8,color:C.text,padding:"6px 10px 6px 30px",fontSize:12,outline:"none",transition:"border 0.15s"}}/>
            {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:14,lineHeight:1}}>×</button>}
          </div>
          {jumpDate&&<div style={{display:"flex",alignItems:"center",gap:6,background:"#1e2a1e",border:`1px solid ${C.green}44`,borderRadius:99,padding:"4px 10px 4px 12px",fontSize:12,color:C.green,flexShrink:0}}>
            <span>Viewing {jumpDateLabel}</span>
            <button onClick={()=>setJumpDate(null)} style={{background:"none",border:"none",color:C.green,cursor:"pointer",fontSize:14,lineHeight:1,padding:"0 0 0 2px",opacity:0.8}}>×</button>
          </div>}
        </div>
        {/* Date range pills */}
        <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
          {[["all","All Time"],["week","This Week"],["month","This Month"],["year","This Year"]].map(([v,l])=><button key={v} onClick={()=>{setHPeriod(v);setShowHCustomPicker(false);}} style={{padding:"4px 11px",borderRadius:99,border:hPeriod===v?`1px solid ${C.amber}60`:`0.5px solid ${C.hover}`,background:hPeriod===v?`${C.amber}18`:"transparent",color:hPeriod===v?C.amber:C.muted,fontSize:11,fontWeight:500,cursor:"pointer",transition:"all 0.13s"}}>{l}</button>)}
          <button onClick={()=>{setHPeriod("custom");setShowHCustomPicker(true);}} style={{padding:"4px 11px",borderRadius:99,border:hPeriod==="custom"?`1px solid ${C.amber}60`:`0.5px solid ${C.hover}`,background:hPeriod==="custom"?`${C.amber}18`:"transparent",color:hPeriod==="custom"?C.amber:C.muted,fontSize:11,fontWeight:500,cursor:"pointer",transition:"all 0.13s"}}>Custom Date</button>
          {hPeriod==="custom"&&showHCustomPicker&&<div style={{display:"flex",alignItems:"center",gap:8,marginLeft:4}}>
            <input type="date" value={hCustomStart} onChange={e=>setHCustomStart(e.target.value)} style={{background:C.surface,border:`0.5px solid ${C.inputBorder}`,color:C.text,borderRadius:7,padding:"4px 8px",fontSize:11,outline:"none",colorScheme:"dark"}}/>
            <span style={{fontSize:11,color:C.muted}}>to</span>
            <input type="date" value={hCustomEnd} onChange={e=>setHCustomEnd(e.target.value)} style={{background:C.surface,border:`0.5px solid ${C.inputBorder}`,color:C.text,borderRadius:7,padding:"4px 8px",fontSize:11,outline:"none",colorScheme:"dark"}}/>
          </div>}
        </div>
        <div style={{fontSize:11,color:C.muted,marginBottom:20}}>{filtered.length} item{filtered.length!==1?"s":""}</div>

        {filtered.length===0
          ?(<div style={{textAlign:"center",padding:"80px 0",color:C.muted}}>
              <div style={{fontSize:40,marginBottom:12}}>📅</div>
              <div style={{fontSize:14}}>{search?"No results for that search":jumpDate?"No items watched on this day":"Nothing in your history yet"}</div>
              <div style={{fontSize:12,marginTop:6}}>
                {(search||jumpDate)&&<button onClick={()=>{setSearch("");setJumpDate(null);}} style={{background:"none",border:"none",color:C.amber,cursor:"pointer",fontSize:12,textDecoration:"underline"}}>Clear filters</button>}
              </div>
            </div>)
          :(<>
              {visibleGroups.map(([dateStr,items])=>(
                <div key={dateStr} style={{marginBottom:32}}>
                  <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,color:C.text}}>{relDate(items[0].watchedAt)}</div>
                      <div style={{fontSize:11,color:C.muted}}>{new Date(items[0].watchedAt).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</div>
                    </div>
                    <div style={{flex:1,height:"0.5px",background:C.hover}}/>
                    <span style={{fontSize:11,color:C.muted}}>{items.length} item{items.length!==1?"s":""}</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12}}>
                    {items.map(item=><HistoryCard key={item.watchedId} item={item} onRemove={()=>removeItem(item.watchedId)} goTo={goTo}/>)}
                  </div>
                </div>
              ))}
              {hasMore&&<div ref={sentinelRef} style={{textAlign:"center",padding:"24px 0",color:C.muted,fontSize:12}}>Loading more…</div>}
            </>)
        }
      </div>);
    };

    // ── Stats Page ───────────────────────────────────────────────────────────
    const GENRE_ID_TO_NAME={28:"Action",12:"Adventure",16:"Animation",35:"Comedy",80:"Crime",99:"Documentary",18:"Drama",10751:"Family",14:"Fantasy",36:"History",27:"Horror",10402:"Music",9648:"Mystery",10749:"Romance",878:"Sci-Fi",53:"Thriller",10752:"War",37:"Western",10759:"Action & Adventure",10765:"Sci-Fi & Fantasy",10768:"War & Politics"};
    const STUDIO_NORM_MAP={"Netflix Studios":"Netflix","Netflix Original":"Netflix","Home Box Office":"HBO","HBO Films":"HBO","HBO Max":"HBO","HBO Documentary Films":"HBO","Marvel Entertainment":"Marvel Studios","Marvel Television":"Marvel Studios","Walt Disney Pictures":"Disney","Walt Disney Animation Studios":"Disney","Walt Disney Productions":"Disney","Pixar Animation Studios":"Pixar","20th Century Fox":"20th Century Studios","20th Century Fox Television":"20th Century Studios","Fox 2000 Pictures":"20th Century Studios","Universal Pictures":"Universal","Universal Television":"Universal","Warner Bros. Pictures":"Warner Bros.","Warner Bros. Television":"Warner Bros.","Paramount Pictures":"Paramount","Paramount Television":"Paramount"};
    const normalizeStudio=n=>STUDIO_NORM_MAP[n]||n;
    const _statsPageCache={};
    const StatsPage=({watched,watchlist,goTo})=>{
      const _c=_statsPageCache;
      const [period,setPeriod]=useState(_c.period||"month");
      const [hoveredBar,setHoveredBar]=useState(null);
      const [providerCounts,setProviderCounts]=useState(null);
      const [creditData,setCreditData]=useState(null);
      const [showGenreMap,setShowGenreMap]=useState(()=>{try{return new Map(JSON.parse(localStorage.getItem("tvstats_show_genres")||"[]"));}catch{return new Map();}});
      const [showNetworkMap,setShowNetworkMap]=useState(()=>{try{return new Map(JSON.parse(localStorage.getItem("tvstats_show_networks")||"[]"));}catch{return new Map();}});
      const [customStart,setCustomStart]=useState(_c.customStart||"");
      const [customEnd,setCustomEnd]=useState(_c.customEnd||"");
      const [showCustomPicker,setShowCustomPicker]=useState(false);
      const [mediaType,setMediaType]=useState(_c.mediaType||"all");
      const [studioExpanded,setStudioExpanded]=useState(_c.studioExpanded||false);
      const showGenreMapRef=useRef(showGenreMap);
      useEffect(()=>{showGenreMapRef.current=showGenreMap;},[showGenreMap]);
      const showNetworkMapRef=useRef(showNetworkMap);
      useEffect(()=>{showNetworkMapRef.current=showNetworkMap;},[showNetworkMap]);
      const [movieStudioMap,setMovieStudioMap]=useState(()=>{try{return new Map(JSON.parse(localStorage.getItem("tvstats_movie_studios")||"[]"));}catch{return new Map();}});
      const movieStudioMapRef=useRef(movieStudioMap);
      useEffect(()=>{movieStudioMapRef.current=movieStudioMap;},[movieStudioMap]);
      useEffect(()=>{Object.assign(_c,{period,customStart,customEnd,mediaType,studioExpanded});},[period,customStart,customEnd,mediaType,studioExpanded]);
      const scrollRef=useRef(null);
      useEffect(()=>{if(scrollRef.current&&_c.scrollTop)scrollRef.current.scrollTop=_c.scrollTop;},[]);

      // ── Period filtering ────────────────────────────────────────────────
      const cutoffMs=period==="week"?7*86400000:period==="month"?30*86400000:period==="year"?365*86400000:Infinity;
      // Expand each watched entry into one row per watch date so rewatches count in all stats
      const filteredWatched=useMemo(()=>{
        const rows=[];
        watched.forEach(w=>{
          if(!w.item)return;
          const all=w.dates&&w.dates.length?w.dates:(w.date?[w.date]:[]);
          all.forEach((d,i)=>{
            if(period==="custom"){
              if(!d)return;
              const dt=new Date(d);
              if(customStart&&/^\d{4}-\d{2}-\d{2}$/.test(customStart)&&customStart>="1900"&&dt<new Date(customStart+"T00:00:00"))return;
              if(customEnd&&/^\d{4}-\d{2}-\d{2}$/.test(customEnd)&&customEnd>="1900"&&dt>new Date(customEnd+"T23:59:59"))return;
            } else if(cutoffMs!==Infinity){
              if(!d||Date.now()-new Date(d).getTime()>=cutoffMs)return;
            }
            rows.push({...w,date:d,isRewatch:i>0});
          });
        });
        return rows;
      },[watched,period,cutoffMs,customStart,customEnd]);
      const mediaFiltered=useMemo(()=>mediaType==="movies"?filteredWatched.filter(w=>w.item?.media_type==="movie"):mediaType==="tv"?filteredWatched.filter(w=>w.item?.media_type==="episode"||w.item?.media_type==="tv"):filteredWatched,[filteredWatched,mediaType]);
      const fMovies=mediaFiltered.filter(w=>w.item?.media_type==="movie");
      const fEps=mediaFiltered.filter(w=>w.item?.media_type==="episode"||w.item?.media_type==="tv");

      // ── Headline stats ──────────────────────────────────────────────────
      const totalMins=fMovies.reduce((a,w)=>a+(w.item?.runtime||108),0)+fEps.reduce((a,w)=>a+(w.item?.runtime||45),0);
      const totalHrs=(totalMins/60).toFixed(1);
      const ratedItems=mediaFiltered.filter(w=>w.item?.vote_average>0);
      const avgRating=ratedItems.length?(ratedItems.reduce((a,w)=>a+w.item.vote_average,0)/ratedItems.length).toFixed(1):"—";
      const uniqueShowCount=new Set(fEps.map(w=>w.item?.showId||w.item?.id).filter(Boolean)).size;
      const rewatchMins=mediaFiltered.reduce((a,w)=>{
        if(!w.isRewatch)return a;
        return a+(w.item?.media_type==="movie"?(w.item?.runtime||108):(w.item?.runtime||45));
      },0);
      const rewatchHrs=(rewatchMins/60).toFixed(1);

      // ── Activity chart ──────────────────────────────────────────────────
      const activityData=useMemo(()=>{
        const map=new Map();
        const cutoff40=Date.now()-40*86400000;
        watched.forEach(w=>{
          const {item}=w;
          if(!item)return;
          if(mediaType==="movies"&&item.media_type!=="movie")return;
          if(mediaType==="tv"&&item.media_type==="movie")return;
          const allDates=w.dates&&w.dates.length?w.dates:(w.date?[w.date]:[]);
          allDates.forEach(date=>{
            if(!date)return;
            if(new Date(date).getTime()<cutoff40)return;
            const d=new Date(date),key=d.toDateString();
            if(!map.has(key))map.set(key,{movies:0,episodes:0,mins:0});
            const e=map.get(key);
            if(item.media_type==="movie"){e.movies++;e.mins+=(item.runtime||108);}
            else{e.episodes++;e.mins+=(item.runtime||45);}
          });
        });
        return Array.from({length:40},(_,i)=>{
          const d=new Date();d.setDate(d.getDate()-(39-i));d.setHours(0,0,0,0);
          const entry=map.get(d.toDateString())||{movies:0,episodes:0,mins:0};
          return{date:new Date(d.getTime()),...entry};
        });
      },[watched,mediaType]);
      const maxMins=Math.max(...activityData.map(d=>d.mins),1);

      // ── Top Genres ──────────────────────────────────────────────────────
      const topGenres=useMemo(()=>{
        const genreCounts=new Map();
        mediaFiltered.forEach(w=>{
          let ids;
          if(w.item?.media_type==="episode"){
            const showId=w.item.showId||w.item.id;
            ids=showGenreMap.get(showId)||[];
          } else {
            ids=(w.item?.genre_ids||[]).length>0
              ?w.item.genre_ids
              :(w.item?.genres||[]).map(g=>g.id);
          }
          ids.forEach(id=>{
            const name=GENRE_ID_TO_NAME[id];
            if(name)genreCounts.set(name,(genreCounts.get(name)||0)+1);
          });
        });
        return [...genreCounts.entries()].sort((a,b)=>b[1]-a[1]).slice(0,6);
      },[mediaFiltered,showGenreMap]);

      // ── Top Rated Movies / Shows ────────────────────────────────────────
      const topRatedMovies=useMemo(()=>{
        const seen=new Set();
        return fMovies.filter(w=>w.item?.vote_average>0&&!seen.has(w.item.id)&&seen.add(w.item.id))
          .sort((a,b)=>b.item.vote_average-a.item.vote_average)
          .slice(0,5).map(w=>w.item);
      },[fMovies]);
      const topRatedShows=useMemo(()=>{
        const showRatingMap=new Map();
        fEps.filter(w=>w.item?.vote_average>0).forEach(w=>{
          const key=w.item.showId||w.item.id;
          const cur=showRatingMap.get(key);
          if(!cur||w.item.vote_average>cur.vote_average)showRatingMap.set(key,w.item);
        });
        mediaFiltered.filter(w=>w.item?.media_type==="tv"&&w.item?.vote_average>0).forEach(w=>{
          const cur=showRatingMap.get(w.item.id);
          if(!cur||w.item.vote_average>cur.vote_average)showRatingMap.set(w.item.id,w.item);
        });
        return [...showRatingMap.values()].sort((a,b)=>b.vote_average-a.vote_average).slice(0,5);
      },[fEps,mediaFiltered]);

      // ── Binge Stats ────────────────────────────────────────────────────
      const longestBinge=useMemo(()=>{
        // group episodes by date string + showId
        const map=new Map();
        fEps.forEach(w=>{
          if(!w.date||!w.item)return;
          const dateKey=new Date(w.date).toDateString();
          const showId=w.item.showId||w.item.id;
          const showName=w.item.showName||w.item.name||"Unknown Show";
          const key=`${dateKey}||${showId}`;
          if(!map.has(key))map.set(key,{dateKey,showId,showName,count:0});
          map.get(key).count++;
        });
        if(map.size===0)return null;
        return [...map.values()].sort((a,b)=>b.count-a.count).slice(0,5);
      },[fEps]);

      // ── Movie Studios / TV Networks ─────────────────────────────────────
      const movieStudios=useMemo(()=>{
        const counts=new Map();
        fMovies.forEach(w=>{
          const id=w.item?.id;
          const direct=w.item?.production_companies;
          const names=direct?.length?direct.map(c=>c.name):(id?movieStudioMap.get(id)||[]:[]);
          names.forEach(name=>{const norm=normalizeStudio(name);counts.set(norm,(counts.get(norm)||0)+1);});
        });
        return [...counts.entries()].sort((a,b)=>b[1]-a[1]);
      },[fMovies,movieStudioMap]);
      const tvNetworks=useMemo(()=>{
        const counts=new Map();
        fEps.forEach(w=>{
          const showId=w.item?.showId||w.item?.id;
          const nets=showNetworkMap.get(showId)||(w.item?.networks||[]).map(n=>n.name);
          nets.forEach(name=>{const norm=normalizeStudio(name);counts.set(norm,(counts.get(norm)||0)+1);});
        });
        return [...counts.entries()].sort((a,b)=>b[1]-a[1]);
      },[fEps,showNetworkMap]);

      // ── Watch Heatmap (7 days × 24 hours) ──────────────────────────────
      const watchHeatmap=useMemo(()=>{
        const grid=Array.from({length:7},()=>new Array(24).fill(0));
        mediaFiltered.forEach(w=>{
          if(!w.date)return;
          const d=new Date(w.date);
          grid[(d.getDay()+6)%7][d.getHours()]++;
        });
        return grid;
      },[mediaFiltered]);
      const peakViewingLabel=useMemo(()=>{
        const DAYS=["Mondays","Tuesdays","Wednesdays","Thursdays","Fridays","Saturdays","Sundays"];
        let maxVal=0,pd=0,ph=0;
        watchHeatmap.forEach((row,d)=>row.forEach((c,h)=>{if(c>maxVal){maxVal=c;pd=d;ph=h;}}));
        if(maxVal===0)return null;
        const ampm=ph>=12?"PM":"AM",h12=ph%12===0?12:ph%12;
        return`${DAYS[pd]} at ${h12}:00 ${ampm}`;
      },[watchHeatmap]);

      // ── Deduplicated API items (episodes mapped to their show) ──────────
      const apiItems=useMemo(()=>{
        const seen=new Set();
        const out=[];
        const epCountMap=new Map();
        const epWatchMap=new Map(); // showId → Map<episodeId, watchCount>
        mediaFiltered.forEach(w=>{
          const mt=w.item?.media_type;
          if(mt==="episode"||mt==="tv"){
            const sid=w.item?.showId||w.item?.id;
            if(sid){
              epCountMap.set(sid,(epCountMap.get(sid)||0)+1);
              if(mt==="episode"&&w.item?.id){
                if(!epWatchMap.has(sid))epWatchMap.set(sid,new Map());
                const em=epWatchMap.get(sid);
                em.set(w.item.id,(em.get(w.item.id)||0)+1);
              }
            }
          }
        });
        mediaFiltered.forEach(w=>{
          if(!w.item?.id)return;
          const isEp=w.item.media_type==="episode";
          const id=isEp?(w.item.showId||w.item.id):w.item.id;
          const type=w.item.media_type==="movie"?"movie":"tv";
          const key=`${type}-${id}`;
          if(seen.has(key))return;
          seen.add(key);
          const episodeCount=type==="tv"?(epCountMap.get(id)||1):1;
          const showEpMap=type==="tv"?(epWatchMap.get(id)||null):null;
          out.push({id,type,episodeCount,showEpMap});
        });
        return out;
      },[mediaFiltered]);

      // ── Show Genre + Network Data (API, cache-first) ───────────────────
      useEffect(()=>{
        const tvItems=apiItems.filter(x=>x.type==="tv");
        if(tvItems.length===0)return;
        const gm=showGenreMapRef.current;
        const nm=showNetworkMapRef.current;
        const missing=tvItems.filter(({id})=>!gm.has(id)||!nm.has(id));
        if(missing.length===0)return;
        Promise.all(missing.map(({id})=>api(`/tv/${id}`).catch(()=>null))).then(results=>{
          const newGm=new Map(showGenreMapRef.current);
          const newNm=new Map(showNetworkMapRef.current);
          results.forEach((show,i)=>{
            if(!show)return;
            const id=missing[i].id;
            if(!newGm.has(id))newGm.set(id,(show.genre_ids||[]).length>0?show.genre_ids:(show.genres||[]).map(g=>g.id));
            if(!newNm.has(id))newNm.set(id,(show.networks||[]).map(n=>n.name));
          });
          setShowGenreMap(newGm);setShowNetworkMap(newNm);
          try{localStorage.setItem("tvstats_show_genres",JSON.stringify([...newGm.entries()]));}catch{}
          try{localStorage.setItem("tvstats_show_networks",JSON.stringify([...newNm.entries()]));}catch{}
        });
      },[apiItems]);

      // ── Movie Studio Data (mc-cache-first, then API) ────────────────────
      useEffect(()=>{
        const movieItems=apiItems.filter(x=>x.type==="movie");
        if(!movieItems.length)return;
        const mm=movieStudioMapRef.current;
        const missing=movieItems.filter(({id})=>!mm.has(id));
        if(!missing.length)return;
        Promise.all(missing.map(({id})=>{const c=mcGet("movie",id);return c?Promise.resolve(c):api(`/movie/${id}`).catch(()=>null);})).then(results=>{
          const newMm=new Map(movieStudioMapRef.current);
          results.forEach((movie,i)=>{if(!movie?.production_companies?.length)return;newMm.set(missing[i].id,movie.production_companies.map(p=>p.name));});
          setMovieStudioMap(newMm);
          try{localStorage.setItem("tvstats_movie_studios",JSON.stringify([...newMm.entries()]));}catch{}
        });
      },[apiItems]);

      // ── Watch Providers (API) ───────────────────────────────────────────
      useEffect(()=>{
        setProviderCounts(null);
        if(apiItems.length===0){setProviderCounts(new Map());return;}
        Promise.all(apiItems.map(({id,type})=>api(`/${type}/${id}/watch/providers`).catch(()=>null))).then(results=>{
          const counts=new Map();
          results.forEach(prov=>{
            const flatrate=prov?.results?.US?.flatrate||[];
            flatrate.forEach(p=>{
              if(!counts.has(p.provider_id))counts.set(p.provider_id,{name:p.provider_name,count:0});
              counts.get(p.provider_id).count++;
            });
          });
          setProviderCounts(counts);
        });
      },[apiItems]);

      // ── Credits (API) ───────────────────────────────────────────────────
      useEffect(()=>{
        setCreditData(null);
        if(apiItems.length===0){setCreditData({actors:[],directors:[]});return;}
        Promise.all(apiItems.map(({id,type})=>api(type==="tv"?`/tv/${id}/aggregate_credits`:`/${type}/${id}/credits`).catch(()=>null))).then(results=>{
          const actorMap=new Map();
          results.forEach((cred,i)=>{
            if(!cred)return;
            const {type,episodeCount,showEpMap}=apiItems[i];
            (cred.cast||[]).slice(0,15).forEach(p=>{
              if(!actorMap.has(p.id))actorMap.set(p.id,{id:p.id,name:p.name,profile:p.profile_path,count:0});
              let contribution;
              if(type==="tv"&&showEpMap&&showEpMap.size>0){
                const cap=Math.min(showEpMap.size,p.total_episode_count||showEpMap.size);
                const vals=[...showEpMap.values()];
                contribution=vals.slice(0,cap).reduce((s,c)=>s+c,0);
              } else {
                contribution=episodeCount;
              }
              actorMap.get(p.id).count+=contribution;
            });
          });
          setCreditData({
            actors:[...actorMap.values()].sort((a,b)=>b.count-a.count).slice(0,30),
          });
        });
      },[apiItems]);

      // ── Derived render values ───────────────────────────────────────────
      const byService=STREAMING.map(s=>({...s,count:providerCounts?.get(s.tmdbId)?.count||0})).filter(s=>s.count>0).sort((a,b)=>b.count-a.count);
      const sPill=(active)=>({padding:"7px 18px",borderRadius:99,border:active?`1.5px solid ${C.amber}`:`0.5px solid ${C.hover}`,background:active?`${C.amber}1c`:C.surface,color:active?C.amber:C.muted,fontSize:12,fontWeight:active?600:400,cursor:"pointer",transition:"all 0.15s"});
      const shimmer={background:`linear-gradient(90deg,${C.elevated} 25%,${C.hover} 50%,${C.elevated} 75%)`,backgroundSize:"400px 100%",animation:"shimmer 1.2s infinite",borderRadius:4};
      const renderBars=(data,barColor,limit=10)=>{
        if(data.length===0)return <div style={{fontSize:12,color:C.muted}}>Nothing to show yet</div>;
        const rows=limit===null?data:data.slice(0,limit);
        const total=data.reduce((a,[,n])=>a+n,0)||1;
        return rows.map(([name,count],i)=>{
          const pct=Math.round(count/total*100);
          return(<div key={name} style={{marginBottom:i<rows.length-1?6:0}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:11,color:C.text}}>{name}</span>
              <span style={{fontSize:10,color:C.muted,display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <span>{count}</span><span style={{opacity:0.5,minWidth:32,textAlign:"right"}}>{pct}%</span>
              </span>
            </div>
            <div style={{height:3,background:C.elevated,borderRadius:99}}>
              <div style={{height:"100%",width:`${count/total*100}%`,background:barColor,borderRadius:99}}/>
            </div>
          </div>);
        });
      };
      const studioPairs=[
        ...(mediaType!=="tv"    ?[[movieStudios,"Movie Watches by Studio",  C.blue]] :[]),
        ...(mediaType!=="movies"?[[tvNetworks,  "Episode Watches by Network",C.green]]:[]),
      ];
      if(studioExpanded){return(<div ref={scrollRef} onScroll={()=>{if(scrollRef.current)_c.scrollTop=scrollRef.current.scrollTop;}} style={{flex:1,overflow:"auto",padding:"24px 32px",willChange:"transform",animation:"fadeIn 0.18s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:24}}>
          <button onClick={()=>setStudioExpanded(false)} style={{padding:"6px 16px",borderRadius:99,border:`1.5px solid ${C.amber}`,background:`${C.amber}1c`,color:C.amber,fontSize:12,fontWeight:600,cursor:"pointer"}}>← Back to Stats</button>
          <div style={{fontSize:13,fontWeight:600,color:C.muted,letterSpacing:"0.05em",textTransform:"uppercase"}}>All Studios &amp; Networks</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:studioPairs.length===1?"1fr":"1fr 1fr",gap:16}}>
          {studioPairs.map(([data,title,color])=>(
            <div key={title} style={{background:C.surface,borderRadius:10,padding:18,border:C.border}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:16}}>{title}</div>
              {renderBars(data,color,null)}
            </div>
          ))}
        </div>
      </div>);}

      return(<div ref={scrollRef} onScroll={()=>{if(scrollRef.current)_c.scrollTop=scrollRef.current.scrollTop;}} style={{flex:1,overflow:"auto",padding:"24px 32px",willChange:"transform",animation:"fadeIn 0.18s ease"}}>
        {/* Period pills */}
        <div style={{display:"flex",gap:6,marginBottom:28,flexWrap:"wrap",alignItems:"center"}}>
          {[["week","This Week"],["month","This Month"],["year","This Year"],["all","All Time"]].map(([v,l])=><button key={v} onClick={()=>{setPeriod(v);setShowCustomPicker(false);}} style={sPill(period===v)}>{l}</button>)}
          <button onClick={()=>{setPeriod("custom");setShowCustomPicker(true);}} style={sPill(period==="custom")}>Custom Date</button>
          {period==="custom"&&showCustomPicker&&(
            <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:4}}>
              <input type="date" value={customStart} onChange={e=>setCustomStart(e.target.value)} onBlur={e=>setCustomStart(e.target.value)}
                style={{background:C.surface,border:`0.5px solid ${C.inputBorder}`,color:C.text,borderRadius:7,padding:"5px 10px",fontSize:12,outline:"none",colorScheme:"dark"}}/>
              <span style={{fontSize:12,color:C.muted}}>to</span>
              <input type="date" value={customEnd} onChange={e=>setCustomEnd(e.target.value)} onBlur={e=>setCustomEnd(e.target.value)}
                style={{background:C.surface,border:`0.5px solid ${C.inputBorder}`,color:C.text,borderRadius:7,padding:"5px 10px",fontSize:12,outline:"none",colorScheme:"dark"}}/>
            </div>
          )}
        </div>
        {/* Media type pills */}
        <div style={{display:"flex",gap:6,marginBottom:28,flexWrap:"wrap",alignItems:"center"}}>
          {[["all","All"],["movies","Movies"],["tv","TV Episodes"]].map(([v,l])=><button key={v} onClick={()=>setMediaType(v)} style={sPill(mediaType===v)}>{l}</button>)}
        </div>
        {/* Headline stats */}
        {(()=>{const cards=[
            ...(mediaType!=="tv"?[[`${fMovies.length}`,"movies watched","Movies",C.blue]]:[]),
            ...(mediaType!=="movies"?[[`${fEps.length}`,`across ${uniqueShowCount||"—"} show${uniqueShowCount!==1?"s":""}`,"Episodes",C.green]]:[]),
            [`${avgRating}`,"avg TMDB rating","Avg Rating",C.purple],
            [`${rewatchHrs}h`,"rewatched hours","Rewatched",C.green],
            [`${totalHrs}h`,`≈ ${Math.max(0,Math.round(parseFloat(totalHrs)/24))} days`,"Total Watched",C.amber],
          ];return(
        <div style={{display:"grid",gridTemplateColumns:`repeat(${cards.length},1fr)`,gap:14,marginBottom:32}}>
          {cards.map(([val,sub,label,color])=>(
            <div key={label} style={{background:C.surface,borderRadius:10,padding:18,border:C.border}}>
              <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:8}}>{label}</div>
              <div style={{fontSize:30,fontWeight:700,color,lineHeight:1,marginBottom:4}}>{val}</div>
              <div style={{fontSize:11,color:C.muted}}>{sub}</div>
            </div>
          ))}
        </div>);})()}
        {/* Activity chart */}
        <div style={{background:C.surface,borderRadius:10,padding:"20px 20px 14px",border:C.border,marginBottom:24}}>
          <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:16}}>Activity — Last 40 Days</div>
          <div style={{position:"relative"}}>
            <div style={{display:"flex",alignItems:"flex-end",gap:3,height:100}}>
              {activityData.map((d,i)=>{

    // ── People Page ──────────────────────────────────────────────────────────
    const _peoplePageCache={};
    const PeoplePage=({goTo,watched})=>{
      const _c=_peoplePageCache;
      const _restoring=useRef(!!_c.results?.length);
      const [query,setQuery]=useState(_c.query||"");
      const [results,setResults]=useState(_c.results||[]);
      const [actorHrsMap,setActorHrsMap]=useState(new Map());
      useEffect(()=>{if(!results.length||!watched)return;let active=true;Promise.all(results.map(p=>computePersonHours(p.id,watched))).then(hrs=>{if(!active)return;const m=new Map();results.forEach((p,i)=>{if(hrs[i]>0)m.set(p.id,hrs[i]);});setActorHrsMap(m);});return()=>{active=false;};},[results]);
      const [loading,setLoading]=useState(false);
      const [page,setPage]=useState(_c.page||1);
      const [hasMore,setHasMore]=useState(_c.hasMore||false);
      const [totalPages,setTotalPages]=useState(_c.totalPages||1);
      const isLoadingMoreRef=useRef(false);
      const inputRef=useRef(null);
      const scrollRef=useRef(null);

      useEffect(()=>{Object.assign(_c,{query,results,page,hasMore,totalPages});},[query,results,page,hasMore,totalPages]);
      useEffect(()=>{if(scrollRef.current&&_c.scrollTop)scrollRef.current.scrollTop=_c.scrollTop;},[]);

      useEffect(()=>{
        if(inputRef.current)inputRef.current.focus();
      },[]);

      useEffect(()=>{
        if(_restoring.current){_restoring.current=false;return;}
        if(!query.trim()){setResults([]);setPage(1);setHasMore(false);return;}
        isLoadingMoreRef.current=false;
        setLoading(true);setResults([]);setPage(1);setHasMore(false);
        const t=setTimeout(async()=>{
          try{
            const d=await api("/search/person",{query:query.trim(),language:"en-US",page:1});
            const qWords=query.trim().toLowerCase().split(/\s+/);
            const people=(d.results||[]).filter(p=>p.profile_path&&qWords.every(w=>p.name.toLowerCase().includes(w)));
            setResults(people);
            setTotalPages(d.total_pages||1);
            setHasMore((d.total_pages||1)>1);
          }catch{}
          setLoading(false);
        },350);
        return()=>clearTimeout(t);
      },[query]);

      const doLoadMoreRef=useRef(null);
      doLoadMoreRef.current=async()=>{
        if(isLoadingMoreRef.current||!hasMore)return;
        isLoadingMoreRef.current=true;
        const next=page+1;
        try{
          const d=await api("/search/person",{query:query.trim(),language:"en-US",page:next});
          const qWords=query.trim().toLowerCase().split(/\s+/);
          const people=(d.results||[]).filter(p=>p.profile_path&&qWords.every(w=>p.name.toLowerCase().includes(w)));
          setResults(prev=>{const seen=new Set(prev.map(r=>r.id));return[...prev,...people.filter(p=>!seen.has(p.id))];});
          setPage(next);
          setHasMore(next<(d.total_pages||1));
        }catch{}
        isLoadingMoreRef.current=false;
      };

      const setSentinel=useCallback(node=>{
        if(!node)return;
        const ob=new IntersectionObserver(entries=>{if(entries[0].isIntersecting)doLoadMoreRef.current?.();},{threshold:0.1});
        ob.observe(node);
        return()=>ob.disconnect();
      },[]);

      const hasQuery=query.trim().length>0;

      return(<div style={{display:"flex",flex:1,overflow:"hidden"}}><div ref={scrollRef} onScroll={()=>{if(scrollRef.current)_c.scrollTop=scrollRef.current.scrollTop;}} style={{flex:1,overflowY:"auto",padding:"20px 24px 40px",background:C.bg,willChange:"transform"}}>
        {/* Search bar */}
        <div style={{maxWidth:520,margin:"0 auto 28px",position:"relative"}}>
          <div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><SearchIcon size={15} color={hasQuery?C.text:C.muted}/></div>
          <input ref={inputRef} value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search for an actor, director, writer…" style={{width:"100%",boxSizing:"border-box",background:C.elevated,border:hasQuery?`1px solid ${C.purple}60`:C.border,borderRadius:10,color:C.text,padding:"11px 40px 11px 40px",fontSize:14,outline:"none",transition:"border 0.15s"}}/>
          {hasQuery&&<button onClick={()=>setQuery("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:20,lineHeight:1,padding:"0 2px"}}>×</button>}
        </div>

        {/* Empty state */}
        {!hasQuery&&!loading&&(
          <div style={{textAlign:"center",paddingTop:60,color:C.muted}}>
            <div style={{fontSize:40,marginBottom:12}}>🎬</div>
            <div style={{fontSize:14,fontWeight:500,color:C.text,marginBottom:6}}>Find actors, directors &amp; more</div>
            <div style={{fontSize:12}}>Start typing to search the full TMDB people database</div>
          </div>
        )}

        {/* Loading */}
        {loading&&<div style={{textAlign:"center",color:C.muted,fontSize:13,paddingTop:20}}>Searching…</div>}

        {/* Results grid */}
        {!loading&&results.length>0&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:16}}>
            {results.map(p=>(
              <div key={p.id} onClick={()=>goTo("person-detail",p)} style={{cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                <div style={{width:"100%",aspectRatio:"2/3",borderRadius:8,overflow:"hidden",background:C.elevated,flexShrink:0,position:"relative"}}>
                  {p.profile_path
                    ?<img src={img(p.profile_path,"w342")} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"top"}}/>
                    :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:28}}>👤</div>
                  }
                  {(actorHrsMap.get(p.id)||0)>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,padding:"5px 4px 6px",textAlign:"center",pointerEvents:"none"}}><span style={{fontSize:9,fontWeight:700,color:C.green,letterSpacing:"0.03em",textShadow:"0 1px 4px rgba(0,0,0,0.8)"}}>{(h=>(h>=1?`${h.toFixed(1)}h`:`${Math.round(h*60)}m`))(actorHrsMap.get(p.id))} watched</span></div>}
                </div>
                <div style={{textAlign:"center",width:"100%"}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.text,lineHeight:1.3,marginBottom:2}}>{p.name}</div>
                  {p.known_for_department&&<div style={{fontSize:10,color:C.muted}}>{p.known_for_department}</div>}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* No results */}
        {!loading&&hasQuery&&results.length===0&&(
          <div style={{textAlign:"center",paddingTop:20,color:C.muted,fontSize:13}}>No people found for "{query}"</div>
        )}

        {/* Infinite scroll sentinel / end message */}
        {hasQuery&&results.length>0&&(
          hasMore
            ?<div ref={setSentinel} style={{height:40}}/>
            :<div style={{textAlign:"center",padding:"28px 0 8px",color:C.muted,fontSize:12}}>You've seen it all ✓</div>
        )}
      </div></div>);
    };

    // ── Person Detail Page — Personal History sub-section ────────────────────
    const PersonalHistorySection=({credits,allCredits,watched,goTo,watchlist,setWatchlist,setWatched,showTotals,mediaFilter="all",expandedTvShow,tvEpCache,onTvClick})=>{
      const filteredCredits=mediaFilter==="all"?credits:credits.filter(c=>mediaFilter==="movie"?c.media_type==="movie":c.media_type==="tv");
      const watchedMovieCredits=filteredCredits.filter(c=>c.media_type==="movie"&&storedMediaLooksMovie(getWatchedEntry(watched,c.id)));
      const actorEpCountMap=new Map();
      allCredits.filter(c=>c.media_type==="tv").forEach(c=>{actorEpCountMap.set(c.id,Math.max(actorEpCountMap.get(c.id)||0,c.episode_count||0));});
      const watchedEpsByShow=new Map();
      watched.forEach((v,k)=>{
        if(typeof k!=="string"||!k.startsWith("ep-"))return;
        const sid=parseInt(k.split("-")[1]);
        if(!actorEpCountMap.has(sid))return;
        if(!watchedEpsByShow.has(sid))watchedEpsByShow.set(sid,[]);
        watchedEpsByShow.get(sid).push(v);
      });
      const watchedTvCredits=filteredCredits.filter(c=>c.media_type==="tv"&&watchedEpsByShow.has(c.id));
      const filteredTvIds=new Set(filteredCredits.filter(c=>c.media_type==="tv").map(c=>c.id));
      const movieCount=watchedMovieCredits.length;
      let episodeCount=0;
      watchedEpsByShow.forEach((eps,sid)=>{
        if(!filteredTvIds.has(sid))return;
        const cap=Math.min(eps.length,actorEpCountMap.get(sid)||0);
        eps.slice(0,cap).forEach(v=>{episodeCount+=(v.dates?.length||1);});
      });
      if(movieCount+episodeCount===0)return null;
      let ratingSum=0,ratingCount=0;
      watchedMovieCredits.forEach(c=>{if(c.vote_average>0){ratingSum+=c.vote_average;ratingCount++;}});
      watchedTvCredits.forEach(c=>{if(c.vote_average>0){ratingSum+=c.vote_average;ratingCount++;}});
      const avgRating=ratingCount>0?(ratingSum/ratingCount).toFixed(1):null;
      let totalMins=0,rewatchMins=0;
      watchedMovieCredits.forEach(c=>{
        const entry=getWatchedEntry(watched,c.id);
        const rt=c.runtime||entry?.item?.runtime||108;
        const wc=entry?.dates?.length||1;
        totalMins+=rt*wc; rewatchMins+=rt*Math.max(0,wc-1);
      });
      watchedEpsByShow.forEach((eps,sid)=>{
        if(!filteredTvIds.has(sid))return;
        const cap=Math.min(eps.length,actorEpCountMap.get(sid)||0);
        eps.slice(0,cap).forEach(v=>{
          const rt=v?.item?.runtime||45;
          const wc=v?.dates?.length||1;
          totalMins+=rt*wc; rewatchMins+=rt*Math.max(0,wc-1);
        });
      });
      const fmtMins=m=>{if(m<60)return`${m}m`;const h=m/60;if(h<48)return`${h.toFixed(1)}h`;return`${(m/60/24).toFixed(1)}d`;};
      const MiniCard=({label,value,color})=>(
        <div style={{flex:1,background:`${color}14`,border:`1px solid ${color}30`,borderRadius:8,padding:"10px 14px",display:"flex",flexDirection:"column",gap:3,minWidth:0}}>
          <div style={{fontSize:18,fontWeight:700,color,lineHeight:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{value}</div>
          <div style={{fontSize:10,color:C.muted,letterSpacing:"0.06em",textTransform:"uppercase",fontWeight:600,whiteSpace:"nowrap"}}>{label}</div>
        </div>
      );
      const watchedItems=[...watchedMovieCredits,...watchedTvCredits].sort((a,b)=>b._year-a._year);
      return(
        <div style={{marginBottom:28,marginTop:16}}>
          <h3 style={{margin:"0 0 10px",fontSize:13,fontWeight:600,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase"}}>Personal History</h3>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <MiniCard label="Movies" value={movieCount} color={C.blue}/>
            <MiniCard label="Episodes" value={episodeCount} color={C.green}/>
            <MiniCard label="Avg Rating" value={avgRating||"—"} color={C.purple}/>
            <MiniCard label="Rewatched" value={rewatchMins>0?fmtMins(rewatchMins):"—"} color="#e07a7a"/>
            <MiniCard label="Total Watch" value={totalMins>0?fmtMins(totalMins):"—"} color={C.amber}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
            {watchedItems.map((c,i)=>{
              const isTV=c.media_type==="tv";
              const isExp=isTV&&expandedTvShow===c.id;
              const epDataRaw=isTV?tvEpCache?.[c.id]:null;
              const epData=Array.isArray(epDataRaw)?epDataRaw.filter(ep=>watched.has(`ep-${ep.showId}-${ep.season_number}-${ep.episode_number}`)):epDataRaw;
              return(<React.Fragment key={`ph-${c.id}-${i}`}>
                <Card item={c} goTo={isTV?undefined:goTo} onTvClick={isTV&&onTvClick?()=>onTvClick(c):undefined} watchlist={watchlist} setWatchlist={setWatchlist} watched={watched} setWatched={setWatched} showTotals={showTotals} showPersonCredit/>
                {isExp&&(<div style={{gridColumn:"1/-1",background:C.elevated,borderRadius:10,padding:"16px",border:`0.5px solid ${C.hover}`,marginTop:4}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <span style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase"}}>Watched Episodes with {c.name||c.title}</span>
                    <button onClick={()=>onTvClick(c)} style={{background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer",padding:"0 4px"}}>✕</button>
                  </div>
                  {epData==="loading"&&<div style={{color:C.muted,fontSize:13,padding:"8px 0"}}>Loading…</div>}
                  {epData&&epData!=="loading"&&epData.length===0&&<div style={{color:C.muted,fontSize:13,padding:"8px 0"}}>No watched episodes found with this actor.</div>}
                  {epData&&epData!=="loading"&&epData.length>0&&(
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
                      {epData.map((ep,ei)=><HistoryCard key={`ph-exp-ep-${ep.id}-${ei}`} item={ep} goTo={goTo}/>)}
                    </div>
                  )}
                </div>)}
              </React.Fragment>);
            })}
          </div>
        </div>
      );
    };

    // ── Person Detail Page ────────────────────────────────────────────────────
    const _personScrollCache=new Map();
    const PersonDetailPage=({person,goTo,watchlist,setWatchlist,watched,setWatched,showTotals})=>{
      const [detail,setDetail]=useState(null);
      const [loading,setLoading]=useState(true);
      const [tvSeasonDates,setTvSeasonDates]=useState({});

      useEffect(()=>{
        if(!person?.id)return;
        (async()=>{
          setLoading(true);
          try{
            const d=await api(`/person/${person.id}`,{append_to_response:"combined_credits,images",language:"en-US"});
            setDetail(d);
          }catch{}
          setLoading(false);
        })();
      },[person?.id]);

      // For TV credits, fetch show details to get last_air_date — a much better sort proxy
      // than first_air_date for long-running shows (award shows, talk shows, etc.).
      useEffect(()=>{
        if(!detail?.combined_credits)return;
        setTvSeasonDates({});
        const all=[...(detail.combined_credits.cast||[]),...(detail.combined_credits.crew||[])];
        const seen=new Set();
        const tvCredits=all.filter(c=>{
          if(c.media_type!=="tv"||seen.has(c.id))return false;
          seen.add(c.id);return true;
        });
        if(!tvCredits.length)return;
        Promise.all(tvCredits.map(async c=>{
          try{
            const d=await api(`/tv/${c.id}`);
            return[c.id,d.last_air_date||c.first_air_date];
          }catch{return[c.id,c.first_air_date];}
        })).then(entries=>setTvSeasonDates(Object.fromEntries(entries.filter(([,v])=>v))));
      },[detail]);

      const [mediaFilter,setMediaFilter]=useState("all");
      const [expandedTvShowFilm,setExpandedTvShowFilm]=useState(null);
      const [expandedTvShowHistory,setExpandedTvShowHistory]=useState(null);
      const [tvEpCache,setTvEpCache]=useState({});
      useEffect(()=>{
        if(!expandedTvShowFilm&&!expandedTvShowHistory)return;
        const h=e=>{if(e.key==="Escape"){e.preventDefault();setExpandedTvShowFilm(null);setExpandedTvShowHistory(null);}};
        window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);
      },[expandedTvShowFilm,expandedTvShowHistory]);
      const fetchTvEpData=async(showItem)=>{
        const sid=showItem.id;
        if(tvEpCache[sid]&&tvEpCache[sid]!=="loading")return;
        setTvEpCache(p=>({...p,[sid]:"loading"}));
        const personId=detail?.id;
        if(!personId){setTvEpCache(p=>({...p,[sid]:[]}));return;}
        const showName=showItem.name||showItem.title||"";
        const showPoster=showItem.poster_path||null;
        try{
          // Step 1: get which seasons to check. Try aggregate_credits first; fall back to all show seasons.
          let creditedSeasons=null; // null = unknown, check all
          try{
            const agg=await api(`/tv/${sid}/aggregate_credits`);
            const entry=(agg.cast||[]).find(c=>c.id===personId)||(agg.crew||[]).find(c=>c.id===personId);
            if(entry){
              const sns=[...new Set((entry.roles||entry.jobs||[]).map(r=>r.season_number))].filter(s=>s>=1);
              if(sns.length>0)creditedSeasons=sns;
            }
          }catch{}

          // Step 2: if we couldn't determine seasons, fetch all from the show (exclude season 0 = specials)
          if(!creditedSeasons){
            const showData=await api(`/tv/${sid}`);
            creditedSeasons=(showData.seasons||[]).map(s=>s.season_number).filter(s=>s>=1).sort((a,b)=>a-b);
          }

          // Step 3: for each season, fetch episodes + season cast (to detect series regulars)
          const episodes=[];
          for(const sn of creditedSeasons){
            let sData;
            try{sData=await api(`/tv/${sid}/season/${sn}`,{append_to_response:"credits"});}catch{continue;}
            const isRegular=(sData.credits?.cast||[]).some(c=>c.id===personId);
            const eps=sData.episodes||[];
            if(isRegular){
              // Series regular — include every episode this season
              for(const ep of eps){
                episodes.push({...ep,media_type:"episode",showId:sid,showName,showPoster,season_number:ep.season_number??sn});
              }
            } else {
              // Guest star — include only episodes where they appear in guest_stars
              for(const ep of eps){
                if((ep.guest_stars||[]).some(g=>g.id===personId)){
                  episodes.push({...ep,media_type:"episode",showId:sid,showName,showPoster,season_number:ep.season_number??sn});
                }
              }
            }
          }

          // Step 4: if guest_stars yielded nothing, try credit_id lookups from combined_credits
          if(episodes.length===0){
            const combinedEntries=[
              ...(detail?.combined_credits?.cast||[]),
              ...(detail?.combined_credits?.crew||[])
            ].filter(c=>c.id===sid&&c.credit_id);
            const seen=new Set();
            for(const credit of combinedEntries){
              try{
                const cd=await api(`/credit/${credit.credit_id}`);
                // TMDB can return episode info in media.episodes[] or as top-level season_number/episode_number
                const candidates=[
                  ...(cd.media?.episodes||[]),
                  ...(cd.season_number!=null&&cd.episode_number!=null?[{season_number:cd.season_number,episode_number:cd.episode_number}]:[]),
                ];
                for(const ref of candidates){
                  const sn=ref.season_number,en=ref.episode_number;
                  if(sn==null||en==null)continue;
                  const key=`${sn}-${en}`;
                  if(seen.has(key))continue;
                  seen.add(key);
                  try{
                    const epFull=await api(`/tv/${sid}/season/${sn}/episode/${en}`);
                    episodes.push({...epFull,media_type:"episode",showId:sid,showName,showPoster,season_number:sn});
                  }catch{}
                }
              }catch{}
            }
          }

          setTvEpCache(p=>({...p,[sid]:episodes}));
        }catch{setTvEpCache(p=>({...p,[sid]:[]}));}
      };
      const handleFilmTvClick=async(showItem)=>{
        const sid=showItem.id;
        if(expandedTvShowFilm===sid){setExpandedTvShowFilm(null);return;}
        setExpandedTvShowFilm(sid);
        if(expandedTvShowHistory===sid)setExpandedTvShowHistory(null);
        fetchTvEpData(showItem);
      };
      const handleHistoryTvClick=async(showItem)=>{
        const sid=showItem.id;
        if(expandedTvShowHistory===sid){setExpandedTvShowHistory(null);return;}
        setExpandedTvShowHistory(sid);
        if(expandedTvShowFilm===sid)setExpandedTvShowFilm(null);
        fetchTvEpData(showItem);
      };
      const scrollRef=useRef(null);
      useEffect(()=>{if(!loading&&scrollRef.current){const s=_personScrollCache.get(person.id);if(s)scrollRef.current.scrollTop=s;}},[loading]);

      if(loading)return(<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:13}}>Loading…</div>);
      if(!detail)return(<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:13}}>Person not found</div>);

      const photo=detail.profile_path?img(detail.profile_path,"h632"):null;

      // Build filmography: unique cast + crew credits, sorted newest first
      const allCredits=[...(detail.combined_credits?.cast||[]),...(detail.combined_credits?.crew||[])];
      const seen=new Set();
      const credits=allCredits
        .filter(c=>{
          if(seen.has(c.id))return false;
          seen.add(c.id);
          return true;
        })
        .map(c=>({
          ...c,
          media_type:c.media_type||"movie", // ensure Card reads correct type
          _year:parseInt((c.media_type==="tv"&&tvSeasonDates[c.id]?tvSeasonDates[c.id]:(c.release_date||c.first_air_date||"0")).slice(0,4))||0,
          _title:c.title||c.name||"",
          _role:c.character||c.job||"",
        }))
        .filter(c=>c._title&&(c.poster_path||c.backdrop_path))
        .sort((a,b)=>b._year-a._year);

      const age=detail.birthday?(()=>{
        const b=new Date(detail.birthday);
        const ref=detail.deathday?new Date(detail.deathday):new Date();
        return Math.floor((ref-b)/(365.25*24*3600*1000));
      })():null;

      return(<div ref={scrollRef} onScroll={()=>{if(scrollRef.current)_personScrollCache.set(person.id,scrollRef.current.scrollTop);}} style={{flex:1,overflowY:"auto",willChange:"transform"}}>
        {/* Hero */}
        <div style={{position:"relative",background:C.surface,marginBottom:0}}>
          {photo&&<img src={photo} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",objectPosition:"top",opacity:0.18,filter:"blur(2px)"}}/>}
          <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,rgba(13,13,13,0.1) 0%,#0d0d0d 100%)"}}/>
          <div style={{position:"relative",display:"flex",gap:24,padding:"28px 24px 0",alignItems:"flex-start"}}>
            {/* Portrait */}
            <div style={{flexShrink:0,width:140,borderRadius:10,overflow:"hidden",boxShadow:`0 8px 32px ${C.shadow}`,marginBottom:-56,zIndex:2,background:C.elevated}}>
              {photo
                ?<img src={photo} alt={detail.name} style={{width:"100%",display:"block",objectFit:"cover",objectPosition:"top"}}/>
                :<div style={{width:140,height:200,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:40}}>👤</div>
              }
            </div>
            {/* Info */}
            <div style={{flex:1,paddingBottom:24,minWidth:0}}>
              <button onClick={()=>goTo("people")} style={{background:"none",border:"none",color:C.purple,fontSize:11,cursor:"pointer",padding:0,marginBottom:8,display:"flex",alignItems:"center",gap:4}}>← People</button>
              <h1 style={{margin:"0 0 6px",fontSize:26,fontWeight:700,color:C.text,lineHeight:1.15}}>{detail.name}</h1>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8,alignItems:"center"}}>
                {detail.known_for_department&&<span style={{background:`${C.purple}22`,color:C.purple,borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:600}}>{detail.known_for_department}</span>}
                {detail.birthday&&<span style={{fontSize:12,color:C.muted}}>
                  Born {new Date(detail.birthday).toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}
                  {age&&!detail.deathday?` (age ${age})`:""}
                </span>}
                {detail.deathday&&<span style={{fontSize:12,color:C.muted}}>
                  Died {new Date(detail.deathday).toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}
                  {age?` (age ${age})`:""}
                </span>}
              </div>
              {detail.place_of_birth&&<div style={{fontSize:12,color:C.muted,marginBottom:4}}>📍 {detail.place_of_birth}</div>}
            </div>
          </div>
        </div>

        {/* Body */}
        <div style={{padding:"64px 24px 40px"}}>
          {/* Bio */}
          {detail.biography&&<div style={{marginBottom:28,maxWidth:740}}>
            <h3 style={{margin:"0 0 10px",fontSize:13,fontWeight:600,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase"}}>Biography</h3>
            <BioText text={detail.biography}/>
          </div>}

          {/* Media type filter pills */}
          <div style={{display:"flex",gap:8,marginBottom:20}}>
            {[["all","All"],["movie","Movies"],["tv","TV Shows"]].map(([key,label])=>(
              <button key={key} onClick={()=>setMediaFilter(key)} style={{background:mediaFilter===key?C.amber:"none",border:mediaFilter===key?`1.5px solid ${C.amber}`:`1.5px solid ${C.hover}`,borderRadius:20,padding:"5px 14px",fontSize:12,fontWeight:600,color:mediaFilter===key?"#000":C.muted,cursor:"pointer",transition:"all 0.15s"}}>{label}</button>
            ))}
          </div>

          {/* Personal History */}
          <PersonalHistorySection credits={credits} allCredits={allCredits} watched={watched} goTo={goTo} watchlist={watchlist} setWatchlist={setWatchlist} setWatched={setWatched} showTotals={showTotals} mediaFilter={mediaFilter} expandedTvShow={expandedTvShowHistory} tvEpCache={tvEpCache} onTvClick={handleHistoryTvClick}/>

          {/* Filmography */}
          {(()=>{const filteredCredits=mediaFilter==="all"?credits:credits.filter(c=>mediaFilter==="movie"?c.media_type==="movie":c.media_type==="tv");return filteredCredits.length>0&&(<div>
            <h3 style={{margin:"0 0 14px",fontSize:13,fontWeight:600,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase"}}>Filmography <span style={{color:C.muted,fontWeight:400,fontSize:11,textTransform:"none"}}>({filteredCredits.length})</span></h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12}}>
              {filteredCredits.map((c,i)=>{
                const isTV=c.media_type==="tv";
                const isExp=isTV&&expandedTvShowFilm===c.id;
                const epData=isTV?tvEpCache[c.id]:null;
                return(<React.Fragment key={`${c.id}-${i}`}>
                  <Card item={c} goTo={isTV?undefined:goTo} onTvClick={isTV?()=>handleFilmTvClick(c):undefined} watchlist={watchlist} setWatchlist={setWatchlist} watched={watched} setWatched={setWatched} showTotals={showTotals} showPersonCredit/>
                  {isExp&&(<div style={{gridColumn:"1/-1",background:C.elevated,borderRadius:10,padding:"16px",border:`0.5px solid ${C.hover}`,marginTop:4}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                      <span style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.08em",textTransform:"uppercase"}}>Credited Episodes — {c.name||c.title}</span>
                      <button onClick={()=>setExpandedTvShowFilm(null)} style={{background:"none",border:"none",color:C.muted,fontSize:12,cursor:"pointer",padding:"0 4px"}}>✕</button>
                    </div>
                    {epData==="loading"&&<div style={{color:C.muted,fontSize:13,padding:"8px 0"}}>Loading…</div>}
                    {epData&&epData!=="loading"&&epData.length===0&&<div style={{color:C.muted,fontSize:13,padding:"8px 0"}}>Episode not found — sometimes this happens with guest stars.</div>}
                    {epData&&epData!=="loading"&&epData.length>0&&(
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
                        {epData.map((ep,ei)=><HistoryCard key={`exp-ep-${ep.id}-${ei}`} item={ep} goTo={goTo}/>)}
                      </div>
                    )}
                  </div>)}
                </React.Fragment>);
              })}
            </div>
          </div>);})()}

          {credits.length===0&&!loading&&<div style={{color:C.muted,fontSize:13}}>No filmography available</div>}
        </div>
      </div>);
    };

    // Bio text with expand/collapse
    const BioText=({text})=>{
      const [expanded,setExpanded]=useState(false);
      const LIMIT=600;
      const short=text.length>LIMIT;
      const shown=short&&!expanded?text.slice(0,LIMIT)+"…":text;
      return(<div>
        <p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{shown}</p>
        {short&&<button onClick={()=>setExpanded(!expanded)} style={{background:"none",border:"none",color:C.purple,fontSize:12,cursor:"pointer",padding:"6px 0 0",fontWeight:500}}>{expanded?"Show less":"Show more"}</button>}
      </div>);
    };

    // ── App logo ─────────────────────────────────────────────────────────────
    // In the Mac app (served from 127.0.0.1) load from local server.
    // In the browser fall back to the direct URL.
    const IS_APP=window.location.hostname==="127.0.0.1";
    const AppLogo=({size=28})=>{
      const [useFallback,setUseFallback]=React.useState(false);
      const src=(!IS_APP||useFallback)?"https://i.imgur.com/hununOJ.png":"/logo.png";
      return(<img src={src} onError={()=>setUseFallback(true)} width={size} height={size} alt="TV Stats logo" style={{flexShrink:0,objectFit:"contain",WebkitAppRegion:"no-drag"}}/>);
    };

    // ── Header ───────────────────────────────────────────────────────────────
    // ── Settings Page ─────────────────────────────────────────────────────────
    const ALL_TZ=typeof Intl.supportedValuesOf==="function"?Intl.supportedValuesOf("timeZone"):["America/New_York","America/Chicago","America/Denver","America/Los_Angeles","America/Phoenix","America/Anchorage","Pacific/Honolulu","Europe/London","Europe/Paris","Europe/Berlin","Europe/Rome","Europe/Madrid","Europe/Amsterdam","Europe/Stockholm","Europe/Helsinki","Europe/Athens","Europe/Moscow","Asia/Dubai","Asia/Kolkata","Asia/Dhaka","Asia/Bangkok","Asia/Singapore","Asia/Tokyo","Asia/Seoul","Asia/Shanghai","Australia/Perth","Australia/Adelaide","Australia/Sydney","Pacific/Auckland"];
    const SettingsPage=({user,setUser,onData,theme,setTheme})=>{
      const saved=localStorage.getItem("tvstats_timezone")||Intl.DateTimeFormat().resolvedOptions().timeZone;
      const [tz,setTz]=useState(saved);
      const [query,setQuery]=useState("");
      const [open,setOpen]=useState(false);
      const inputRef=useRef(null);
      const listRef=useRef(null);

      const [nameVal,setNameVal]=useState(user?.name||"");
      const [passVal,setPassVal]=useState("");
      const [confirmVal,setConfirmVal]=useState("");
      const [recoveryEmailVal,setRecoveryEmailVal]=useState(user?.recoveryEmail||"");
      const [colorVal,setColorVal]=useState(user?.color||PROFILE_COLORS[0]);
      const [pinVal,setPinVal]=useState(user?.pin||"");
      const [acctMsg,setAcctMsg]=useState(null); // {ok:bool, text:string}
      const [allUsers,setAllUsers]=useState(()=>JSON.parse(localStorage.getItem("tvstats_users")||"[]"));
      const [showAddProfile,setShowAddProfile]=useState(false);
      const [apName,setApName]=useState("");
      const [apPin,setApPin]=useState("");
      const [apColor,setApColor]=useState(PROFILE_COLORS[0]);
      const [apError,setApError]=useState("");

      const saveAccount=()=>{
        const trimName=nameVal.trim();
        if(!trimName){setAcctMsg({ok:false,text:"Username cannot be empty."});return;}
        if(trimName.length<3){setAcctMsg({ok:false,text:"Username must be at least 3 characters."});return;}
        if(passVal&&passVal!==confirmVal){setAcctMsg({ok:false,text:"Passwords do not match."});return;}
        if(passVal&&passVal.length<4){setAcctMsg({ok:false,text:"Password must be at least 4 characters."});return;}
        if(pinVal&&(pinVal.length!==4||!/^\d{4}$/.test(pinVal))){setAcctMsg({ok:false,text:"PIN must be exactly 4 digits."});return;}
        const trimRecovery=recoveryEmailVal.trim().toLowerCase();
        if(trimRecovery&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimRecovery)){setAcctMsg({ok:false,text:"Recovery email address is not valid."});return;}
        const newUsername=trimName.toLowerCase();
        const users=JSON.parse(localStorage.getItem("tvstats_users")||"[]");
        if(newUsername!==user.email&&users.find(u=>u.email===newUsername)){setAcctMsg({ok:false,text:"That username is already taken."});return;}
        const updated={...user,name:trimName,email:newUsername,color:colorVal,...(passVal?{password:passVal}:{}),...(trimRecovery?{recoveryEmail:trimRecovery}:{recoveryEmail:""})};
        if(pinVal){updated.pin=pinVal;}else{delete updated.pin;}
        if(newUsername!==user.email){
          const oldWatched=localStorage.getItem(`tvstats_watched_${user.email}`);
          if(oldWatched){localStorage.setItem(`tvstats_watched_${newUsername}`,oldWatched);localStorage.removeItem(`tvstats_watched_${user.email}`);}
          const oldWatchlist=localStorage.getItem(`tvstats_watchlist_${user.email}`);
          if(oldWatchlist){localStorage.setItem(`tvstats_watchlist_${newUsername}`,oldWatchlist);localStorage.removeItem(`tvstats_watchlist_${user.email}`);}
        }
        const idx=users.findIndex(u=>u.email===user.email);
        if(idx>=0)users[idx]=updated;
        localStorage.setItem("tvstats_users",JSON.stringify(users));
        localStorage.setItem("tvstats_user",JSON.stringify(updated));
