          <button onClick={e=>{e.stopPropagation();onUnwatch();}} title="Remove watch" style={{display:"flex",alignItems:"center",justifyContent:"center",width:18,height:18,borderRadius:"50%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",color:C.muted,fontSize:10,cursor:"pointer",lineHeight:1,padding:0,flexShrink:0}}>×</button>
          {hover&&dates.length>0&&(
            <div style={{position:"absolute",bottom:"calc(100% + 8px)",left:0,background:C.elevated,border:C.border,borderRadius:8,padding:"8px 12px",zIndex:200,minWidth:190,boxShadow:`0 4px 24px ${C.shadow}`,pointerEvents:"none"}}>
              <div style={{fontSize:9,color:C.muted,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:6}}>Watch History</div>
              {dates.map((d,i)=>(
                <div key={i} style={{fontSize:12,color:C.text,padding:"2px 0",borderTop:i>0?"1px solid rgba(255,255,255,0.06)":undefined}}>{fmt(d)}</div>
              ))}
            </div>
          )}
        </div>
      );
    };

    // ── Rating Chip ──────────────────────────────────────────────────────────
    const RatingChip=({label,value,color})=>(
      <div style={{display:"flex",alignItems:"center",gap:3,background:`${color}18`,borderRadius:4,padding:"2px 5px"}}>
        <span style={{color,fontWeight:700,fontSize:9,letterSpacing:"0.04em"}}>{label}</span>
        <span style={{color:C.text,fontWeight:500,fontSize:10}}>{value}</span>
      </div>
    );

    // ── Breadcrumb ───────────────────────────────────────────────────────────
    const Breadcrumb=({items})=>(
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:20}}>
        {items.map((item,i)=>(
          <span key={i} style={{display:"flex",alignItems:"center",gap:6}}>
            {i>0&&<span style={{color:C.muted,fontSize:12}}>›</span>}
            <span onClick={item.onClick||undefined} style={{fontSize:12,color:item.onClick?C.amber:C.muted,cursor:item.onClick?"pointer":"default",transition:"color 0.12s"}}>{item.label}</span>
          </span>
        ))}
      </div>
    );

    // Watched map uses bare TMDB ids; movie and TV namespaces overlap, so we must
    // match on stored media_type (with a small legacy heuristic when it is missing).
    const getWatchedEntry=(watched,id)=>watched.get(id)??watched.get(String(id))??null;
    const epWatchedCountFor=(watched,id)=>{const sid=String(id);return[...watched.keys()].filter(k=>typeof k==="string"&&new RegExp(`^ep-${sid}-\\d+-\\d+$`).test(k)).length;};
    const storedMediaLooksMovie=st=>{if(!st?.item)return false;const i=st.item,m=i.media_type;if(m==="movie")return true;if(m==="tv"||m==="episode")return false;return Boolean(i.title&&!i.name);};
    const storedMediaLooksTv=st=>{if(!st?.item)return false;const i=st.item,m=i.media_type;if(m==="tv")return true;if(m==="movie"||m==="episode")return false;return Boolean(i.name&&!i.title);};

    // Session cache: personId → credits data (not hours, so watched changes are reflected)
    const _personCreditsCache = new Map();
    const computePersonHours = async (personId, watched) => {
      let credits = _personCreditsCache.get(personId);
      if (!credits) {
        credits = mcGet("person", personId);
        if (credits) { _personCreditsCache.set(personId, credits); }
        else { try {
          const d = await api(`/person/${personId}`, {append_to_response:"combined_credits"});
          credits = d.combined_credits;
          if (credits) mcSet("person", personId, credits);
          _personCreditsCache.set(personId, credits || null);
        } catch { return 0; } }
      }
      if (!credits) return 0;
      const seen = new Set();
      let mins = 0;
      [...(credits.cast||[]), ...(credits.crew||[])].forEach(c => {
        if (seen.has(c.id)) return; seen.add(c.id);
        if (c.media_type === "movie") {
          const entry = getWatchedEntry(watched, c.id);
          if (storedMediaLooksMovie(entry)) mins += (c.runtime || entry?.item?.runtime || 108) * (entry?.dates?.length || 1);
        } else if (c.media_type === "tv") {
          const actorEpCount = c.episode_count || 0;
          const epEntries = [];
          watched.forEach((v,k)=>{if(typeof k==="string"&&k.startsWith("ep-")&&parseInt(k.split("-")[1])===c.id)epEntries.push(v);});
          const cap = Math.min(epEntries.length, actorEpCount);
          epEntries.slice(0,cap).forEach(v=>{mins+=(v?.item?.runtime||45)*(v?.dates?.length||1);});
        }
      });
      return mins / 60;
    };

    // ── Card ─────────────────────────────────────────────────────────────────
    const Card=({item,watchlist,setWatchlist,watched,setWatched,goTo,showPersonCredit,showTotals,onTvClick})=>{
      const [hover,setHover]=useState(false);
      const [popup,setPopup]=useState(false);
      const id=item.id, type=item.media_type||"movie";
      const title=item.title||item.name||"Untitled";
      const year=(item.release_date||item.first_air_date||"").slice(0,4);
      const rating=item.vote_average>0?item.vote_average.toFixed(1):null;
      const inWL=watchlist.has(id);
      const watchedRow=getWatchedEntry(watched,id);
      const epWatchedCount=type==="tv"?epWatchedCountFor(watched,id):0;
      const inW=type==="tv"?storedMediaLooksTv(watchedRow)||epWatchedCount>0:storedMediaLooksMovie(watchedRow);
      const bc=type==="movie"?C.blue:C.green;
      const imageUrl=item.backdrop_path?img(item.backdrop_path,"w780"):item.poster_path?img(item.poster_path,"w342"):null;
      const toggleWL=(e)=>{e.stopPropagation();setWatchlist(p=>{const n=new Map(p);n.has(id)?n.delete(id):n.set(id,item);return n;});};
      const clickCheck=(e)=>{e.stopPropagation();if(!inW){setPopup(true);return;}setWatched(p=>{const n=new Map(p),row=getWatchedEntry(p,id);if(type==="tv"){if(storedMediaLooksTv(row)){if(n.has(id))n.delete(id);if(n.has(String(id)))n.delete(String(id));}}else if(storedMediaLooksMovie(row)){if(n.has(id))n.delete(id);if(n.has(String(id)))n.delete(String(id));}return n;});};
      const markW=(date)=>{setWatched(p=>{const n=new Map(p);const ex=n.get(id);const dates=ex?.dates?[...ex.dates,date]:ex?.date?[ex.date,date]:[date];const cached=type==="movie"?mcGet("movie",id):null;const storedItem=cached?.production_companies?{...item,production_companies:cached.production_companies}:item;n.set(id,{item:storedItem,date,dates});return n;});setWatchlist(p=>{const n=new Map(p);n.delete(id);return n;});setPopup(false);};
      const handleClick=()=>{if(type==="tv"&&onTvClick){onTvClick();return;}if(goTo){if(type==="movie")goTo("movie-detail",item);else if(type==="tv")goTo("tv-detail",item);}};
      return(<>
        <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} onClick={handleClick}
          style={{background:C.surface,borderRadius:8,overflow:"hidden",border:hover?`0.5px solid ${C.hover}`:C.border,transform:hover?"translateY(-3px)":"none",boxShadow:hover?`0 8px 24px ${C.shadow}`:"none",transition:"transform 0.18s ease,box-shadow 0.18s ease,border-color 0.18s ease",cursor:"pointer"}}>
          <div style={{position:"relative",paddingTop:"75%",background:C.elevated,overflow:"hidden"}}>
            {imageUrl?<img src={imageUrl} alt={title} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top"}} loading="lazy"/>:<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,opacity:0.2}}>🎬</div>}
            <div style={{position:"absolute",bottom:0,left:0,right:0,height:"55%",background:"linear-gradient(to top,rgba(13,13,13,0.95),transparent)",pointerEvents:"none"}}/>
            <div style={{position:"absolute",top:7,right:7,display:"flex",gap:5,opacity:hover?1:0.5,transition:"opacity 0.15s"}}>
              <button onClick={toggleWL} style={{width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(10,10,10,0.82)",border:`0.5px solid ${inWL?C.amber+"60":"rgba(255,255,255,0.08)"}`,borderRadius:6,boxShadow:inWL?`0 0 10px ${C.amber}50`:"none",transition:"all 0.15s",cursor:"pointer"}}><EyeIcon size={13} color={inWL?C.amber:"#909090"}/></button>
              <button onClick={clickCheck} style={{width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(10,10,10,0.82)",border:`0.5px solid ${inW?C.green+"60":"rgba(255,255,255,0.08)"}`,borderRadius:6,boxShadow:inW?`0 0 10px ${C.green}50`:"none",transition:"all 0.15s",cursor:"pointer"}}><CheckIcon size={13} color={inW?C.green:"#909090"}/></button>
            </div>

            {inW&&type==="movie"&&(<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.25)",display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><div style={{background:`${C.green}22`,border:`1.5px solid ${C.green}60`,borderRadius:6,padding:"5px 10px",display:"flex",alignItems:"center",gap:5}}><CheckIcon size={12} color={C.green}/><span style={{fontSize:10,fontWeight:600,color:C.green,letterSpacing:"0.04em"}}>WATCHED</span></div></div>)}
            {(()=>{const tot=showTotals?.get(String(id))||item.number_of_episodes||0;return inW&&type==="tv"&&epWatchedCount>0&&tot>0&&(<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}><div style={{background:"rgba(0,0,0,0.55)",border:`1.5px solid ${C.green}50`,borderRadius:8,padding:"5px 10px"}}><span style={{fontSize:13,fontWeight:700,color:C.green,letterSpacing:"0.02em",textShadow:`0 0 8px ${C.green}80`}}>{Math.round(epWatchedCount/tot*100)}%</span></div></div>);})()}
            {inW&&type==="tv"&&(<div style={{position:"absolute",bottom:0,left:0,right:0,padding:"6px 8px 7px",textAlign:"center",pointerEvents:"none"}}><span style={{fontSize:10,fontWeight:700,color:C.green,letterSpacing:"0.03em",textShadow:"0 1px 4px rgba(0,0,0,0.8)"}}>{epWatchedCount>0?(item.number_of_episodes?`${epWatchedCount} of ${item.number_of_episodes} episodes watched`:`${epWatchedCount} episodes watched`):"WATCHED"}</span></div>)}
          </div>
          <div style={{padding:"9px 9px 11px"}}>
            <div style={{fontSize:12,fontWeight:500,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:5,lineHeight:1.3}}>{title}</div>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:showPersonCredit&&(item.character||item.job||(type==="tv"&&item.episode_count>0))?4:6}}>
              {year&&<span style={{fontSize:11,color:C.muted}}>{year}</span>}
              <span style={{fontSize:8.5,fontWeight:700,letterSpacing:"0.06em",background:`${bc}1a`,color:bc,borderRadius:3,padding:"1.5px 4px"}}>{type==="movie"?"MOVIE":"TV"}</span>
            </div>
            {showPersonCredit&&(item.character||item.job)&&<div style={{fontSize:10,color:C.muted,lineHeight:1.35,marginBottom:type==="tv"&&item.episode_count>0?2:5,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{item.character||item.job}</div>}

    // ── Search Page ──────────────────────────────────────────────────────────
    const _searchPageCache={};
    const SearchPage=({goTo,watchlist,setWatchlist,watched,setWatched,defaultType,initialProvider,showTotals})=>{
      const _c=_searchPageCache;
      const scrollRef=useRef(null);
      const searchInputRef=useRef(null);
      const _hasCache=!!(_c.browseItems?.length||_c.searchItems?.length);
      const _restoring=useRef(_hasCache&&!defaultType&&!initialProvider);
      const [inputVal,setInputVal]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.inputVal||""):"");
      const [query,setQuery]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.query||""):"");
      // browseActive = true only when user has clicked a pill to browse; pills highlighted only then
      const [browseActive,setBrowseActive]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.browseActive||false):!!(defaultType||initialProvider));
      const [mediaType,setMediaType]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.mediaType||"movie"):(defaultType||(initialProvider?"movie":"movie")));
      const [sortBy,setSortBy]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.sortBy||"Top Streaming"):"Top Streaming");
      const [filters,setFilters]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.filters||{}):{});
      const [openFilter,setOpenFilter]=useState(null);
      const [provider,setProvider]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.provider||null):(initialProvider||null));

      // Browse/filter data (pill browse or filter-only)
      const [browseItems,setBrowseItems]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.browseItems||[]):[]);
      const [browsePage,setBrowsePage]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.browsePage||1):1);
      const [browseHasMore,setBrowseHasMore]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.browseHasMore||false):false);
      const [browseLoading,setBrowseLoading]=useState(false);
      const [browseLoadingMore,setBrowseLoadingMore]=useState(false);

      // Text search data
      const [searchItems,setSearchItems]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.searchItems||[]):[]);
      const [searchPage,setSearchPage]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.searchPage||1):1);
      const [searchHasMore,setSearchHasMore]=useState(_hasCache&&!defaultType&&!initialProvider?(_c.searchHasMore||false):false);
      const [searchLoading,setSearchLoading]=useState(false);
      const [searchLoadingMore,setSearchLoadingMore]=useState(false);

      const hasQuery=query.trim().length>0;
      const activeCount=Object.values(filters).reduce((a,s)=>a+(s?.size||0),0);
      const hasFilters=activeCount>0;
      // mode: "blank" until user acts; "search" = text typed; "browse" = pill clicked; "filter" = filters applied without pill
      const mode=hasQuery?"search":browseActive?"browse":hasFilters?"filter":"blank";
      const accentColor=mediaType==="tv"?C.green:mediaType==="person"?C.purple:C.blue;
      const colTemplate=mediaType==="person"?"repeat(auto-fill,minmax(130px,1fr))":"repeat(auto-fill,minmax(160px,1fr))";

      // Auto-focus search input on fresh open (not cache restore)
      useEffect(()=>{if(!_restoring.current)searchInputRef.current?.focus();},[]);

      // Debounce input → query
      useEffect(()=>{const t=setTimeout(()=>setQuery(inputVal),350);return()=>clearTimeout(t);},[inputVal]);

      // Unified fetch: handles Top Streaming, discover with sort, and discover with filters
      const fetchPage=async(pg,type,prov,sort,fo)=>{
        const t=type||"movie";const f=fo||{};
        const hasF=Object.values(f).some(s=>s?.size>0);
        try{
          if(t==="person"){
            const d=await api("/person/popular",{page:pg});
            return{items:(d.results||[]).map(r=>({...r,media_type:"person"})),totalPages:Math.min(d.total_pages||1,5)};
          }
          const ep=t==="movie"?"/discover/movie":"/discover/tv";
          const trendEp=t==="movie"?"/trending/movie/week":"/trending/tv/week";
          const dk=t==="movie"?"primary_release_date":"first_air_date";
          const nameKey=t==="movie"?"original_title":"name";
          // Top Streaming (no filters active)
          if(!hasF&&(!sort||sort==="Top Streaming")){
            if(prov){
              const params={page:pg,language:"en-US",with_original_language:"en",sort_by:"popularity.desc",[dk+".lte"]:TODAY};
              if(prov.kind==="network")params.with_networks=prov.id;
              else{params.with_watch_providers=prov.id;params.watch_region="US";}
              const d=await api(ep,params);
              return{items:(d.results||[]).map(r=>({...r,media_type:t})),totalPages:d.total_pages||1};
            }
            const d=await api(trendEp,{page:pg});
            return{items:(d.results||[]).filter(r=>r.original_language==="en").map(r=>({...r,media_type:t})),totalPages:Math.min(d.total_pages||1,10)};
          }
          // Discover with sort + optional filters
          const GENRE_MAP_M={Action:28,Adventure:12,Animation:16,Comedy:35,Crime:80,Documentary:99,Drama:18,Fantasy:14,Horror:27,Mystery:9648,Romance:10749,"Sci-Fi":878,Thriller:53,Western:37};
          const GENRE_MAP_T={Action:10759,Animation:16,Comedy:35,Crime:80,Documentary:99,Drama:18,Family:10751,Fantasy:10765,Mystery:9648,Reality:10764,"Sci-Fi":10765,Thriller:53};
          const TV_STATUS_MAP={"Returning":0,"Ended":3,"Cancelled":4,"Mini-series":5};
          const params={page:pg,language:"en-US",with_original_language:"en",[dk+".lte"]:TODAY};
          if(sort==="Rating"){params.sort_by="vote_average.desc";params["vote_count.gte"]=t==="movie"?100:50;}
          else if(sort==="Newest")params.sort_by=`${dk}.desc`;
          else if(sort==="Oldest")params.sort_by=`${dk}.asc`;
          else params.sort_by="popularity.desc";
          if(prov){if(prov.kind==="network")params.with_networks=prov.id;else{params.with_watch_providers=prov.id;params.watch_region="US";}}
          const gSel=f.genre||new Set(),dSel=f.decade||new Set(),rSel=f.rating||new Set(),stSel=f.status||new Set();
          if(gSel.size>0){const ids=[...gSel].map(g=>(t==="tv"?GENRE_MAP_T:GENRE_MAP_M)[g]).filter(Boolean);if(ids.length)params.with_genres=ids.join("|");}
          if(dSel.size>0){const DR={"2020s":["2020","2029"],"2010s":["2010","2019"],"2000s":["2000","2009"],"1990s":["1990","1999"],"1980s":["1980","1989"],"1970s":["1970","1979"],"Older":["1900","1969"]};const ranges=[...dSel].map(d=>DR[d]).filter(Boolean);if(ranges.length){params[dk+".gte"]=`${Math.min(...ranges.map(r=>parseInt(r[0])))}-01-01`;params[dk+".lte"]=`${Math.max(...ranges.map(r=>parseInt(r[1])))}-12-31`;}}
          if(rSel.size>0){params["vote_average.gte"]=Math.min(...[...rSel].map(v=>parseFloat(v)));params["vote_count.gte"]=20;}
          if(stSel.size>0&&t==="tv"){const sc=[...stSel].map(s=>TV_STATUS_MAP[s]).filter(v=>v!==undefined);if(sc.length)params.with_status=sc[0];}
          const d=await api(ep,params);
          return{items:(d.results||[]).map(r=>({...r,media_type:t})),totalPages:d.total_pages||1};
        }catch{return{items:[],totalPages:1};}
      };

      const isLoadingMoreRef=useRef(false);

      // Browse/filter effect — runs when browseActive OR hasFilters (not in search or blank)
      useEffect(()=>{
        if(hasQuery||(!browseActive&&!hasFilters))return; // blank or search mode
        if(mediaType==="person")return; // People pill: start blank, search-only
        if(_restoring.current)return;
        let cancelled=false;
        isLoadingMoreRef.current=false;
        (async()=>{
          setBrowseLoading(true);setBrowseItems([]);setBrowsePage(1);setBrowseHasMore(false);
          const{items,totalPages}=await fetchPage(1,mediaType,provider,sortBy,filters);
          if(cancelled)return;
          setBrowseItems(items);setBrowseHasMore(1<totalPages);setBrowseLoading(false);

        return()=>{cancelled=true;};
      },[browseActive,mediaType,provider,sortBy,filters,query]);

      // Search effect — fires when query changes
      useEffect(()=>{
        if(_restoring.current)return;
        if(!hasQuery){setSearchItems([]);setSearchPage(1);setSearchHasMore(false);return;}
        isLoadingMoreRef.current=false;
        setSearchLoading(true);setSearchItems([]);setSearchPage(1);setSearchHasMore(false);
        (async()=>{
          try{
            const d=await api("/search/multi",{query:query.trim(),include_adult:"false",page:1});
            const res=(d.results||[]).filter(r=>r.media_type==="person"||r.original_language==="en");
            setSearchItems(res);setSearchHasMore((d.total_pages||1)>1);
          }catch{setSearchItems([]);}
          setSearchLoading(false);
        })();
      },[query]);

      // ── Clear restoring flag after initial effects fire ───────────────────
      useEffect(()=>{_restoring.current=false;},[]);
      // ── Persist state to cache on every change ────────────────────────────
      useEffect(()=>{Object.assign(_c,{inputVal,query,browseActive,mediaType,sortBy,filters,provider,browseItems,browsePage,browseHasMore,searchItems,searchPage,searchHasMore});},[inputVal,query,browseActive,mediaType,sortBy,filters,provider,browseItems,browsePage,browseHasMore,searchItems,searchPage,searchHasMore]);
      // ── Restore scroll position on mount ─────────────────────────────────
      useLayoutEffect(()=>{if(_c.scrollTop&&scrollRef.current)scrollRef.current.scrollTop=_c.scrollTop;},[]);

      // Client-side filter applied to search results (when in search mode with filters active)
      const filteredSearchItems=useMemo(()=>{
        if(!hasQuery||!hasFilters)return searchItems;
        const GENRE_MAP_M={Action:28,Adventure:12,Animation:16,Comedy:35,Crime:80,Documentary:99,Drama:18,Fantasy:14,Horror:27,Mystery:9648,Romance:10749,"Sci-Fi":878,Thriller:53,Western:37};
        const GENRE_MAP_T={Action:10759,Animation:16,Comedy:35,Crime:80,Documentary:99,Drama:18,Family:10751,Fantasy:10765,Mystery:9648,Reality:10764,"Sci-Fi":10765,Thriller:53};
        const DR={"2020s":["2020","2029"],"2010s":["2010","2019"],"2000s":["2000","2009"],"1990s":["1990","1999"],"1980s":["1980","1989"],"1970s":["1970","1979"],"Older":["1900","1969"]};
        let res=[...searchItems];
        const gSel=filters.genre||new Set(),dSel=filters.decade||new Set(),rSel=filters.rating||new Set();
        if(gSel.size>0)res=res.filter(r=>{if(r.media_type==="person")return true;const m=r.media_type==="tv"?GENRE_MAP_T:GENRE_MAP_M;return[...gSel].some(g=>(r.genre_ids||[]).includes(m[g]));});
        if(dSel.size>0)res=res.filter(r=>{if(r.media_type==="person")return true;const yr=parseInt((r.release_date||r.first_air_date||"").slice(0,4));return yr&&[...dSel].some(d=>{const rng=DR[d];return rng&&yr>=parseInt(rng[0])&&yr<=parseInt(rng[1]);});});
        if(rSel.size>0){const minR=Math.min(...[...rSel].map(v=>parseFloat(v)));res=res.filter(r=>r.media_type==="person"||(r.vote_average||0)>=minR);}
        return res;
      },[searchItems,filters,hasFilters,hasQuery]);

      // Always-fresh load-more ref
      const doLoadMoreRef=useRef(null);
      doLoadMoreRef.current=async()=>{
        if(isLoadingMoreRef.current)return;
        if(hasQuery){
          if(!searchHasMore)return;
          isLoadingMoreRef.current=true;setSearchLoadingMore(true);
          const next=searchPage+1;
          try{
            const d=await api("/search/multi",{query:query.trim(),include_adult:"false",page:next});
            const res=(d.results||[]).filter(r=>r.media_type==="person"||r.original_language==="en");
            setSearchItems(prev=>{const seen=new Set(prev.map(x=>x.id));return[...prev,...res.filter(x=>!seen.has(x.id))];});
            setSearchPage(next);setSearchHasMore(next<(d.total_pages||1));

          if(!browseHasMore)return;

      };

      const observerRef=useRef(null);
      const setSentinel=useCallback(node=>{
        if(observerRef.current){observerRef.current.disconnect();observerRef.current=null;}
        if(!node)return;
        observerRef.current=new IntersectionObserver(entries=>{if(entries[0].isIntersecting)doLoadMoreRef.current?.();},{threshold:0,rootMargin:"400px"});
        observerRef.current.observe(node);
      },[]);

      // Display data: search mode uses filteredSearchItems (with optional client-side filters)
      const displayItems=hasQuery?filteredSearchItems:browseItems;
      const displayLoading=hasQuery?searchLoading:browseLoading;
      const displayLoadingMore=hasQuery?searchLoadingMore:browseLoadingMore;
      const displayHasMore=hasQuery?searchHasMore:browseHasMore;

      // Pill click: always enters browse mode, clears text and filters
      const handlePillClick=(type)=>{
        if(browseActive&&mediaType===type&&!hasQuery){setBrowseActive(false);return;} // toggle off
        setMediaType(type);setBrowseActive(true);setInputVal("");setFilters({});setOpenFilter(null);
      };

      // Input change: typing un-highlights pills (exits browse mode)
      const handleInputChange=(val)=>{
        setInputVal(val);
        if(val.trim())setBrowseActive(false);
      };

      // Clear all: resets to blank state
      const handleClearAll=()=>{setInputVal("");setFilters({});setBrowseActive(false);setOpenFilter(null);};

      // FDrop component
      const FDrop=({label,cat,options})=>{
        const sel=filters[cat]||new Set();const hasVal=sel.size>0;const isOpen=openFilter===cat;
        const toggle=v=>setFilters(p=>{const g=new Set(p[cat]||[]);g.has(v)?g.delete(v):g.add(v);return{...p,[cat]:g};});
        return(
          <div style={{position:"relative"}} onClick={e=>e.stopPropagation()}>
            <button onClick={()=>setOpenFilter(isOpen?null:cat)} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:6,border:hasVal?`1px solid ${accentColor}50`:`0.5px solid ${C.hover}`,background:hasVal?`${accentColor}12`:C.elevated,color:hasVal?accentColor:C.muted,fontSize:11,cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.12s"}}>
              {label}{hasVal?` · ${sel.size}`:""}
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points={isOpen?"18,15 12,9 6,15":"6,9 12,15 18,9"}/></svg>
            </button>
            {isOpen&&(<div style={{position:"absolute",top:"calc(100% + 4px)",left:0,zIndex:200,background:C.elevated,border:C.border,borderRadius:8,padding:6,minWidth:150,maxHeight:220,overflowY:"auto",boxShadow:`0 8px 24px ${C.shadow}`}}>
              {options.map(opt=>{const on=sel.has(opt);return(<div key={opt} onClick={()=>toggle(opt)} style={{padding:"5px 9px",borderRadius:5,cursor:"pointer",fontSize:11,color:on?accentColor:C.text,background:on?`${accentColor}18`:"transparent",fontWeight:on?600:400}}>{opt}</div>);})}
              {hasVal&&<div onClick={()=>setFilters(p=>({...p,[cat]:new Set()}))} style={{borderTop:`0.5px solid ${C.hover}`,marginTop:4,padding:"5px 9px",fontSize:10,color:C.muted,cursor:"pointer",textAlign:"center"}}>Clear</div>}
            </div>)}
          </div>
        );
      };

      const statusLabel=displayLoading?"Loading…":hasQuery?`${filteredSearchItems.length} result${filteredSearchItems.length!==1?"s":""} for "${query}"${displayHasMore?" · scroll for more":""}`:mode==="browse"||mode==="filter"?`${displayItems.length} results${displayHasMore?" · scroll for more":""}`:""

      return(<div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <Sidebar activeProvider={provider} onSelect={p=>{setProvider(prev=>prev?.id===p.id&&prev?.kind===p.kind?null:p);setOpenFilter(null);}}/>
        <div ref={scrollRef} onScroll={()=>{if(scrollRef.current)_c.scrollTop=scrollRef.current.scrollTop;}} style={{flex:1,overflow:"auto",padding:"20px 24px 32px",willChange:"transform"}} onClick={()=>setOpenFilter(null)}>
          {/* Provider banner */}
          {provider&&(<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,background:C.elevated,border:`1px solid ${C.amber}40`,borderRadius:8,padding:"8px 14px"}}>
            <span style={{fontSize:11,color:C.muted}}>Filtered by</span>
            <span style={{fontSize:12,fontWeight:600,color:C.amber}}>{provider.name}</span>
            <button onClick={()=>setProvider(null)} style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5,background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",padding:0}}><XIcon size={10}/>Clear</button>
          </div>)}
          {/* Search input */}
          <div onClick={e=>e.stopPropagation()} style={{display:"flex",gap:8,marginBottom:14}}>
            <div style={{flex:1,position:"relative"}}>
              <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><SearchIcon size={14} color={inputVal?C.text:C.muted}/></div>
              <input ref={searchInputRef} value={inputVal} onChange={e=>handleInputChange(e.target.value)} placeholder={provider?`Search within ${provider.name}…`:"Search movies, TV shows, people…"} style={{width:"100%",background:C.elevated,border:inputVal?`1px solid ${C.muted}40`:C.border,borderRadius:8,color:C.text,padding:"9px 12px 9px 38px",fontSize:13,outline:"none",transition:"border 0.15s"}}/>
            </div>
            {(inputVal||activeCount>0||browseActive)&&<button onClick={handleClearAll} style={{background:C.elevated,border:C.border,borderRadius:8,padding:"0 14px",color:C.muted,fontSize:12,cursor:"pointer",flexShrink:0}}>Clear all</button>}
          </div>
          {/* Type pills — highlighted only when pill is the active browse mode */}
          <div onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,flexWrap:"wrap"}}>
            <TypePill label="Movies" active={browseActive&&mediaType==="movie"&&!hasQuery} onClick={()=>handlePillClick("movie")} color={C.blue}/>
            <TypePill label="TV Shows" active={browseActive&&mediaType==="tv"&&!hasQuery} onClick={()=>handlePillClick("tv")} color={C.green}/>
            <TypePill label="People" active={browseActive&&mediaType==="person"&&!hasQuery} onClick={()=>handlePillClick("person")} color={C.purple}/>
          </div>
          {/* Filter dropdowns — visible in browse and filter modes (not blank/search for person) */}
          {mode!=="blank"&&mediaType!=="person"&&(<div onClick={e=>e.stopPropagation()} style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {(mediaType==="movie"||mode==="search")&&<><FDrop label="Genre" cat="genre" options={MOVIE_GENRES}/><FDrop label="Decade" cat="decade" options={DECADES}/><FDrop label="Rating" cat="rating" options={RATINGS_OPT}/>{mode!=="search"&&<FDrop label="Runtime" cat="runtime" options={RUNTIMES}/>}</>}
            {mediaType==="tv"&&mode!=="search"&&<><FDrop label="Genre" cat="genre" options={TV_GENRES}/><FDrop label="Status" cat="status" options={TV_STATUS}/><FDrop label="Decade" cat="decade" options={DECADES}/><FDrop label="Rating" cat="rating" options={RATINGS_OPT}/></>}
            {activeCount>0&&<button onClick={()=>setFilters({})} style={{background:"none",border:"none",color:C.muted,fontSize:11,cursor:"pointer",padding:"5px 6px",marginLeft:4}}>Clear filters ×</button>}
          </div>)}
          {/* Sort bar + count — visible when there are results; sort hidden in search mode */}
          {mode!=="blank"&&(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"0.5px solid #222",paddingBottom:12,marginBottom:18}}>
              <span style={{fontSize:11,color:C.muted}}>{statusLabel}</span>
              {mode!=="search"&&mediaType!=="person"&&<div style={{display:"flex",alignItems:"center"}}>{SORTS.map((s,i)=>(<span key={s} style={{display:"flex",alignItems:"center"}}>{i>0&&<span style={{color:C.hover,margin:"0 7px",fontSize:11}}>|</span>}<button onClick={()=>setSortBy(s)} style={{background:"none",border:"none",padding:0,color:sortBy===s?C.amber:C.muted,fontSize:11,fontWeight:sortBy===s?600:400,cursor:"pointer"}}>{s}</button></span>))}</div>}
            </div>
          )}
          {/* Results / blank state */}
          {(mode==="blank"||(browseActive&&mediaType==="person"&&!hasQuery))
            ?<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",paddingTop:80,color:C.muted,gap:10}}>
               <SearchIcon size={32} color="#333"/>
               {browseActive&&mediaType==="person"
                 ?<div style={{fontSize:13,color:"#444",textAlign:"center",maxWidth:320}}>Start typing to search for an actor, director, or any person in film &amp; TV.</div>
                 :<div style={{fontSize:13,color:"#444",textAlign:"center",maxWidth:320}}>Type to search for anything, or pick a category above to browse. Use filters for a targeted search.</div>
               }
             </div>
            :displayLoading
              ?<div style={{display:"grid",gridTemplateColumns:colTemplate,gap:12}}>{Array(16).fill(0).map((_,i)=><SkeletonCard key={i}/>)}</div>
              :displayItems.length===0
                ?<div style={{textAlign:"center",padding:"80px 0",color:C.muted}}><div style={{fontSize:32,marginBottom:12}}>🔍</div><div style={{fontSize:14}}>{hasQuery?`No results for "${query}"`:"Nothing matches your filters"}</div></div>
                :<>
                  <div style={{display:"grid",gridTemplateColumns:colTemplate,gap:12,marginBottom:8,animation:"fadeIn 0.2s ease"}}>
                    {displayItems.map(item=>item.media_type==="person"?<PersonCard key={item.id} item={item} goTo={goTo}/>:<Card key={item.id} item={item} watchlist={watchlist} setWatchlist={setWatchlist} watched={watched} setWatched={setWatched} goTo={goTo} showTotals={showTotals}/>)}
                  </div>
                  <div ref={setSentinel} style={{height:56,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {displayLoadingMore&&<div style={{fontSize:12,color:C.muted}}>Loading more…</div>}
                    {!displayHasMore&&displayItems.length>0&&<div style={{fontSize:11,color:C.muted}}>You've seen it all</div>}
                  </div>
                </>
          }
        </div>
      </div>);
    };

    // ── Home Page ────────────────────────────────────────────────────────────
    // ── HistoryCard — handles movies, TV shows, and episodes ─────────────────
    const HistoryCard=({item,onRemove,goTo,character})=>{
      const [h,setH]=useState(false);
      const [confirmDel,setConfirmDel]=useState(false);
      const type=item.media_type||"movie";
      const isEpisode=type==="episode";
      const title=isEpisode?(item.showName||"TV Show"):(item.title||item.name||"Untitled");
      const epName=isEpisode?item.name:null;
      const year=(item.release_date||item.first_air_date||"").slice(0,4);
      const airYear=isEpisode&&item.air_date?item.air_date.slice(0,4):null;
      const bc=type==="movie"?C.blue:C.green;
      // Rating for all types — movies, TV shows, and episodes
      const rating=item.vote_average>0?item.vote_average.toFixed(1):null;
      const sNum=item.season_number?String(item.season_number).padStart(2,"0"):null;
      const eNum=item.episode_number?String(item.episode_number).padStart(2,"0"):null;
      const badge=sNum&&eNum?`S${sNum}E${eNum}`:null;
      const imageUrl=isEpisode
        ?(item.still_path?img(item.still_path,"w300"):item.showPoster?img(item.showPoster,"w342"):null)
        :(item.backdrop_path?img(item.backdrop_path,"w780"):item.poster_path?img(item.poster_path,"w342"):null);
      // Full date + time for the watched badge: "4/1/2026 10:15 PM"
      const watchedLabel=item.watchedAt?(()=>{const d=new Date(item.watchedAt);return`${d.toLocaleDateString("en-US")} ${d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}`;})():null;
      const handleClick=()=>{
        if(!goTo)return;
        if(type==="movie")goTo("movie-detail",item);
        else if(isEpisode)goTo("episode-detail",{
          show:{id:item.showId,name:item.showName,poster_path:item.showPoster,backdrop_path:item.showBackdrop},
          season:{season_number:item.season_number,name:`Season ${item.season_number}`},
          episode:item
        });
        else goTo("tv-detail",item);
      };
      return(<div onMouseEnter={()=>setH(true)} onMouseLeave={()=>{setH(false);setConfirmDel(false);}} onClick={handleClick}
        style={{background:C.surface,borderRadius:8,overflow:"hidden",border:h?`0.5px solid ${C.hover}`:C.border,transform:h?"translateY(-2px)":"none",transition:"transform 0.15s,border-color 0.15s",cursor:"pointer"}}>
        <div style={{position:"relative",paddingTop:"75%",background:C.elevated,overflow:"hidden"}}>
          {imageUrl?<img src={imageUrl} alt={title} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top"}} loading="lazy"/>:<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,opacity:0.2}}>{isEpisode?"📺":"🎬"}</div>}
          <div style={{position:"absolute",bottom:0,left:0,right:0,height:"50%",background:"linear-gradient(to top,rgba(13,13,13,0.9),transparent)",pointerEvents:"none"}}/>
          {badge&&<div style={{position:"absolute",top:7,left:7,background:"rgba(0,0,0,0.72)",borderRadius:4,padding:"2px 6px",fontSize:9,fontWeight:600,color:"#ccc",letterSpacing:"0.04em"}}>{badge}</div>}
          {watchedLabel&&<div style={{position:"absolute",bottom:7,left:7,right:7,display:"flex",alignItems:"center",gap:4,background:`${C.green}22`,border:`1px solid ${C.green}50`,borderRadius:5,padding:"2px 6px"}}><CheckIcon size={9} color={C.green}/><span style={{fontSize:8,color:C.green,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{watchedLabel}</span></div>}
          {onRemove&&h&&!confirmDel&&<button onClick={e=>{e.stopPropagation();setConfirmDel(true);}} style={{position:"absolute",top:6,right:6,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(180,30,30,0.85)",border:"none",borderRadius:5,cursor:"pointer"}}><XIcon size={10} color="#fff"/></button>}
          {onRemove&&confirmDel&&<div onClick={e=>e.stopPropagation()} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,padding:12}}>
            <span style={{fontSize:11,fontWeight:600,color:"#fff",textAlign:"center",lineHeight:1.4}}>Are you sure you want to erase this?</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={e=>{e.stopPropagation();onRemove();}} style={{padding:"5px 14px",background:"rgba(180,30,30,0.9)",border:"none",borderRadius:5,color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer"}}>Erase</button>
              <button onClick={e=>{e.stopPropagation();setConfirmDel(false);}} style={{padding:"5px 14px",background:"rgba(255,255,255,0.12)",border:"none",borderRadius:5,color:"#ccc",fontSize:11,fontWeight:600,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>}
        </div>
        <div style={{padding:"8px 9px 10px"}}>
          <div style={{fontSize:12,fontWeight:500,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:isEpisode?2:4,lineHeight:1.3}}>{title}</div>
          {isEpisode&&epName&&<div style={{fontSize:10.5,color:C.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:2}}>{epName}</div>}
          {isEpisode&&character&&<div style={{fontSize:9.5,color:C.purple,fontStyle:"italic",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:3,opacity:0.85}}>as {character}</div>}
          {isEpisode
            ?<div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}>{airYear&&<span style={{fontSize:10.5,color:C.muted}}>{airYear}</span>}<span style={{fontSize:8.5,fontWeight:700,letterSpacing:"0.06em",background:`${C.green}1a`,color:C.green,borderRadius:3,padding:"1.5px 4px"}}>EPISODE</span></div>
            :<div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}>{year&&<span style={{fontSize:11,color:C.muted}}>{year}</span>}<span style={{fontSize:8.5,fontWeight:700,letterSpacing:"0.06em",background:`${bc}1a`,color:bc,borderRadius:3,padding:"1.5px 4px"}}>{type==="movie"?"MOVIE":"TV"}</span></div>
          }
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}><RatingChip label="TMDB" value={rating||"N/A"} color="#01b4e4"/><RatingChip label="IMDb" value={rating?(parseFloat(rating)*0.92+0.3).toFixed(1):"N/A"} color="#F5C518"/></div>
        </div>
      </div>);
    };

    // ── Continue Watching Card ────────────────────────────────────────────────
    const ContinueCard=({item,goTo,watched,setWatched,resolvedNext,compact=false})=>{
      const [hover,setHover]=useState(false);
      const [popup,setPopup]=useState(false);
      // nextInfo: null=loading, false=unavailable/unaired, {season,episode}=resolved
      const {showName,showPoster,showBackdrop,season,episode}=item;
      const [nextInfo,setNextInfo]=useState(()=>{
        if(resolvedNext)return resolvedNext;
        const ck=`${item.showId}:${season}:${episode}`;
        return _resolvedNextCache.has(ck)?_resolvedNextCache.get(ck):null;
      });
      useEffect(()=>{
        if(resolvedNext){setNextInfo(resolvedNext);return;}
        const cacheKey=`${item.showId}:${season}:${episode}`;
        if(_resolvedNextCache.has(cacheKey)){setNextInfo(_resolvedNextCache.get(cacheKey));return;}
        let cancelled=false;
        const today=todayTZ();
        const checkEp=(sn,ep)=>api(`/tv/${item.showId}/season/${sn}`).then(data=>{
          if(cancelled)return false;
          const epData=(data.episodes||[]).find(e=>e.episode_number===ep);
          if(epData&&epData.air_date&&epData.air_date<=today){const r={season:sn,episode:ep,airDate:epData.air_date};_resolvedNextCache.set(cacheKey,r);setNextInfo(r);return true;}
          return false;
        });
        checkEp(season,episode+1).then(found=>{
          if(found||cancelled)return;
          return checkEp(season+1,1).then(found2=>{if(!found2&&!cancelled){_resolvedNextCache.set(cacheKey,false);setNextInfo(false);}});
        }).catch(()=>{if(!cancelled)setNextInfo(false);});
        return()=>{cancelled=true;};
      },[item.showId,season,episode,resolvedNext]);
      if(!nextInfo)return null;
      const{season:nSeason,episode:nEp,airDate:nAirDate}=nextInfo;
      const sStr=String(nSeason).padStart(2,"0");
      const eStr=String(nEp).padStart(2,"0");
      const epKey=`ep-${item.showId}-${nSeason}-${nEp}`;
      const isW=watched?.has(epKey);
      const imageUrl=showBackdrop?img(showBackdrop,"w780"):showPoster?img(showPoster,"w342"):null;
      const goToNext=()=>{if(!goTo)return;goTo("episode-detail",{show:{id:item.showId,name:showName,poster_path:showPoster,backdrop_path:showBackdrop},season:{season_number:nSeason,name:`Season ${nSeason}`},episode:{episode_number:nEp,name:"",season_number:nSeason}});};
      const markW=(date)=>{setWatched(p=>{const n=new Map(p);const ex=n.get(epKey);const dates=ex?.dates?[...ex.dates,date]:ex?.date?[ex.date,date]:[date];n.set(epKey,{item:{media_type:"episode",showId:item.showId,showName,showPoster,showBackdrop,season_number:nSeason,episode_number:nEp,name:""},date,dates});return n;});setPopup(false);};
      if(compact)return(<>{popup&&<WatchedPopup title={`${showName} — S${sStr}E${eStr}`} onClose={()=>setPopup(false)} onSave={markW} airDate={nAirDate}/>}
      <div onClick={goToNext} onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} style={{display:"inline-flex",alignItems:"center",gap:6,background:hover?"rgba(255,255,255,0.06)":C.elevated,border:C.border,borderRadius:6,padding:"5px 10px",cursor:"pointer",transition:"background 0.15s"}}>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.05em",color:"#555",textTransform:"uppercase"}}>Next up</span>
        <span style={{fontSize:11,color:C.muted}}>S{sStr}E{eStr}</span>
        <button onClick={e=>{e.stopPropagation();if(isW){setWatched(p=>{const n=new Map(p);n.delete(epKey);return n;});}else setPopup(true);}} style={{marginLeft:4,width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(10,10,10,0.82)",border:`0.5px solid ${isW?C.green+"60":"rgba(255,255,255,0.08)"}`,borderRadius:4,boxShadow:isW?`0 0 8px ${C.green}50`:"none",cursor:"pointer"}}><CheckIcon size={10} color={isW?C.green:"#909090"}/></button>
      </div></>);
      return(<>{popup&&<WatchedPopup title={`${showName} — S${sStr}E${eStr}`} onClose={()=>setPopup(false)} onSave={markW} airDate={nAirDate}/>}
      <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} onClick={goToNext} style={{background:C.surface,borderRadius:8,overflow:"hidden",border:hover?`0.5px solid ${C.hover}`:C.border,transform:hover?"translateY(-3px)":"none",boxShadow:hover?`0 8px 24px ${C.shadow}`:"none",transition:"transform 0.18s ease,box-shadow 0.18s ease,border-color 0.18s ease",cursor:"pointer"}}>
        <div style={{position:"relative",paddingTop:"75%",background:C.elevated,overflow:"hidden"}}>
          {imageUrl?<img src={imageUrl} alt={showName} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}} loading="lazy"/>:<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,opacity:0.15}}>📺</div>}
          <div style={{position:"absolute",bottom:0,left:0,right:0,height:"50%",background:"linear-gradient(to top,rgba(13,13,13,0.9),transparent)",pointerEvents:"none"}}/>
          <div style={{position:"absolute",top:7,right:7,opacity:hover?1:0.5,transition:"opacity 0.15s"}}><button onClick={e=>{e.stopPropagation();if(isW){setWatched(p=>{const n=new Map(p);n.delete(epKey);return n;});}else setPopup(true);}} style={{width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(10,10,10,0.82)",border:`0.5px solid ${isW?C.green+"60":"rgba(255,255,255,0.08)"}`,borderRadius:6,boxShadow:isW?`0 0 10px ${C.green}50`:"none",transition:"all 0.15s",cursor:"pointer"}}><CheckIcon size={13} color={isW?C.green:"#909090"}/></button></div>
        </div>
        <div style={{padding:"9px 10px 11px"}}>
          <div style={{fontSize:12,fontWeight:500,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:4}}>{showName}</div>
          <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:9,fontWeight:700,letterSpacing:"0.05em",color:"#555",textTransform:"uppercase"}}>Next up</span><span style={{fontSize:10.5,color:C.muted}}>S{sStr}E{eStr}</span></div>
        </div>
      </div></>);
    };
    const RecentCard=({item,watchlist,setWatchlist,watched,setWatched,goTo})=>{
      const [hover,setHover]=useState(false);const [popup,setPopup]=useState(false);
      const id=item.id,type=item.media_type||"movie",title=item.title||item.name||"Untitled";
      const year=(item.release_date||item.first_air_date||"").slice(0,4);
      const bc=type==="movie"?C.blue:C.green;
      const watchedRow=getWatchedEntry(watched,id),epRC=type==="tv"?epWatchedCountFor(watched,id):0;
      const inWL=watchlist.has(id),inW=type==="tv"?storedMediaLooksTv(watchedRow)||epRC>0:storedMediaLooksMovie(watchedRow);
      const imageUrl=item.backdrop_path?img(item.backdrop_path,"w780"):item.poster_path?img(item.poster_path,"w342"):null;
      const toggleWL=(e)=>{e.stopPropagation();setWatchlist(p=>{const n=new Map(p);n.has(id)?n.delete(id):n.set(id,item);return n;});};
      const clickCheck=(e)=>{e.stopPropagation();if(!inW){setPopup(true);return;}setWatched(p=>{const n=new Map(p),row=getWatchedEntry(p,id);if(type==="tv"){if(storedMediaLooksTv(row)){if(n.has(id))n.delete(id);if(n.has(String(id)))n.delete(String(id));}}else if(storedMediaLooksMovie(row)){if(n.has(id))n.delete(id);if(n.has(String(id)))n.delete(String(id));}return n;});};
      const markW=(date)=>{setWatched(p=>{const n=new Map(p);const ex=n.get(id);const dates=ex?.dates?[...ex.dates,date]:ex?.date?[ex.date,date]:[date];const cached=type==="movie"?mcGet("movie",id):null;const storedItem=cached?.production_companies?{...item,production_companies:cached.production_companies}:item;n.set(id,{item:storedItem,date,dates});return n;});setWatchlist(p=>{const n=new Map(p);n.delete(id);return n;});setPopup(false);};
      return(<><div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} onClick={()=>goTo&&(type==="movie"?goTo("movie-detail",item):goTo("tv-detail",item))} style={{background:C.surface,borderRadius:8,overflow:"hidden",border:hover?`0.5px solid ${C.hover}`:C.border,transform:hover?"translateY(-3px)":"none",boxShadow:hover?`0 8px 24px ${C.shadow}`:"none",transition:"transform 0.18s ease,box-shadow 0.18s ease,border-color 0.18s ease",cursor:"pointer"}}>
        <div style={{position:"relative",paddingTop:"75%",background:C.elevated,overflow:"hidden"}}>
          {imageUrl?<img src={imageUrl} alt={title} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top"}} loading="lazy"/>:<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,opacity:0.15}}>🎬</div>}
          <div style={{position:"absolute",bottom:0,left:0,right:0,height:"50%",background:"linear-gradient(to top,rgba(13,13,13,0.9),transparent)",pointerEvents:"none"}}/>
          <div style={{position:"absolute",top:7,right:7,display:"flex",gap:4,opacity:hover?1:0.5,transition:"opacity 0.15s"}}>
            <button onClick={toggleWL} style={{width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(10,10,10,0.82)",border:`0.5px solid ${inWL?C.amber+"60":"rgba(255,255,255,0.08)"}`,borderRadius:6,boxShadow:inWL?`0 0 10px ${C.amber}50`:"none",cursor:"pointer",transition:"all 0.15s"}}><EyeIcon size={13} color={inWL?C.amber:"#909090"}/></button>
            <button onClick={clickCheck} style={{width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(10,10,10,0.82)",border:`0.5px solid ${inW?C.green+"60":"rgba(255,255,255,0.08)"}`,borderRadius:6,boxShadow:inW?`0 0 10px ${C.green}50`:"none",cursor:"pointer",transition:"all 0.15s"}}><CheckIcon size={13} color={inW?C.green:"#909090"}/></button>
          </div>
        </div>
        <div style={{padding:"9px 10px 11px"}}>
          <div style={{fontSize:12,fontWeight:500,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:4}}>{title}</div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>{year&&<span style={{fontSize:10.5,color:C.muted}}>{year}</span>}<span style={{fontSize:8.5,fontWeight:700,letterSpacing:"0.06em",background:`${bc}1a`,color:bc,borderRadius:3,padding:"1.5px 4px"}}>{type==="movie"?"MOVIE":"TV"}</span></div>
        </div>
      </div>{popup&&<WatchedPopup title={title} onClose={()=>setPopup(false)} onSave={markW} airDate={item.release_date||item.first_air_date}/>}</>);
    };

const showsInProgressFromWatched=(watched)=>{
      const showMap=new Map();
      [...(watched||new Map()).entries()].forEach(([,{item,date}])=>{
        if(item?.media_type!=="episode"||!item.showId)return;
        const sn=item.season_number||1,ep=item.episode_number||1;
        const ex=showMap.get(item.showId);
        if(!ex||sn>ex.season||(sn===ex.season&&ep>ex.episode))
          showMap.set(item.showId,{showId:item.showId,showName:item.showName,showPoster:item.showPoster,showBackdrop:item.showBackdrop,season:sn,episode:ep,watchedAt:date});
      });
      return[...showMap.values()].sort((a,b)=>new Date(b.watchedAt)-new Date(a.watchedAt));
    };

    const ScheduleCard=({item,goTo})=>{
      const [h,setH]=useState(false);
      const title=item.showName||"TV Show";
      const epName=item.name||null;
      const bc=C.green;
      const sNum=item.season_number?String(item.season_number).padStart(2,"0"):null;
      const eNum=item.episode_number?String(item.episode_number).padStart(2,"0"):null;

      const imageUrl=item.still_path?img(item.still_path,"w300"):item.showPoster?img(item.showPoster,"w342"):null;

      const airLabel=item.air_date?new Date(item.air_date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}):"";
      const handleClick=()=>{
        if(!goTo)return;
        goTo("episode-detail",{
          show:{id:item.showId,name:item.showName,poster_path:item.showPoster,backdrop_path:item.showBackdrop},
          season:{season_number:item.season_number,name:`Season ${item.season_number}`},
          episode:item
        });
      };
      return(<div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} onClick={handleClick}
        style={{background:C.surface,borderRadius:8,overflow:"hidden",border:h?`0.5px solid ${C.hover}`:C.border,transform:h?"translateY(-2px)":"none",transition:"transform 0.15s,border-color 0.15s",cursor:"pointer"}}>
        <div style={{position:"relative",paddingTop:"75%",background:C.elevated,overflow:"hidden"}}>
          {imageUrl?<img src={imageUrl} alt={title} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top"}} loading="lazy"/>:<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,opacity:0.2}}>📺</div>}
          <div style={{position:"absolute",bottom:0,left:0,right:0,height:"50%",background:"linear-gradient(to top,rgba(13,13,13,0.9),transparent)",pointerEvents:"none"}}/>
          {badge&&<div style={{position:"absolute",top:7,left:7,background:"rgba(0,0,0,0.72)",borderRadius:4,padding:"2px 6px",fontSize:9,fontWeight:600,color:"#ccc",letterSpacing:"0.04em"}}>{badge}</div>}
          {airLabel&&<div style={{position:"absolute",bottom:7,left:7,right:7,display:"flex",alignItems:"center",gap:4,background:`${C.amber}22`,border:`1px solid ${C.amber}50`,borderRadius:5,padding:"2px 6px"}}><span style={{fontSize:8,color:C.amber,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{airLabel}</span></div>}
        </div>
        <div style={{padding:"8px 9px 10px"}}>
          <div style={{fontSize:12,fontWeight:500,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:epName?2:4,lineHeight:1.3}}>{title}</div>
          {epName&&<div style={{fontSize:10.5,color:C.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginBottom:3}}>{epName}</div>}
          <div style={{display:"flex",alignItems:"center",gap:5}}>{airYear&&<span style={{fontSize:10.5,color:C.muted}}>{airYear}</span>}<span style={{fontSize:8.5,fontWeight:700,letterSpacing:"0.06em",background:`${bc}1a`,color:bc,borderRadius:3,padding:"1.5px 4px"}}>EPISODE</span></div>
        </div>
      </div>);
    };

    const CalendarPage=({watched,goTo})=>{
      const _curShowIdsKey=useMemo(()=>[...showsInProgressFromWatched(watched).keys()].sort().join(","),[watched]);
      const _calHit=_calendarCache.showIdsKey===_curShowIdsKey;
      const [episodes,setEpisodes]=useState(_calHit?_calendarCache.episodes:[]);
      const [loading,setLoading]=useState(!_calHit);
      const [weekNavLoading,setWeekNavLoading]=useState(false);
      const [calendarWeekIndex,setCalendarWeekIndex]=useState(0);
      const [weeksFetched,setWeeksFetched]=useState(_calHit?_calendarCache.weeksFetched:[false,false,false,false]);
      const [selectedDay,setSelectedDay]=useState(null);
      const seasonMemRef=useRef({cache:new Map(),inflight:new Map()});
      const loadGenRef=useRef(0);
      const loaderRef=useRef({runWeek:null,showList:null,todayStart:null,gen:0});
      const weeksFetchedRef=useRef(_calHit?[..._calendarCache.weeksFetched]:[false,false,false,false]);
      const shows=useMemo(()=>showsInProgressFromWatched(watched),[watched]);

      const mergeEps=(prev,add)=>{
        const sortEps=(a,b)=>a.air_date.localeCompare(b.air_date)||(a.showName||"").localeCompare(b.showName||"")||a.season_number-b.season_number||a.episode_number-b.episode_number;
        const k=e=>`ep-${e.showId}-${e.season_number}-${e.episode_number}`;
        const m=new Map();
        prev.forEach(e=>m.set(k(e),e));
        add.forEach(e=>m.set(k(e),e));
        return[...m.values()].sort(sortEps);
      };

      useEffect(()=>{
        const gen=++loadGenRef.current;
        let cancelled=false;
        const mem=seasonMemRef.current;
        const doFetch=_calendarCache.showIdsKey!==_curShowIdsKey;
        if(doFetch){
          mem.cache.clear();
          mem.inflight.clear();
          weeksFetchedRef.current=[false,false,false,false];
          setLoading(true);
          setEpisodes([]);
          setWeeksFetched([false,false,false,false]);
          setCalendarWeekIndex(0);
        }
        const showList=showsInProgressFromWatched(watched);
        const todayStart=new Date();todayStart.setHours(0,0,0,0);
        const todayStr=localISODate(todayStart);
        if(showList.length===0){if(doFetch)setLoading(false);return;}
        const fetchSeasonCached=async(showId,sn)=>{
          const key=`${showId}:${sn}`;
          if(mem.cache.has(key))return mem.cache.get(key);
          if(mem.inflight.has(key))return mem.inflight.get(key);
          const persisted=mcGet("season",`${showId}_${sn}`);
          if(persisted){mem.cache.set(key,persisted);return persisted;}
          const p=(async()=>{
            try{
              const data=await api(`/tv/${showId}/season/${sn}`);
              if(data){mem.cache.set(key,data);mcSet("season",`${showId}_${sn}`,data);}
              return data;
            }finally{mem.inflight.delete(key);}
          })();
          mem.inflight.set(key,p);
          return p;
        };
        const collectWeek=async(show,weekStartStr,weekEndStr)=>{
          const rows=[];
          let sn=show.season,startEp=show.episode+1;
          for(let iter=0;iter<4&&!cancelled;iter++){
            let data;
            try{data=await fetchSeasonCached(show.showId,sn);}catch{break;}
            if(!data?.episodes?.length)break;
            let pastRange=false;
            for(const ep of data.episodes){
              if(ep.episode_number<startEp)continue;
              const ad=ep.air_date;
              if(!ad)continue;
              if(ad>weekEndStr){pastRange=true;break;}
              if(ad<weekStartStr||ad<todayStr)continue;
              const epKey=`ep-${show.showId}-${sn}-${ep.episode_number}`;
              if(watched.has(epKey))continue;
              rows.push({
                media_type:"episode",
                showId:show.showId,showName:show.showName,showPoster:show.showPoster,showBackdrop:show.showBackdrop,
                season_number:sn,episode_number:ep.episode_number,name:ep.name||"",still_path:ep.still_path,vote_average:ep.vote_average,air_date:ad
              });
            }
            if(pastRange)break;
            sn++;startEp=1;
          }
          return rows;
        };
        const runWeek=async(weekIndex)=>{
          const weekStart=localISODate(addLocalDays(todayStart,weekIndex*7));
          const weekEnd=localISODate(addLocalDays(todayStart,Math.min(weekIndex*7+6,27)));
          const parts=await Promise.all(showList.map(s=>collectWeek(s,weekStart,weekEnd)));
          return parts.flat();
        };
        loaderRef.current={runWeek,showList,todayStart,gen};
        if(!doFetch){setLoading(false);return()=>{cancelled=true;};}
        (async()=>{
          const w0=await runWeek(0);
          if(cancelled||gen!==loadGenRef.current)return;
          const merged=mergeEps([],w0);
          setEpisodes(()=>merged);
          weeksFetchedRef.current[0]=true;
          setWeeksFetched(f=>{const n=[...f];n[0]=true;return n;});
          setLoading(false);
          _calendarCache.episodes=merged;
          _calendarCache.weeksFetched=[true,false,false,false];
          _calendarCache.showIdsKey=_curShowIdsKey;
        })();
        return()=>{cancelled=true;};
      },[watched]);

      useEffect(()=>{
        if(loading||shows.length===0)return;
        if(weeksFetchedRef.current[calendarWeekIndex])return;
        const gen=loadGenRef.current;
        const runWeek=loaderRef.current.runWeek;
        if(!runWeek)return;
        let cancelled=false;
        (async()=>{
          setWeekNavLoading(true);
          try{
            const rows=await runWeek(calendarWeekIndex);
            if(cancelled||gen!==loadGenRef.current)return;
            setEpisodes(prev=>{const merged=mergeEps(prev,rows);_calendarCache.episodes=merged;return merged;});
            weeksFetchedRef.current[calendarWeekIndex]=true;
            setWeeksFetched(f=>{const n=[...f];n[calendarWeekIndex]=true;_calendarCache.weeksFetched=n;return n;});
          }finally{
            if(!cancelled&&gen===loadGenRef.current)setWeekNavLoading(false);
          }
        })();
        return()=>{cancelled=true;};
      },[calendarWeekIndex,loading,shows.length,watched]);

      const daySlots=useMemo(()=>{
        const todayStart=new Date();todayStart.setHours(0,0,0,0);
        const slots=[];
        for(let i=0;i<28;i++){
          const d=addLocalDays(todayStart,i);
          const key=localISODate(d);
          const items=episodes.filter(e=>e.air_date===key).sort((a,b)=>(a.showName||"").localeCompare(b.showName||"")||a.season_number-b.season_number||a.episode_number-b.episode_number);
          slots.push({iso:key,anchor:d,items});
        }
        return slots;
      },[episodes]);

      const emptyBox=(icon,headline,sub)=>(
        <div style={{background:C.surface,border:C.border,borderRadius:10,padding:"28px 24px",textAlign:"center",maxWidth:480}}>
          <div style={{fontSize:28,marginBottom:10}}>{icon}</div>
          <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>{headline}</div>
          <div style={{fontSize:11,color:C.muted,lineHeight:1.65}}>{sub}</div>
        </div>
      );

      const todayIso=localISODate(new Date());
      const calStrip=daySlots.slice(calendarWeekIndex*7,calendarWeekIndex*7+7);
      const activeDay=selectedDay&&calStrip.some(d=>d.iso===selectedDay)?selectedDay:null;
      const navBtnStyle=(disabled)=>({display:"flex",alignItems:"center",justifyContent:"center",width:28,height:28,borderRadius:7,border:`0.5px solid ${C.hover}`,background:C.elevated,color:disabled?C.muted:C.text,cursor:disabled?"default":"pointer",opacity:disabled?0.4:1,transition:"all 0.12s",flexShrink:0});
      const todayBtnStyle={padding:"4px 12px",borderRadius:7,border:`0.5px solid ${C.hover}`,background:C.elevated,color:calendarWeekIndex===0?C.amber:C.text,fontSize:12,fontWeight:calendarWeekIndex===0?600:400,cursor:"pointer",transition:"all 0.12s"};

      return(<div style={{flex:1,overflow:"auto",padding:"24px 32px",willChange:"transform",animation:"fadeIn 0.18s ease"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <h2 style={{fontFamily:"'DM Serif Display',serif",fontSize:26,fontWeight:400,color:C.text,letterSpacing:"-0.02em",margin:0,lineHeight:1.15}}>Calendar</h2>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <button type="button" aria-label="Previous week" disabled={calendarWeekIndex<=0} onClick={()=>setCalendarWeekIndex(i=>i-1)} style={navBtnStyle(calendarWeekIndex<=0)}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" aria-hidden="true"><polyline points="15,18 9,12 15,6"/></svg>
            </button>
            <button type="button" onClick={()=>setCalendarWeekIndex(0)} style={todayBtnStyle}>Today</button>
            <button type="button" aria-label="Next week" disabled={calendarWeekIndex>=3} onClick={()=>setCalendarWeekIndex(i=>i+1)} style={navBtnStyle(calendarWeekIndex>=3)}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" aria-hidden="true"><polyline points="9,18 15,12 9,6"/></svg>
            </button>
          </div>
        </div>
        {loading
          ?<div style={{fontSize:12,color:C.muted,padding:"20px 0"}}>Loading schedule…</div>
          :shows.length===0
            ?emptyBox("📅","No shows in progress","Mark at least one TV episode as watched — only series you have started appear here, not your full watchlist.")
            :(()=>{
              return(<div style={{position:"relative"}}>
                {/* Day strip */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:28,background:C.surface,border:C.border,borderRadius:10,padding:"14px 8px 10px"}}>
                  {calStrip.map(({iso,anchor,items})=>{
                    const isToday=iso===todayIso;
                    const isActive=iso===activeDay;
                    const circleColor=isActive?C.amber:isToday?`${C.amber}40`:"transparent";
                    const textColor=isActive?"#0d0d0d":C.text;
                    return(
                      <div key={iso} onClick={()=>setSelectedDay(iso===activeDay?null:iso)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,cursor:"pointer",borderRadius:8,padding:"4px 0",transition:"background 0.12s"}}>
                        <div style={{fontSize:9,color:C.muted,letterSpacing:"0.05em",textTransform:"uppercase",marginBottom:4}}>{anchor.toLocaleDateString("en-US",{month:"short"})}</div>
                        <div style={{width:30,height:30,borderRadius:"50%",background:circleColor,color:textColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:(isActive||isToday)?700:400,transition:"background 0.15s"}}>{anchor.getDate()}</div>
                        <div style={{fontSize:9,color:(isActive||isToday)?C.amber:C.muted,fontWeight:(isActive||isToday)?600:400,marginBottom:6,letterSpacing:"0.03em"}}>{anchor.toLocaleDateString("en-US",{weekday:"short"})}</div>
                        <div style={{display:"flex",gap:2,minHeight:6}}>
                          {items.slice(0,5).map((_,i)=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:C.amber}}/>)}
                        </div>
                      </div>
                    );
                  })}
                </div>
                {/* Episode list */}
                {weeksFetched[calendarWeekIndex]&&calStrip.every(d=>d.items.length===0)
                  ?<div style={{fontSize:12,color:C.muted,padding:"8px 0"}}>No episodes scheduled this week.</div>
                  :(()=>{
                    const daysWithEps=calStrip.filter(d=>d.items.length>0);
                    const sorted=activeDay?[...daysWithEps].sort((a,b)=>a.iso===activeDay?-1:b.iso===activeDay?1:0):daysWithEps;
                    return sorted.map(({iso,anchor,items})=>(
                      <div key={iso} style={{marginBottom:32}}>
                        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
                          <div>
                            <div style={{fontSize:14,fontWeight:600,color:C.text}}>{relFutureDay(iso)}</div>
                            <div style={{fontSize:11,color:C.muted}}>{anchor.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</div>
                          </div>
                          <div style={{flex:1,height:"0.5px",background:C.hover}}/>
                          <span style={{fontSize:11,color:C.muted}}>{items.length} episode{items.length!==1?"s":""}</span>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12}}>
                          {items.map((it,idx)=><ScheduleCard key={`${it.showId}-${it.season_number}-${it.episode_number}-${idx}`} item={it} goTo={goTo}/>)}
                        </div>
                      </div>
                    ));
                  })()
                }
                {weekNavLoading&&<div style={{position:"absolute",inset:0,top:0,background:`${C.bg}cc`,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8,fontSize:12,color:C.muted}}>Loading…</div>}
              </div>);
            })()
        }
      </div>);
    };

    const HomePage=({goTo,watchlist,setWatchlist,watched,setWatched})=>{
      // Compute candidate shows synchronously — poster/name available immediately, episode# needs API
      const contCandidates=useMemo(()=>{
        const showMap=new Map();
        [...watched.entries()].forEach(([,{item,date}])=>{
          if(item?.media_type!=="episode"||!item.showId)return;
          const sn=item.season_number||1,ep=item.episode_number||1;
          const ex=showMap.get(item.showId);
          if(!ex||sn>ex.season||(sn===ex.season&&ep>ex.episode))
            showMap.set(item.showId,{showId:item.showId,showName:item.showName,showPoster:item.showPoster,showBackdrop:item.showBackdrop,season:sn,episode:ep,watchedAt:date});
        });
        return[...showMap.values()].sort((a,b)=>new Date(b.watchedAt)-new Date(a.watchedAt)).slice(0,6);
      },[watched]);
      const [contItems,setContItems]=useState(()=>_homePageCache.watchedRef===watched?_homePageCache.contItems:[]);
      const [contLoading,setContLoading]=useState(()=>_homePageCache.watchedRef!==watched);
      useEffect(()=>{
        if(_homePageCache.watchedRef===watched)return;
        const today=todayTZ();
        const allShows=contCandidates.length
          ? [...contCandidates,// include shows beyond the first 6 in case some have no next ep
             ...(()=>{const shown=new Set(contCandidates.map(s=>s.showId));const showMap=new Map();[...watched.entries()].forEach(([,{item,date}])=>{if(item?.media_type!=="episode"||!item.showId||shown.has(item.showId))return;const sn=item.season_number||1,ep=item.episode_number||1;const ex=showMap.get(item.showId);if(!ex||sn>ex.season||(sn===ex.season&&ep>ex.episode))showMap.set(item.showId,{showId:item.showId,showName:item.showName,showPoster:item.showPoster,showBackdrop:item.showBackdrop,season:sn,episode:ep,watchedAt:date});});return[...showMap.values()].sort((a,b)=>new Date(b.watchedAt)-new Date(a.watchedAt));})()]
          : [];
        let cancelled=false;
        setContItems([]);
        setContLoading(true);
        (async()=>{
          // Fire all show checks in parallel — both season checks per show run simultaneously too
          const promises=allShows.map(show=>(async()=>{
            try{
              const checkEp=async(sn,ep)=>{
                const data=await api(`/tv/${show.showId}/season/${sn}`);
                const epData=(data.episodes||[]).find(e=>e.episode_number===ep);
                if(epData?.air_date&&epData.air_date<=today)return{season:sn,episode:ep};
                return null;
              };
              // Fire both candidates at once: next ep in same season AND ep 1 of next season
              const [sameSeason,nextSeason]=await Promise.all([
                checkEp(show.season,show.episode+1).catch(()=>null),
                checkEp(show.season+1,1).catch(()=>null)
              ]);
              const next=sameSeason||nextSeason;
              return next?{...show,resolvedNext:next}:null;
            }catch(e){return null;}
          })());
          // Consume in order (most recently watched first), stopping at 6 — set once at the end
          const results=[];
          for(const p of promises){
            if(cancelled||results.length>=6)break;
            const item=await p;
            if(item)results.push(item);
          }
          if(!cancelled){_homePageCache.contItems=results;_homePageCache.watchedRef=watched;setContItems(results);setContLoading(false);}
        })();
        return()=>{cancelled=true;};
      },[watched]);

      useEffect(()=>{(async()=>{setLoading(true);setCollection(null);try{let d=mcGet("movie",id);if(!d){d=await api(`/movie/${id}`,{"append_to_response":"credits,watch/providers,videos,release_dates"});if(d)mcSet("movie",id,d);}setDetail(d);if(d.belongs_to_collection?.id){try{const col=await api(`/collection/${d.belongs_to_collection.id}`);setCollection(col);}catch{}}}catch{}setLoading(false);})();},[id]);
